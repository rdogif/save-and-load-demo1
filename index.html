<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rishaan's Test</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #222;
        }

        header {
            padding: 30px 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 34px;
        }

        header p {
            margin: 8px 0 0;
            color: #666;
        }

        .search-area {
            max-width: 700px;
            margin: 30px auto 0;
            padding: 0 20px;
        }

        #projectSearch {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            background: white;
            font-family: Arial, sans-serif;
            font-size: 16px;
        }

        #projectSearch:focus {
            border-color: #222;
            outline: 2px solid #222;
        }

        #resultCount {
            margin: 10px 2px 0;
            color: #777;
            font-size: 14px;
        }

        #noResults {
            display: none;
            margin: 35px 0;
            color: #777;
            text-align: center;
        }

        .container {
            max-width: 700px;
            margin: 30px auto 40px;
            padding: 0 20px;
        }

        .project {
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
        }

        .project h2 {
            margin: 0 0 10px;
        }

        .project p {
            margin: 0 0 16px;
            line-height: 1.5;
        }

        .button {
            display: inline-block;
            padding: 10px 18px;
            border-radius: 5px;
            color: white;
            background: #222;
            text-decoration: none;
            transition: background 0.2s;
        }

        .button:hover {
            background: #444;
        }

        .button:focus-visible {
            outline: 3px solid #999;
            outline-offset: 3px;
        }

        footer {
            padding: 30px;
            color: #777;
            text-align: center;
        }

        @media (max-width: 500px) {
            header h1 {
                font-size: 29px;
            }

            .project {
                padding: 17px;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Rishaan's Test</h1>
    <p>A collection of my projects.</p>
</header>

<div class="search-area">
    <input
        type="search"
        id="projectSearch"
        placeholder="Search projects..."
        aria-label="Search projects"
        autocomplete="off"
    >

    <p id="resultCount"></p>
</div>

<main class="container" id="projectContainer">

   

    <div class="project">
        <h2>Name generator for stupid babies</h2>

        <p>
            Stupid baby name generator inspired by GTA.
        </p>

        <a class="button" href="gtabrr/">
            Open Generator
        </a>
    </div>

    <div class="project">
        <h2>Simple blackjack game</h2>

        <p>
            Just play it.
        </p>

        <a class="button" href="blackjack/">
            Open Game
        </a>
    </div>

    <div class="project">
        <h2>Watch monkeys fight</h2>

        <p>
            Monkey tournament.
        </p>

        <a class="button" href="mfight/">
            Open Simulation
        </a>
    </div>

    <p id="noResults">
        No projects found.
    </p>

    <!--
    HOW TO ADD ANOTHER PROJECT:

    Copy this section and paste it above the "noResults" paragraph:

    <div class="project">
        <h2>Project Name</h2>

        <p>
            Short description.
        </p>

        <a class="button" href="project-folder/">
            Open Project
        </a>
    </div>

    Then make a folder named:

    project-folder

    Put that project's index.html inside the folder.
    -->

</main>

<footer>
    Made by Rishaan
</footer>

<script>
    const searchBar = document.getElementById("projectSearch");
    const projects = document.querySelectorAll(".project");
    const noResults = document.getElementById("noResults");
    const resultCount = document.getElementById("resultCount");

    function updateSearch() {
        const searchText = searchBar.value.toLowerCase().trim();
        let visibleProjects = 0;

        projects.forEach(function (project) {
            const projectText = project.textContent.toLowerCase();
            const matchesSearch = projectText.includes(searchText);

            if (matchesSearch) {
                project.style.display = "block";
                visibleProjects++;
            } else {
                project.style.display = "none";
            }
        });

        if (visibleProjects === 0) {
            noResults.style.display = "block";
        } else {
            noResults.style.display = "none";
        }

        if (visibleProjects === 1) {
            resultCount.textContent = "1 project";
        } else {
            resultCount.textContent = visibleProjects + " projects";
        }
    }

    searchBar.addEventListener("input", updateSearch);
    

updateSearch();
</script>

</body>
</html>
