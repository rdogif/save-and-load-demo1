<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rishaan's Test</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f2f2;
            color: #222;
        }

        header {
            background: white;
            border-bottom: 1px solid #ddd;
            text-align: center;
            padding: 30px;
        }

        header h1 {
            margin: 0;
            font-size: 34px;
        }

        header p {
            color: #666;
            margin-top: 8px;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .project {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .project h2 {
            margin-top: 0;
        }

        .button {
            display: inline-block;
            padding: 10px 18px;
            background: #222;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.2s;
        }

        .button:hover {
            background: #444;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <h1>Rishaan's Test</h1>
    <p>A collection of my projects.</p>
</header>

<div class="container">

    <div class="project">
        <h2>Simple text save and load</h2>
        <p>Write text, save it as a JSON file, and load it later.</p>

        <a class="button" href="save-and-load/">
            Open Project
        </a>
    </div>
<div class="container">

    <div class="project">
        <h2>Simple blackjack game</h2>
        <p>just play it</p>

        <a class="button" href="blackjack/">
            Open Project
        </a>
    </div>
    <!--
    ==========================================
    HOW TO ADD ANOTHER PROJECT
    ==========================================

    Copy everything below and paste it above this comment.

    <div class="project">
        <h2>Project Name</h2>
        <p>Short description.</p>

        <a class="button" href="project-folder/">
            Open Project
        </a>
    </div>

    Then create a folder named:

    project-folder/

    and put your project's index.html inside it.
    -->

</div>

<footer>
    Made by Rishaan
</footer>

</body>
</html>
