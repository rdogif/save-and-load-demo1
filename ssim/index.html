      ? `${count} selected · drag one to move${count>1 && !paused ? " · pause to weld" : ""}`
      : "Drag a box around objects.";
    ui.cloneSelection.disabled=count===0;
    ui.deleteSelection.disabled=count===0;
    ui.weldSelectionButton.disabled=count<2 || !paused;
    syncObjectInspector();
  }

  function colorToHex(color) {
    if (/^#[0-9a-f]{6}$/i.test(color||"")) return color;
    if (/^#[0-9a-f]{3}$/i.test(color||"")) return "#"+[...color.slice(1)].map(char=>char+char).join("");
    const match=String(color||"").match(/[\d.]+/g);
    if (!match || match.length<3) return "#808080";
    return "#"+match.slice(0,3).map(value=>clamp(Math.round(Number(value)),0,255).toString(16).padStart(2,"0")).join("");
  }

  function syncObjectInspector() {
    const body=selectedBodies.size===1 ? [...selectedBodies][0] : null;
    const visible=body && bodies.includes(body);
    ui.objectInspector.classList.toggle("visible",Boolean(visible));

    const setRange=(input,label,value,digits=2)=>{
      const numeric=Number(value)||0;
      input.value=String(clamp(numeric,Number(input.min),Number(input.max)));
      label.textContent=digits===0 ? String(Math.round(numeric)) : String(Number(numeric.toFixed(digits)));
    };
    const samplePreset=body.shapeType?.startsWith("material") ? body.shapeType.slice("material".length) : null;
    ui.inspectMaterial.value=body.inspectorMaterial||
      (["wood","metal","glass","rubber","stone","ceramic","sticky"].includes(samplePreset) ? samplePreset : "custom");
    setRange(ui.inspectMass,ui.inspectMassValue,body.mass,2);
    setRange(ui.inspectGravity,ui.inspectGravityValue,body.material.gravityScale??1,2);
    setRange(ui.inspectFriction,ui.inspectFrictionValue,body.material.dynamicFriction??.5,2);
    setRange(ui.inspectBounce,ui.inspectBounceValue,body.material.restitution??.2,2);
    setRange(ui.inspectDurability,ui.inspectDurabilityValue,body.material.impactStrength??1000,0);
    ui.inspectColor.value=colorToHex(body.color);
    const conveyor=body.shapeType==="conveyor";
    ui.conveyorInspector.classList.toggle("visible",conveyor);
    if (conveyor) setRange(ui.inspectConveyor,ui.inspectConveyorValue,body.conveyorSpeed??180,0);
    const explosive=body.shapeType==="explosive";
    ui.explosiveInspector.classList.toggle("visible",explosive);
    if (explosive) {
      setRange(ui.inspectBlastRadius,ui.inspectBlastRadiusValue,body.blastRadius??200,0);
      setRange(ui.inspectBlastForce,ui.inspectBlastForceValue,body.blastForce??760,0);
      setRange(ui.inspectFuse,ui.inspectFuseValue,body.fuseDelay??.08,2);
      ui.inspectFuseValue.textContent=Number(ui.inspectFuse.value).toFixed(2)+"s";
    }
  }

  function setInspectedMass(body,nextMass) {
    nextMass=Math.max(.025,nextMass);
    const ratio=nextMass/Math.max(body.mass,.025);
    body.mass=nextMass;
    body.inertia=Math.max(.05,body.inertia*ratio);
    body.invMass=body.isStatic ? 0 : 1/body.mass;
    body.invInertia=body.isStatic ? 0 : 1/body.inertia;
  }

  function inspectedBody() {
    if (selectedBodies.size!==1) return null;
    const body=[...selectedBodies][0];
    return bodies.includes(body) ? body : null;
  }

  function applyInspectorControl(event) {
    const body=inspectedBody();
    if (!body) return;
    if (!inspectorHistoryRecorded) { recordHistory(); inspectorHistoryRecorded=true; }
    const target=event.currentTarget;
    if (target===ui.inspectMaterial) {
      if (target.value!=="custom") {
        const preset=target.value==="sticky" ? MATERIAL_BY_TYPE.materialsticky : MATERIAL_PRESETS[target.value];
        if (preset) {
          const densityRatio=(preset.density||1)/Math.max(body.material.density||1,.01);
          body.material={...preset};
          body.inspectorMaterial=target.value;
          setInspectedMass(body,body.mass*densityRatio);
        }
      }
    } else if (target===ui.inspectMass) setInspectedMass(body,Number(target.value));
    else if (target===ui.inspectGravity) body.material.gravityScale=Number(target.value);
    else if (target===ui.inspectFriction) {
      body.material.dynamicFriction=Number(target.value);
      body.material.staticFriction=Math.max(body.material.dynamicFriction,body.material.dynamicFriction*1.24);
    } else if (target===ui.inspectBounce) body.material.restitution=Number(target.value);
    else if (target===ui.inspectDurability) body.material.impactStrength=Number(target.value);
    else if (target===ui.inspectColor) body.color=target.value;
    else if (target===ui.inspectConveyor) body.conveyorSpeed=Number(target.value);
    else if (target===ui.inspectBlastRadius) body.blastRadius=Number(target.value);
    else if (target===ui.inspectBlastForce) body.blastForce=Number(target.value);
    else if (target===ui.inspectFuse) body.fuseDelay=Number(target.value);
    body.sleeping=false;
    body.sleepTimer=0;
    syncObjectInspector();
  }

  function bodyOverlapsSelection(body,left,top,right,bottom) {
    const vertices=getWorldVertices(body);
    const minX=Math.min(...vertices.map(point=>point.x));
    const maxX=Math.max(...vertices.map(point=>point.x));
    const minY=Math.min(...vertices.map(point=>point.y));
    const maxY=Math.max(...vertices.map(point=>point.y));
    return maxX>=left && minX<=right && maxY>=top && minY<=bottom;
  }

  function finishSelectionBox(end) {
    if (!selectionStart) return;
    const distance=length(sub(end,selectionStart));
    if (!selectionAdditive) selectedBodies.clear();
    if (distance<5) {
      const body=getBodyAt(end);
      if (body) {
        if (selectionAdditive && selectedBodies.has(body)) selectedBodies.delete(body);
        else selectedBodies.add(body);
      }
    } else {
      const left=Math.min(selectionStart.x,end.x), right=Math.max(selectionStart.x,end.x);
      const top=Math.min(selectionStart.y,end.y), bottom=Math.max(selectionStart.y,end.y);
      for (const body of bodies) if (bodyOverlapsSelection(body,left,top,right,bottom)) selectedBodies.add(body);
    }
    selectionStart=null;
    selectionCurrent=null;
    updateSelectionStatus();
  }

  function deleteSelectedBodies() {
    const selected=[...selectedBodies].filter(body=>bodies.includes(body));
    if (!selected.length) return;
    recordHistory();
    const selectedSet=new Set(selected);
    constraints=constraints.filter(constraint=>!selectedSet.has(constraint.a) && !selectedSet.has(constraint.b));
    bodies=bodies.filter(body=>!selectedSet.has(body));
    selectedBodies.clear();
    updateSelectionStatus();
  }

  function cloneSelectedBodies() {
    const originals=[...selectedBodies].filter(body=>bodies.includes(body));
    if (!originals.length || bodies.length+originals.length>MAX_DYNAMIC_BODIES) return;
    recordHistory();
    const clones=structuredClone(originals);
    const bodyMap=new Map();
    const groupMap=new Map();
    originals.forEach((body,index)=>{
      const clone=clones[index];
      clone.id=idCounter++;
      clone.pos=add(clone.pos,{x:24,y:24});
      clone.sleeping=false;
      clone.sleepTimer=0;
      clone.releaseGrace=.15;
      if (clone.ragdollGroup) {
        if (!groupMap.has(clone.ragdollGroup)) groupMap.set(clone.ragdollGroup,idCounter++);
        clone.ragdollGroup=groupMap.get(clone.ragdollGroup);
      }
      bodyMap.set(body,clone);
    });
    const clonedConstraints=[];
    for (const constraint of constraints) {
      if (!bodyMap.has(constraint.a)) continue;
      if (constraint.b && !bodyMap.has(constraint.b)) continue;
      const copy=structuredClone({...constraint,a:null,b:null});
      copy.id=idCounter++;
      copy.a=bodyMap.get(constraint.a);
      copy.b=constraint.b ? bodyMap.get(constraint.b) : null;
      if (!copy.b && copy.worldB) copy.worldB=add(copy.worldB,{x:24,y:24});
      copy.load=0;
      copy.age=0;
      copy.invalid=false;
      clonedConstraints.push(copy);
    }
    bodies.push(...clones);
    constraints.push(...clonedConstraints);
    selectedBodies=new Set(clones);
    updateSelectionStatus();
  }

  function weldCurrentSelection() {
    if (!paused || selectedBodies.size<2) return;
    weldSelection.clear();
    for (const body of selectedBodies) weldSelection.add(body);
    weldSelectedBodies();
    selectedBodies.clear();
    updateSelectionStatus();
  }

  function updateBuildStatus(message) {
    if (message) {
      ui.buildStatus.textContent=message;
      return;
    }
    if (!paused) ui.buildStatus.textContent="Pause to use constraint tools.";
    else if (ui.buildTool.value==="weld") ui.buildStatus.textContent=`${weldSelection.size} selected · click bodies, then Weld selected`;
    else if (ui.buildTool.value==="anchor") ui.buildStatus.textContent="Click an object to anchor or release it.";
    else if (ui.buildTool.value==="unbreakable") ui.buildStatus.textContent="Click an object to toggle unbreakable protection.";
    else ui.buildStatus.textContent=`Drag from an object to another object or the world (${ui.buildTool.value}).`;
  }

  const MIN_CONSTRAINT_STRENGTH=150;
  const MAX_FINITE_CONSTRAINT_STRENGTH=250000;

  function selectedConstraintStrength() {
    const position=Number(ui.constraintStrength.value);
    if (position>=Number(ui.constraintStrength.max)) return Infinity;
    // A logarithmic scale keeps delicate settings controllable while giving
    // reinforced constraints a genuinely strong finite range.
    const finitePosition=clamp(position/99,0,1);
    const strength=MIN_CONSTRAINT_STRENGTH*
      Math.pow(MAX_FINITE_CONSTRAINT_STRENGTH/MIN_CONSTRAINT_STRENGTH,finitePosition);
    return Math.max(MIN_CONSTRAINT_STRENGTH,Math.round(strength/25)*25);
  }

  function updateConstraintStrengthLabel() {
    const strength=selectedConstraintStrength();
    ui.constraintStrengthValue.textContent=strength===Infinity
      ? "Infinite"
      : strength.toLocaleString();
  }

  function createBuildConstraint(kind,start,end,bodyA,bodyB) {
    if (!bodyA || bodyA===bodyB) bodyB=null;
    recordHistory();
    let anchorA={...start};
    let anchorB={...end};
    if (kind==="hinge" || kind==="motor") {
      const common=bodyB ? mul(add(start,end),.5) : {...start};
      anchorA={...common};
      anchorB={...common};
    }
    const constraint={
      id:idCounter++,
      kind,
      a:bodyA,
      b:bodyB,
      localA:rotate(sub(anchorA,bodyA.pos),-bodyA.angle),
      localB:bodyB ? rotate(sub(anchorB,bodyB.pos),-bodyB.angle) : null,
      worldB:bodyB ? null : {...anchorB},
      restLength:(kind==="hinge" || kind==="motor") ? 0 : Math.max(12,length(sub(anchorB,anchorA))),
      strength:selectedConstraintStrength()||1200,
      motorSpeed:kind==="motor" ? Number(ui.motorSpeed.value)||0 : 0,
      load:0,
      age:0
    };
    constraints.push(constraint);
    bodyA.sleeping=false; bodyA.sleepTimer=0;
    if (bodyB) { bodyB.sleeping=false; bodyB.sleepTimer=0; }
    updateBuildStatus(`${kind} created${bodyB ? " between objects" : " to the world"}.`);
  }

  function weldSelectedBodies() {
    const selected=[...weldSelection].filter(body=>bodies.includes(body));
    if (!paused) { updateBuildStatus("Pause before welding objects."); return; }
    if (selected.length<2) { updateBuildStatus("Select at least two touching or nearby objects."); return; }
    recordHistory();

    const entries=selected.flatMap(bodyPartEntries);
    const totalMass=selected.reduce((sum,body)=>sum+body.mass,0);
    const velocity=selected.reduce((sum,body)=>add(sum,mul(body.vel,body.mass)),{x:0,y:0});
    const angularVelocity=selected.reduce((sum,body)=>sum+body.angVel*body.inertia,0)/
      Math.max(selected.reduce((sum,body)=>sum+body.inertia,0),.001);
    const welded=bodyFromCompoundPolygons(
      entries.map(entry=>entry.polygon),
      {
        partStyles:entries.map(entry=>entry.style),
        vel:mul(velocity,1/Math.max(totalMass,.001)),
        angVel:angularVelocity,
        color:selected[0].color,
        unbreakable:selected.some(body=>body.unbreakable)
      }
    );
    if (!welded) { updateBuildStatus("Those objects could not be welded."); return; }

    for (const body of selected) reattachConstraints(body,[welded]);
    bodies=bodies.filter(body=>!weldSelection.has(body));
    bodies.push(welded);
    weldSelection.clear();
    updateBuildStatus(`${selected.length} objects welded into one multi-material body.`);
  }

  ui.finishWeld.onclick=weldSelectedBodies;
  ui.cloneSelection.onclick=cloneSelectedBodies;
  ui.deleteSelection.onclick=deleteSelectedBodies;
  ui.weldSelectionButton.onclick=weldCurrentSelection;
  ui.clearSelection.onclick=()=>{ selectedBodies.clear(); updateSelectionStatus(); };
  ui.undo.onclick=undoScene;
  ui.redo.onclick=redoScene;
  const inspectorControls=[
    ui.inspectMaterial,ui.inspectMass,ui.inspectGravity,ui.inspectFriction,
    ui.inspectBounce,ui.inspectDurability,ui.inspectColor,ui.inspectConveyor,
    ui.inspectBlastRadius,ui.inspectBlastForce,ui.inspectFuse
  ];
  for (const control of inspectorControls) {
    control.addEventListener("pointerdown",()=>{ inspectorHistoryRecorded=false; });
    control.addEventListener("focus",()=>{ inspectorHistoryRecorded=false; });
    control.addEventListener("input",applyInspectorControl);
  }
  ui.detonateSelected.onclick=()=>{
    const body=inspectedBody();
    if (!body || body.shapeType!=="explosive") return;
    recordHistory();
    detonateExplosive(body);
    selectedBodies.delete(body);
    updateSelectionStatus();
  };
  updateSelectionStatus();
  updateHistoryButtons();
  ui.toggleConstraints.onclick=()=>{
    constraintsVisible=!constraintsVisible;
    ui.toggleConstraints.textContent=constraintsVisible ? "Hide constraint labels" : "Show constraint labels";
    ui.toggleConstraints.setAttribute("aria-pressed",String(!constraintsVisible));
  };
  ui.buildTool.onchange=()=>{
    buildStart=null;
    weldSelection.clear();
    ui.finishWeld.style.display=ui.buildTool.value==="weld" ? "block" : "none";
    const motorVisible=ui.buildTool.value==="motor";
    ui.motorSpeed.style.display=motorVisible ? "block" : "none";
    ui.motorSpeedLabel.style.display=motorVisible ? "flex" : "none";
    const strengthVisible=!['weld','anchor','unbreakable'].includes(ui.buildTool.value);
    ui.constraintStrength.style.display=strengthVisible ? "block" : "none";
    ui.constraintStrengthLabel.style.display=strengthVisible ? "flex" : "none";
    updateBuildStatus();
  };
  ui.finishWeld.style.display="none";
  ui.motorSpeed.style.display="none";
  ui.motorSpeedLabel.style.display="none";
  ui.constraintStrength.oninput=updateConstraintStrengthLabel;
  updateConstraintStrengthLabel();
  ui.motorSpeed.oninput=()=>ui.motorSpeedValue.textContent=ui.motorSpeed.value;

  function createDraggedShape(type,start,end) {
    if (type==="line") {
      const thickness=Math.max(4,Number(ui.sizeSlider.value)||12);
      const vertices=segmentPolygon(start,end,thickness);
      if (!vertices) return;
      const body=bodyFromWorldVertices(vertices,{color:palette[Math.floor(Math.random()*palette.length)],shapeType:"line",material:materialFor("line")});
      bodies.push(body);
    } else if (type==="deformableline") {
      const thickness=Math.max(6,Number(ui.sizeSlider.value)||16);
      const vertices=deformableSegmentPolygon(start,end,thickness);
      if (!vertices) return;
      const body=bodyFromWorldVertices(vertices,{color:"#738390",shapeType:type,material:materialFor(type)});
      bodies.push(configureDeformableBody(body,.62));
    } else if (type==="deformablerectangle") {
      const vertices=deformableRectanglePolygon(start,end);
      if (!vertices) return;
      const body=bodyFromWorldVertices(vertices,{color:"#87949d",shapeType:type,material:materialFor(type)});
      bodies.push(configureDeformableBody(body,.52));
    } else if (type==="rectangle" || MATERIAL_SAMPLE_TYPES.has(type)) {
      if (Math.abs(end.x-start.x)<6 || Math.abs(end.y-start.y)<6) return;
      const vertices=[
        {x:start.x,y:start.y},{x:end.x,y:start.y},
        {x:end.x,y:end.y},{x:start.x,y:end.y}
      ];
      const isMaterial=MATERIAL_SAMPLE_TYPES.has(type);
      const shapeType=isMaterial ? type : "rectangle";
      const color=isMaterial ? MATERIAL_SAMPLE_COLORS[type] : palette[Math.floor(Math.random()*palette.length)];
      const body=bodyFromWorldVertices(vertices,{color,shapeType,material:materialFor(shapeType)});
      bodies.push(body);
    } else if (type==="compound" && paused) {
      const thickness=Math.max(6,Number(ui.sizeSlider.value)||18);
      const vertices=segmentPolygon(start,end,thickness);
      if (!vertices) return;
      if (!weldDraftColor) weldDraftColor=palette[Math.floor(Math.random()*palette.length)];
      weldDraftParts.push(vertices);
    }
  }

function setMode(nextMode) {
    mode = nextMode;

    document.querySelectorAll("[data-mode]").forEach(button => {
      button.classList.toggle("active", button.dataset.mode === mode);
    });

    canvas.style.cursor = (!paused && ((mode==="spawn" && selectedSpawnType==="compound") || mode==="build")) ||
      (paused && !["slice","scissors","spawn","delete","build","drag","select"].includes(mode)) ? "not-allowed" :
      mode === "drag" ? "grab" :
      mode === "select" ? "default" :
      mode === "spawn" ? "copy" :
      mode === "delete" ? "not-allowed" :
      "crosshair";

    ui.spawnPanel.classList.toggle("visible", mode === "spawn");
    ui.buildControls.classList.toggle("visible",mode==="build");
    ui.selectionControls.classList.toggle("visible",mode==="select");
    if (mode==="build") updateBuildStatus();
    if (mode==="select") updateSelectionStatus();

    if (mode === "spawn" && !ui.spawnPanel.dataset.positioned) {
      const rect = ui.spawnPanel.getBoundingClientRect();
      ui.spawnPanel.style.left = Math.max(0, window.innerWidth - rect.width - 14) + "px";
      ui.spawnPanel.style.top = "14px";
      ui.spawnPanel.style.right = "auto";
      ui.spawnPanel.dataset.positioned = "true";
    }
    if (mode==="spawn") requestAnimationFrame(clampSpawnPanelToViewport);
  }


  canvas.addEventListener("pointerdown",event=>{
    // Right-click spawning is handled once by the contextmenu event below.
    if (event.button!==0) return;
    const p = pointerPosition(event);
    pointer.x = p.x;
    pointer.y = p.y;
    const pausedEditMode = mode==="slice" || mode==="scissors" || mode==="spawn" || mode==="delete" || mode==="build" || mode==="drag" || mode==="select";
    if (paused && !pausedEditMode) return;
    historyGestureRecorded=false;
    pointer.down = true;
    canvas.setPointerCapture(event.pointerId);

    if (mode==="slice") {
      sliceStart = p;
    } else if (mode==="scissors") {
      scissorStart={...p};
    } else if (mode==="spawn") {
      if (selectedSpawnType==="compound" && !paused) return;
      if (isDraggedSpawnType(selectedSpawnType)) {
        drawSpawnStart={...p};
      } else {
        recordHistory();
        spawn(p.x,p.y);
      }
    } else if (mode==="delete") {
      deleteTrailPoint={...p};
      deleteAtPoint(p);
    } else if (mode==="select") {
      const body=getBodyAt(p);
      if (body && selectedBodies.has(body)) {
        selectionMoveLast={...p};
      } else {
        selectionStart={...p};
        selectionCurrent={...p};
        selectionAdditive=event.shiftKey;
      }
    } else if (mode==="build") {
      if (!paused) return;
      const body=getBodyAt(p);
      if (ui.buildTool.value==="weld") {
        if (body) {
          if (weldSelection.has(body)) weldSelection.delete(body);
          else weldSelection.add(body);
          updateBuildStatus();
        }
      } else if (ui.buildTool.value==="anchor") {
        if (body) {
          recordHistory();
          setBodyStatic(body,!body.isStatic);
          updateBuildStatus(body.isStatic ? "Object anchored to the world." : "Object released.");
        }
      } else if (ui.buildTool.value==="unbreakable") {
        if (body) {
          recordHistory();
          body.unbreakable=!body.unbreakable;
          impactBreakQueue.delete(body.id);
          sawCutQueue.delete(body.id);
          deformationQueue.delete(body.id);
          for (const [key,hit] of bulletCutQueue) {
            if (hit.target===body) bulletCutQueue.delete(key);
          }
          updateBuildStatus(body.unbreakable
            ? "Object is now unbreakable."
            : "Unbreakable protection removed.");
        }
      } else if (body) {
        buildStart={point:{...p},body};
      }
    } else if (mode==="drag") {
      heldBody = getBodyAt(p);
      if (!paused && heldBody?.isStatic) heldBody=null;
      if (heldBody) {
        heldLocalPoint = rotate(sub(p,heldBody.pos),-heldBody.angle);
        if (paused) {
          pausedRotationOffset=heldBody.angle-Math.atan2(p.y-heldBody.pos.y,p.x-heldBody.pos.x);
          heldBody.vel={x:0,y:0};
          heldBody.angVel=0;
        } else {
          heldBody.sleeping = false;
          heldBody.sleepTimer = 0;
          mouseTrail = [];
          recordMouseTrail(event);
        }
        canvas.style.cursor = "grabbing";
      }
    }
  });

  canvas.addEventListener("pointermove",event=>{
    const p = pointerPosition(event);
    pointer.x = p.x;
    pointer.y = p.y;

    if (pointer.down && mode==="select" && selectionMoveLast) {
      const delta=sub(p,selectionMoveLast);
      if (length(delta)>.01) {
        if (!historyGestureRecorded) recordHistory();
        for (const body of selectedBodies) {
          if (!bodies.includes(body)) continue;
          body.pos=add(body.pos,delta);
          body.vel={x:0,y:0};
          body.angVel=0;
          body.sleeping=body.isStatic;
          body.sleepTimer=0;
        }
        selectionMoveLast={...p};
      }
    } else if (pointer.down && mode==="select" && selectionStart) {
      selectionCurrent={...p};
    } else if (pointer.down && mode==="delete" && deleteTrailPoint) {
      eraseAlongPath(deleteTrailPoint,p);
      deleteTrailPoint={...p};
    } else if (paused && heldBody) {
      heldBody.angle=Math.atan2(p.y-heldBody.pos.y,p.x-heldBody.pos.x)+pausedRotationOffset;
      heldBody.vel={x:0,y:0};
      heldBody.angVel=0;
      heldBody.sleeping=heldBody.isStatic;
      heldBody.sleepTimer=0;
    } else if (heldBody) {
      recordMouseTrail(event);
    }
  });

  canvas.addEventListener("pointerup",event=>{
    const p = pointerPosition(event);
    pointer.x = p.x;
    pointer.y = p.y;
    pointer.down = false;
    deleteTrailPoint=null;
    const pausedEditMode = mode==="slice" || mode==="scissors" || mode==="spawn" || mode==="delete" || mode==="build" || mode==="drag" || mode==="select";
    if (paused && !pausedEditMode) return;

    if (mode==="slice" && sliceStart && length(sub(p,sliceStart))>10) {
      recordHistory();
      performSlice(sliceStart,p);
    }
    if (mode==="scissors" && scissorStart && length(sub(p,scissorStart))>5) {
      performScissorSwipe(scissorStart,p);
    }
    if (mode==="spawn" && drawSpawnStart) {
      recordHistory();
      createDraggedShape(selectedSpawnType,drawSpawnStart,p);
      drawSpawnStart=null;
    }
    if (mode==="build" && buildStart && !["weld","anchor","unbreakable"].includes(ui.buildTool.value)) {
      createBuildConstraint(ui.buildTool.value,buildStart.point,p,buildStart.body,getBodyAt(p));
      buildStart=null;
    }
    if (mode==="select") {
      if (selectionStart) finishSelectionBox(p);
      selectionMoveLast=null;
    }

    sliceStart = null;
    scissorStart = null;

    if (heldBody) {
      if (paused) {
        heldBody.vel={x:0,y:0};
        heldBody.angVel=0;
        heldBody.sleeping=heldBody.isStatic;
        heldBody.sleepTimer=0;
      } else {
        recordMouseTrail(event);
        const releaseVelocity=estimateReleaseVelocity(mouseTrail);
        if (releaseVelocity) {
          // Match velocity at the grabbed point while retaining the angular
          // momentum created by an off-center throw.
          const worldOffset=rotate(heldLocalPoint,heldBody.angle);
          const rotationalVelocity=mul(perpendicular(worldOffset),heldBody.angVel);
          const targetCenterVelocity=sub(releaseVelocity,rotationalVelocity);
          heldBody.vel = {
            x:heldBody.vel.x*.08 + targetCenterVelocity.x*.92,
            y:heldBody.vel.y*.08 + targetCenterVelocity.y*.92
          };
          limitMotion(heldBody);
        }
        heldBody.releaseGrace = 0.42;
        heldBody.sleeping = false;
        heldBody.sleepTimer = 0;
      }

      heldBody = null;
      heldLocalPoint = null;
      pausedRotationOffset=0;
      mouseTrail = [];
      canvas.style.cursor = "grab";
    }
  });

  function cancelActiveInteraction() {
    drawSpawnStart=null;
    deleteTrailPoint=null;
    selectionStart=null;
    selectionCurrent=null;
    selectionMoveLast=null;
    buildStart=null;
    heldBody=null;
    heldLocalPoint=null;
    pausedRotationOffset=0;
    mouseTrail=[];
    sliceStart=null;
    scissorStart=null;
    pointer.down=false;
    setMode(mode);
  }

  canvas.addEventListener("pointercancel",cancelActiveInteraction);

  canvas.addEventListener("contextmenu",event=>{
    event.preventDefault();
    const p = pointerPosition(event);
    recordHistory();
    spawn(p.x,p.y);
  });



  document.querySelectorAll("[data-mode]").forEach(button=>{
    button.addEventListener("click",()=>setMode(button.dataset.mode));
  });

  document.getElementById("spawnTen").onclick = ()=>{
    recordHistory();
    for (let i=0;i<10;i++) {
      spawn(width*.32+Math.random()*width*.62,20+Math.random()*100);
    }
  };

  function resetWorld() {
    if (bodies.length || constraints.length) recordHistory();
    bodies = [];
    cuts = 0;
    cancelActiveInteraction();
    weldDraftParts = [];
    weldDraftColor = null;
    constraints = [];
    buildStart = null;
    weldSelection.clear();
    explosions = [];
    impactBreakQueue.clear();
    sawCutQueue.clear();
    bulletCutQueue.clear();
    deformationQueue.clear();
    stickyPairLastAttach.clear();
    selectedBodies.clear();

  }

  document.getElementById("reset").onclick = resetWorld;

  function setPaused(nextPaused) {
    if (paused === nextPaused) return;
    if (paused && !nextPaused) finalizeWeldDraft();
    paused = nextPaused;

    if (paused) {
      // End active grabs/deletes; Slice and Spawn become deliberate pause-edit tools.
      cancelActiveInteraction();
    }

    // Discard wall-clock time spent paused so resuming cannot create a jump.
    previousTime = performance.now();
    ui.pause.textContent = paused ? "Resume" : "Pause";
    ui.pause.setAttribute("aria-pressed", String(paused));
    ui.pause.classList.toggle("active",paused);
    setMode(mode);
    updateBuildStatus();
    updateSelectionStatus();
  }

  ui.pause.onclick = () => setPaused(!paused);

  function setSlowMotion(nextSlowMotion) {
    slowMotion = nextSlowMotion;
    ui.slow.classList.toggle("active",slowMotion);
    ui.slow.setAttribute("aria-pressed",String(slowMotion));
  }

  ui.slow.onclick = ()=>setSlowMotion(!slowMotion);

  function setImpactMode(nextImpactMode) {
    impactMode = nextImpactMode;
    impactBreakQueue.clear();
    ui.impact.textContent = impactMode ? "Impact: on" : "Impact: off";
    ui.impact.setAttribute("aria-pressed",String(impactMode));
    ui.impact.classList.toggle("active",impactMode);
  }

  ui.impact.onclick = ()=>setImpactMode(!impactMode);
  function fireGunsWithHistory() {
    if (!bodies.some(body=>body.shapeType==="gun")) return;
    recordHistory();
    fireGuns();
  }
  ui.fireGuns.onclick=fireGunsWithHistory;

  
  
  addEventListener("keydown",event=>{
    const target = event.target;
    const typing = target instanceof HTMLInputElement ||
      target instanceof HTMLTextAreaElement ||
      target instanceof HTMLSelectElement ||
      target?.isContentEditable;

    if (!typing && (event.ctrlKey || event.metaKey) && event.key.toLowerCase()==="z") {
      event.preventDefault();
      if (event.shiftKey) redoScene(); else undoScene();
    } else if (!typing && (event.ctrlKey || event.metaKey) && event.key.toLowerCase()==="y") {
      event.preventDefault();
      redoScene();
    } else if (event.code==="Space") {
      if (typing || event.repeat) return;
      event.preventDefault();
      setPaused(!paused);
    } else if (event.key==="Escape") {
      if (typing) return;
      cancelActiveInteraction();
    } else if (event.key.toLowerCase()==="r") {
      if (typing) return;
      resetWorld();
    } else if (event.key.toLowerCase()==="s") {
      if (typing || event.repeat) return;
      setSlowMotion(!slowMotion);
    } else if (event.key.toLowerCase()==="i") {
      if (typing || event.repeat) return;
      setImpactMode(!impactMode);
    } else if (event.key.toLowerCase()==="f") {
      if (typing || event.repeat) return;
      fireGunsWithHistory();
    } else if (event.key.toLowerCase()==="x") {
      if (typing || event.repeat) return;
      setMode("scissors");
    } else if (event.key==="1") {
      if (typing) return;
      setMode("slice");
    } else if (event.key==="2") {
      if (typing) return;
      setMode("drag");
    } else if (event.key==="3") {
      if (typing) return;
      setMode("spawn");
    } else if (event.key==="4") {
      if (typing) return;
      setMode("delete");
    } else if (event.key==="5") {
      if (typing) return;
      setMode("select");
    } else if (event.key==="6") {
      if (typing) return;
      setMode("build");
    } else if (event.key==="Enter" && mode==="build" && ui.buildTool.value==="weld") {
      if (typing) return;
      weldSelectedBodies();
    }
  });

  
  ui.sizeSlider.oninput = () => {
    if (Number(ui.sizeSlider.value) === 0) {
      ui.sizeValue.textContent = "Random";
    } else {
      ui.sizeValue.textContent = ui.sizeSlider.value + " px";
    }
  };

  addEventListener("resize",resize);
  addEventListener("visibilitychange",() => {
    previousTime = performance.now();
    if (document.hidden) cancelActiveInteraction();
  });
  resize();
  resetWorld();
  setMode(mode);

  function frame(now) {
    const dt = (now-previousTime)/1000;
    previousTime = now;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
