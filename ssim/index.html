  function queueBulletCut(bullet,target,contact) {
    if (bullet.shapeType!=="bullet" || target.shapeType==="bullet" || target.id===bullet.bulletOwner) return;
    if (target.radius<6 || target.mass<.012 || bodies.length>=MAX_DYNAMIC_BODIES) return;
    if (!bulletCutQueue.has(bullet.id)) bulletCutQueue.set(bullet.id,{
      bullet,target,contact:{...contact},direction:normalize(bullet.vel)
    });
  }

  function processBulletCuts() {
    if (!bulletCutQueue.size) return;
    const spent=new Set();
    let splits=0;
    for (const {bullet,target,contact,direction:impactDirection} of bulletCutQueue.values()) {
      if (splits>=8 || !bodies.includes(bullet) || !bodies.includes(target)) continue;
      let direction=impactDirection;
      if (length(direction)<1e-7) direction=rotate({x:1,y:0},bullet.angle);
      spent.add(bullet);
      if (target.unbreakable) continue;
      if (target.deformable) {
        queueDeformation(target,direction,Math.max(500,length(bullet.vel)),contact);
        continue;
      }
      const span=target.radius*2.4+40;
      const cutNormal=perpendicular(direction);
      const inwardDistance=clamp(dot(sub(target.pos,contact),cutNormal),-target.radius*.18,target.radius*.18);
      const cutPoint=add(contact,mul(cutNormal,inwardDistance));
      const pieces=sliceBody(target,sub(cutPoint,mul(direction,span)),add(cutPoint,mul(direction,span)));
      if (!pieces || bodies.length>=MAX_DYNAMIC_BODIES) continue;
      for (const piece of pieces) {
        piece.impactGrace=Math.max(piece.impactGrace,.14);
        piece.releaseGrace=Math.max(piece.releaseGrace,.08);
      }
      reattachConstraints(target,pieces);
      const index=bodies.indexOf(target);
      if (index>=0) bodies.splice(index,1,...pieces);
      cuts++;
      splits++;
      flash=Math.max(flash,.14);
    }
    if (spent.size) bodies=bodies.filter(body=>!spent.has(body));
    bulletCutQueue.clear();
  }

  function laserSegment(laser) {
    const direction=rotate({x:1,y:0},laser.angle);
    const start=add(laser.pos,mul(direction,laser.radius*.82));
    return {start,end:add(start,mul(direction,Math.max(width,height)*2.2)),direction};
  }

  function processLasers(dt) {
    const lasers=bodies.filter(body=>body.shapeType==="laser");
    for (const laser of lasers) {
      laser.laserCooldown=(laser.laserCooldown||0)-dt;
      if (laser.laserCooldown>0) continue;
      laser.laserCooldown=.12;
      const {start,end,direction}=laserSegment(laser);
      let beamCuts=0;
      for (const target of [...bodies]) {
        if (beamCuts>=5 || bodies.length>=MAX_DYNAMIC_BODIES) break;
        if (target===laser || ["laser","bullet"].includes(target.shapeType)) continue;
        if (target.laserGrace>0 || (target.laserGeneration||0)>=4) continue;
        if (target.unbreakable) continue;
        if (target.deformable) {
          const projection=clamp(dot(sub(target.pos,start),direction),0,length(sub(end,start)));
          queueDeformation(target,direction,420,add(start,mul(direction,projection)));
          target.laserGrace=.16;
          continue;
        }
        const pieces=sliceBody(target,start,end);
        if (!pieces) continue;
        for (const piece of pieces) {
          piece.laserGrace=.16;
          piece.laserGeneration=(target.laserGeneration||0)+1;
          piece.impactGrace=Math.max(piece.impactGrace,.12);
        }
        reattachConstraints(target,pieces);
        const index=bodies.indexOf(target);
        if (index>=0) bodies.splice(index,1,...pieces);
        cuts++;
        beamCuts++;
      }
    }
  }

  function fireGuns() {
    if (paused) return;
    for (const gun of bodies.filter(body=>body.shapeType==="gun")) {
      if (bodies.length>=MAX_DYNAMIC_BODIES) break;
      const direction=rotate({x:1,y:0},gun.angle);
      const normal=perpendicular(direction);
      const muzzle=add(gun.pos,mul(direction,gun.radius*.88+10));
      const halfLength=8,halfWidth=3.2;
      const vertices=[
        add(add(muzzle,mul(direction,-halfLength)),mul(normal,-halfWidth)),
        add(add(muzzle,mul(direction,halfLength)),mul(normal,-halfWidth)),
        add(add(muzzle,mul(direction,halfLength)),mul(normal,halfWidth)),
        add(add(muzzle,mul(direction,-halfLength)),mul(normal,halfWidth))
      ];
      const bullet=bodyFromWorldVertices(vertices,{
        color:"#e0b94e",
        shapeType:"bullet",
        material:materialFor("bullet"),
        vel:add(velocityAtPoint(gun,muzzle),mul(direction,1250)),
        impactGrace:.2,
        impactGeneration:3
      });
      bullet.bulletOwner=gun.id;
      bullet.bulletLife=1.8;
      bodies.push(bullet);
      if (!gun.isStatic) {
        gun.vel=sub(gun.vel,mul(direction,Math.min(75,18/Math.max(gun.mass,.2))));
        gun.sleeping=false;
        gun.sleepTimer=0;
      }
    }
  }

  function updateGunControlVisibility() {
    ui.fireGuns.style.display=bodies.some(body=>body.shapeType==="gun") ? "" : "none";
  }

  function armExplosive(body,contact,fuse=null) {
    if (body.shapeType!=="explosive" || !bodies.includes(body)) return;
    const delay=fuse==null ? (body.fuseDelay??.08) : fuse;
    body.fuse=body.fuse==null ? delay : Math.min(body.fuse,delay);
    body.explosionPoint=contact ? {...contact} : {...body.pos};
    body.sleeping=false;
    body.sleepTimer=0;
  }

  function detonateExplosive(explosive) {
    if (!bodies.includes(explosive)) return;
    const origin=explosive.explosionPoint || explosive.pos;
    const blastRadius=explosive.blastRadius || Math.max(150,explosive.radius*5);
    const blastForce=explosive.blastForce||760;
    removeBodyConstraints(explosive);
    const survivors=[];

    for (const body of bodies) {
      if (body===explosive) continue;
      const offset=sub(body.pos,origin);
      const centerDistance=length(offset);
      const surfaceDistance=Math.max(0,centerDistance-body.radius);
      if (surfaceDistance>=blastRadius) { survivors.push(body); continue; }
      const direction=centerDistance>1 ? mul(offset,1/centerDistance) : {x:0,y:-1};
      const falloff=Math.pow(1-surfaceDistance/blastRadius,1.65);
      const blastSpeed=clamp(blastForce*falloff/Math.sqrt(Math.max(body.mass,.22)),0,Math.max(1150,blastForce*1.35));
      body.vel=add(body.vel,mul(direction,blastSpeed));
      body.angVel+=cross(sub(body.pos,origin),direction)*.0008+(((body.id*29)%17)-8)*.055*falloff;
      body.sleeping=false;
      body.sleepTimer=0;
      body.releaseGrace=Math.max(body.releaseGrace,.22);

      if (body.shapeType==="explosive") {
        armExplosive(body,body.pos,.035+surfaceDistance/blastRadius*.035);
        survivors.push(body);
        continue;
      }

      if (body.unbreakable) {
        survivors.push(body);
        continue;
      }

      const damageSpeed=(280+1450*falloff)*Math.pow(blastForce/760,.7);
      if (body.deformable) {
        const contact=sub(body.pos,mul(direction,Math.min(body.radius,centerDistance)));
        queueDeformation(body,direction,damageSpeed,contact);
        survivors.push(body);
        continue;
      }
      const fragments=damageSpeed>body.material.impactStrength*.72
        ? fractureBody(body,{contact:origin,normal:direction,damageSpeed})
        : null;
      if (fragments) {
        reattachConstraints(body,fragments);
        survivors.push(...fragments);
      } else {
        survivors.push(body);
      }
    }

    const debrisCount=Math.min(14,Math.max(8,Math.round(explosive.radius/4)));
    for (let i=0;i<debrisCount && survivors.length<MAX_DYNAMIC_BODIES;i++) {
      const angle=Math.PI*2*i/debrisCount+((explosive.id*37+i*19)%23)/23*.22;
      const direction={x:Math.cos(angle),y:Math.sin(angle)};
      const size=4+(i%4)*1.4;
      const center=add(origin,mul(direction,8));
      const vertices=regularPolygon(center.x,center.y,size,3,angle);
      const debris=bodyFromWorldVertices(vertices,{
        color:i%3===0 ? "#e6b648" : "#7e302c",
        shapeType:null,
        material:{...MATERIAL_PRESETS.stone,density:.7,impactStrength:9999},
        vel:add(explosive.vel,mul(direction,(260+((i*71)%260))*clamp(blastForce/760,.45,2.4))),
        angVel:(i%2 ? 1 : -1)*(5+i*.35),
        impactGrace:.35,
        impactGeneration:3
      });
      debris.explosionDebris=true;
      debris.debrisLife=1.05+(i%5)*.11;
      survivors.push(debris);
    }

    bodies=survivors;
    explosions.push({x:origin.x,y:origin.y,radius:blastRadius,age:0});
    flash=Math.max(flash,.88);
  }

  function updateExplosives(dt) {
    for (const body of bodies) {
      if (body.fuse!=null) body.fuse-=dt;
    }
    const detonating=bodies.filter(body=>body.shapeType==="explosive" && body.fuse!=null && body.fuse<=0);
    for (const body of detonating) detonateExplosive(body);
    for (const explosion of explosions) explosion.age+=dt;
    explosions=explosions.filter(explosion=>explosion.age<.45);
  }

  function performSlice(a,b) {
    const nextBodies = [];
    let slicedSomething = false;

    for (const body of bodies) {
      if (body.shapeType==="explosive" && segmentActuallyCrossesPolygon(a,b,getWorldVertices(body))) {
        armExplosive(body,mul(add(a,b),.5),.035);
        nextBodies.push(body);
        slicedSomething=true;
        continue;
      }
      const pieces = sliceBody(body,a,b);
      if (pieces) {
        reattachConstraints(body,pieces);
        nextBodies.push(...pieces);
        cuts++;
        slicedSomething = true;
      } else {
        nextBodies.push(body);
      }
    }

    bodies = nextBodies;
    if (slicedSomething) flash = .15;
  }

  function project(vertices,axis) {
    let min = Infinity;
    let max = -Infinity;

    for (const vertex of vertices) {
      const value = dot(vertex,axis);
      min = Math.min(min,value);
      max = Math.max(max,value);
    }

    return {min,max};
  }

  function supportPoint(vertices,direction) {
    let best = vertices[0];
    let bestValue = dot(best,direction);

    for (let i=1;i<vertices.length;i++) {
      const value = dot(vertices[i],direction);
      if (value>bestValue) {
        best = vertices[i];
        bestValue = value;
      }
    }

    return best;
  }

  function pointInConvex(point,vertices) {
    let sign = 0;
    for (let i=0;i<vertices.length;i++) {
      const side = cross(
        sub(vertices[(i+1)%vertices.length],vertices[i]),
        sub(point,vertices[i])
      );
      if (Math.abs(side)<1e-6) continue;
      const currentSign = Math.sign(side);
      if (sign && currentSign!==sign) return false;
      sign = currentSign;
    }
    return true;
  }

  function segmentIntersection(a,b,c,d) {
    const r = sub(b,a);
    const q = sub(d,c);
    const denominator = cross(r,q);
    if (Math.abs(denominator)<1e-8) return null;

    const offset = sub(c,a);
    const t = cross(offset,q)/denominator;
    const u = cross(offset,r)/denominator;
    if (t < -1e-6 || t > 1+1e-6 || u < -1e-6 || u > 1+1e-6) return null;
    return add(a,mul(r,t));
  }

  function buildContactManifold(aVertices,bVertices,normal) {
    const points = [];
    const addUnique = point => {
      if (!points.some(other=>length(sub(other,point))<.35)) points.push(point);
    };

    for (const point of aVertices) if (pointInConvex(point,bVertices)) addUnique(point);
    for (const point of bVertices) if (pointInConvex(point,aVertices)) addUnique(point);

    for (let i=0;i<aVertices.length;i++) {
      const a0=aVertices[i];
      const a1=aVertices[(i+1)%aVertices.length];
      for (let j=0;j<bVertices.length;j++) {
        const hit=segmentIntersection(
          a0,a1,bVertices[j],bVertices[(j+1)%bVertices.length]
        );
        if (hit) addUnique(hit);
      }
    }

    if (!points.length) {
      const pointOnA = supportPoint(aVertices,normal);
      const pointOnB = supportPoint(bVertices,mul(normal,-1));
      points.push(mul(add(pointOnA,pointOnB),.5));
    }

    const contact = mul(
      points.reduce((sum,point)=>add(sum,point),{x:0,y:0}),
      1/points.length
    );
    const tangent = perpendicular(normal);
    let minAlong = Infinity;
    let maxAlong = -Infinity;
    for (const point of points) {
      const along=dot(point,tangent);
      minAlong=Math.min(minAlong,along);
      maxAlong=Math.max(maxAlong,along);
    }

    return { contact, contactSpan:maxAlong-minAlong, contactCount:points.length };
  }

  function findConvexCollision(aVertices,bVertices,aCenter,bCenter) {
    let smallestOverlap = Infinity;
    let bestAxis = null;

    for (const vertices of [aVertices,bVertices]) {
      for (let i=0;i<vertices.length;i++) {
        const edge = sub(vertices[(i+1)%vertices.length],vertices[i]);
        const axis = normalize(perpendicular(edge));
        const aProjection = project(aVertices,axis);
        const bProjection = project(bVertices,axis);
        const overlap = Math.min(aProjection.max,bProjection.max)-Math.max(aProjection.min,bProjection.min);

        if (overlap<=0) return null;

        if (overlap<smallestOverlap) {
          smallestOverlap = overlap;
          bestAxis = axis;
        }
      }
    }

    if (dot(sub(bCenter,aCenter),bestAxis)<0) bestAxis = mul(bestAxis,-1);
    const manifold = buildContactManifold(aVertices,bVertices,bestAxis);

    return {
      normal:bestAxis,
      penetration:smallestOverlap,
      contact:manifold.contact,
      contactSpan:manifold.contactSpan,
      contactCount:manifold.contactCount
    };
  }

  function findCollision(a,b) {
    const aParts = getWorldParts(a);
    const bParts = getWorldParts(b);
    let best = null;

    for (const aPart of aParts) {
      const aCenter = centroid(aPart);

      for (const bPart of bParts) {
        const bCenter = centroid(bPart);
        const collision = findConvexCollision(aPart,bPart,aCenter,bCenter);

        // Keep the deepest overlapping convex pair. Choosing the shallowest
        // pair can leave most of a concave body buried inside another body.
        if (collision && (!best || collision.penetration > best.penetration)) {
          best = collision;
        }
      }
    }

    return best;
  }

  function applyImpulse(a,b,collision) {
    const normal = collision.normal;
    const ra = sub(collision.contact,a.pos);
    const rb = sub(collision.contact,b.pos);

    const velocityA = add(a.vel,mul(perpendicular(ra),a.angVel));
    const velocityB = add(b.vel,mul(perpendicular(rb),b.angVel));
    const relativeVelocity = sub(velocityB,velocityA);
    const speedAlongNormal = dot(relativeVelocity,normal);

    if (speedAlongNormal>0) return;

    // Combine the two actual materials; low-speed contacts remain inelastic
    // so stacks can still settle without perpetual micro-bounces.
    const restitution = Math.abs(speedAlongNormal)>45
      ? Math.sqrt(a.material.restitution*b.material.restitution)
      : 0;
    const raCrossN = cross(ra,normal);
    const rbCrossN = cross(rb,normal);

    // Wake bodies before calculating the impulse. The old code calculated
    // sleeping bodies as infinitely heavy and only woke them afterward,
    // which caused violent stack corrections and random wobble.
    if (speedAlongNormal < -1.2 || collision.penetration > 0.7) {
      a.sleeping = false;
      b.sleeping = false;
      a.sleepTimer = 0;
      b.sleepTimer = 0;
    }
    const aInvMass = a.invMass;
    const bInvMass = b.invMass;
    const aInvInertia = a.invInertia;
    const bInvInertia = b.invInertia;
    const denominator =
      aInvMass+bInvMass+
      raCrossN*raCrossN*aInvInertia+
      rbCrossN*rbCrossN*bInvInertia;

    if (denominator<=0) return;

    let impulseMagnitude = -(1+restitution)*speedAlongNormal/denominator;

    if (Math.abs(impulseMagnitude) > 0.08) {
      a.sleeping = false;
      b.sleeping = false;
      a.sleepTimer = 0;
      b.sleepTimer = 0;
    }

    const normalImpulse = mul(normal,impulseMagnitude);

    a.vel = sub(a.vel,mul(normalImpulse,aInvMass));
    b.vel = add(b.vel,mul(normalImpulse,bInvMass));
    a.angVel -= cross(ra,normalImpulse)*aInvInertia;
    b.angVel += cross(rb,normalImpulse)*bInvInertia;

    const afterVelocityA = add(a.vel,mul(perpendicular(ra),a.angVel));
    const afterVelocityB = add(b.vel,mul(perpendicular(rb),b.angVel));
    const afterRelative = sub(afterVelocityB,afterVelocityA);

    let tangent = sub(afterRelative,mul(normal,dot(afterRelative,normal)));
    if (length(tangent)>1e-7) tangent = normalize(tangent);

    let frictionMagnitude = -dot(afterRelative,tangent)/denominator;
    const tangentSpeed = Math.abs(dot(afterRelative,tangent));
    const friction = tangentSpeed < 18
      ? Math.sqrt(a.material.staticFriction*b.material.staticFriction)
      : Math.sqrt(a.material.dynamicFriction*b.material.dynamicFriction);
    const maxFriction = Math.abs(impulseMagnitude)*friction;
    frictionMagnitude = clamp(frictionMagnitude,-maxFriction,maxFriction);

    const frictionImpulse = mul(tangent,frictionMagnitude);
    a.vel = sub(a.vel,mul(frictionImpulse,aInvMass));
    b.vel = add(b.vel,mul(frictionImpulse,bInvMass));
    a.angVel -= cross(ra,frictionImpulse)*aInvInertia;
    b.angVel += cross(rb,frictionImpulse)*bInvInertia;
    limitMotion(a);
    limitMotion(b);
  }

  function correctPositions(a,b,collision) {
    const slop = .045;
    const percent = .22;
    if (a.sleeping && b.sleeping) return;
    const aInvMass = a.invMass;
    const bInvMass = b.invMass;
    const inverseMassSum = aInvMass+bInvMass;
    if (inverseMassSum <= 0) return;

    const correctionAmount =
      Math.max(collision.penetration-slop,0)*percent/inverseMassSum;

    const correction = mul(collision.normal,correctionAmount);
    a.pos = sub(a.pos,mul(correction,aInvMass));
    b.pos = add(b.pos,mul(correction,bInvMass));


  }

  function markSupport(body,x) {
    body.supported = true;
    body.supportMinX = Math.min(body.supportMinX,x);
    body.supportMaxX = Math.max(body.supportMaxX,x);
  }

  function markCollisionSupport(body,collision) {
    const tangent=perpendicular(collision.normal);
    const horizontalSpan=(collision.contactSpan || 0)*Math.abs(tangent.x);
    markSupport(body,collision.contact.x-horizontalSpan*.5);
    markSupport(body,collision.contact.x+horizontalSpan*.5);
  }

  function hasStableSupport(body) {
    if (!body.supported || !Number.isFinite(body.supportMinX)) return false;
    const margin = Math.max(3,body.radius*.065);
    return body.pos.x >= body.supportMinX-margin &&
      body.pos.x <= body.supportMaxX+margin;
  }

  function limitMotion(body) {
    const speed = Math.hypot(body.vel.x,body.vel.y);
    const maxSpeed = 1800;
    if (speed>maxSpeed) {
      body.vel.x *= maxSpeed/speed;
      body.vel.y *= maxSpeed/speed;
    }
    const maxAngularSpeed = clamp(1000/Math.max(body.radius,8),8,35);
    body.angVel = clamp(body.angVel,-maxAngularSpeed,maxAngularSpeed);
  }

  function applyMouseJoint(body,step) {
    const r=rotate(heldLocalPoint,body.angle);
    const worldGrab=add(body.pos,r);
    const pointVelocity=add(body.vel,mul(perpendicular(r),body.angVel));
    const error=sub(pointer,worldGrab);
    const timeScale=slowMotion ? 4 : 1;
    const cursorVelocity=estimateReleaseVelocity(mouseTrail) || {x:0,y:0};
    let targetVelocity=add(mul(cursorVelocity,timeScale),mul(error,22*timeScale));
    const targetSpeed=length(targetVelocity);
    if (targetSpeed>1800) targetVelocity=mul(targetVelocity,1800/targetSpeed);

    const deltaVelocity=sub(targetVelocity,pointVelocity);
    const k11=body.invMass+body.invInertia*r.y*r.y;
    const k12=-body.invInertia*r.x*r.y;
    const k22=body.invMass+body.invInertia*r.x*r.x;
    const determinant=k11*k22-k12*k12;
    if (determinant<=1e-9) return;

    const response=1-Math.exp(-52*step*timeScale);
    let impulse={
      x:(k22*deltaVelocity.x-k12*deltaVelocity.y)/determinant*response,
      y:(k11*deltaVelocity.y-k12*deltaVelocity.x)/determinant*response
    };
    const maxImpulse=Math.max(.08,body.mass*900);
    const impulseLength=length(impulse);
    if (impulseLength>maxImpulse) impulse=mul(impulse,maxImpulse/impulseLength);

    body.vel=add(body.vel,mul(impulse,body.invMass));
    body.angVel+=cross(r,impulse)*body.invInertia;
    limitMotion(body);
  }

  function constraintAnchor(constraint,side) {
    const body=constraint[side];
    if (!body) return {...constraint["world"+side.toUpperCase()]};
    return add(body.pos,rotate(constraint["local"+side.toUpperCase()],body.angle));
  }

  function pointSegmentDistance(point,start,end) {
    const segment=sub(end,start);
    const denominator=dot(segment,segment);
    if (denominator<1e-8) return length(sub(point,start));
    const t=clamp(dot(sub(point,start),segment)/denominator,0,1);
    return length(sub(point,add(start,mul(segment,t))));
  }

  function getConstraintAt(point,tolerance=13) {
    if (!constraintsVisible) return null;
    for (let i=constraints.length-1;i>=0;i--) {
      const constraint=constraints[i];
      const a=constraintAnchor(constraint,"a");
      const b=constraintAnchor(constraint,"b");
      if (pointSegmentDistance(point,a,b)<=tolerance) return constraint;
    }
    return null;
  }

  function deleteAtPoint(point) {
    let constraint=getConstraintAt(point);
    if (constraint && !historyGestureRecorded) recordHistory();
    while (constraint) {
      constraints=constraints.filter(item=>item!==constraint);
      constraint=getConstraintAt(point);
    }

    // Remove every overlapping body under the eraser, not only the topmost one.
    const touched=bodies.filter(body=>pointInPolygon(point,getWorldVertices(body)));
    if (!touched.length) return;
    if (!historyGestureRecorded) recordHistory();
    const touchedSet=new Set(touched);
    for (const body of touched) {
      removeBodyConstraints(body);
      weldSelection.delete(body);
      selectedBodies.delete(body);
    }
    bodies=bodies.filter(body=>!touchedSet.has(body));
    updateSelectionStatus();
  }

  function eraseAlongPath(start,end) {
    const distance=length(sub(end,start));
    const samples=Math.max(1,Math.ceil(distance/3));
    for (let i=0;i<=samples;i++) deleteAtPoint(add(start,mul(sub(end,start),i/samples)));
  }

  function bodyContainsPoint(body,point,tolerance=3) {
    for (const polygon of getWorldDrawPolygons(body)) {
      if (pointInPolygon(point,polygon)) return true;
      for (let i=0;i<polygon.length;i++) {
        if (pointSegmentDistance(point,polygon[i],polygon[(i+1)%polygon.length])<=tolerance) return true;
      }
    }
    return false;
  }

  function reattachConstraints(oldBody,replacements) {
    for (const constraint of constraints) {
      for (const side of ["a","b"]) {
        if (constraint[side]!==oldBody) continue;
        const anchor=constraintAnchor(constraint,side);
        const containing=replacements.filter(body=>bodyContainsPoint(body,anchor));
        const replacement=containing.reduce((best,body)=>
          !best || length(sub(body.pos,anchor))<length(sub(best.pos,anchor)) ? body : best,null);
        if (!replacement) {
          // A severed joint must disappear. Falling back to the nearest piece
          // could attach an arm joint to a disconnected head or distant shard.
          constraint.invalid=true;
          continue;
        }
        constraint[side]=replacement;
        constraint["local"+side.toUpperCase()]=rotate(sub(anchor,replacement.pos),-replacement.angle);
      }
    }
    constraints=constraints.filter(constraint=>!constraint.invalid && constraint.a && constraint.a!==constraint.b);
  }

  function removeBodyConstraints(body) {
    constraints=constraints.filter(constraint=>constraint.a!==body && constraint.b!==body);
  }

  function setBodyStatic(body,nextStatic) {
    body.isStatic=nextStatic;
    body.invMass=nextStatic ? 0 : 1/body.mass;
    body.invInertia=nextStatic ? 0 : 1/body.inertia;
    body.vel={x:0,y:0};
    body.angVel=0;
    body.sleeping=nextStatic;
    body.sleepTimer=0;
  }

  function solveConstraint(constraint,step) {
    if (constraint.invalid) return;
    const a=constraint.a;
    const b=constraint.b;
    if (!a || !bodies.includes(a) || (b && !bodies.includes(b))) return;
    const pointA=constraintAnchor(constraint,"a");
    const pointB=constraintAnchor(constraint,"b");
    const delta=sub(pointB,pointA);
    const distance=length(delta);
    const axis=distance>1e-6 ? mul(delta,1/distance) : {x:1,y:0};
    const hingeLike=constraint.kind==="hinge" || constraint.kind==="motor" || constraint.kind==="sticky";
    const error=hingeLike
      ? distance
      : constraint.kind==="spring"
        ? distance-constraint.restLength
        : Math.max(0,distance-constraint.restLength);
    if (!hingeLike && constraint.kind!=="spring" && error<=.02) return;

    const ra=sub(pointA,a.pos);
    const rb=b ? sub(pointB,b.pos) : {x:0,y:0};
    const velocityA=velocityAtPoint(a,pointA);
    const velocityB=b ? velocityAtPoint(b,pointB) : {x:0,y:0};
    const relativeSpeed=dot(sub(velocityB,velocityA),axis);
    const raCross=cross(ra,axis);
    const rbCross=cross(rb,axis);
    const inverseMass=a.invMass+raCross*raCross*a.invInertia+
      (b ? b.invMass+rbCross*rbCross*b.invInertia : 0);
    if (inverseMass<=1e-8) return;

    const response=constraint.kind==="spring"
      ? 1-Math.exp(-10*step)
      : 1;
    const bias=constraint.kind==="spring"
      ? error*18
      : error*(hingeLike ? .32 : .20)/Math.max(step,.001);
    const rawImpulse=(relativeSpeed+bias)/inverseMass*response;
    // Strength is measured as acceleration at the joint, so the same setting
    // behaves consistently for light and heavy shapes.
    const stress=(Math.abs(relativeSpeed)/Math.max(step,.001)+
      Math.abs(error)*(constraint.kind==="spring" ? 90 : hingeLike ? 180 : 140))*.35;
    const unbreakable=constraint.strength===Infinity;
    constraint.load=unbreakable ? 0 : Math.max((constraint.load||0)*.82,stress);
    const breakGrace=constraint.kind==="motor" ? 1 : .25;
    const breakThreshold=unbreakable ? Infinity : (constraint.strength||1200)*(constraint.kind==="motor" ? 8 : 1);
    if (!unbreakable && constraint.kind!=="motor" && (constraint.age||0)>breakGrace && stress>breakThreshold) {
      constraint.invalid=true;
      flash=Math.max(flash,.18);
      return;
    }
    let impulseMagnitude=rawImpulse;
    const maxImpulse=Math.max(.12,(a.mass+(b?.mass||0))*500*step);
    impulseMagnitude=clamp(impulseMagnitude,-maxImpulse,maxImpulse);
    const impulse=mul(axis,impulseMagnitude);

    a.vel=add(a.vel,mul(impulse,a.invMass));
    a.angVel+=cross(ra,impulse)*a.invInertia;
    if (b) {
      b.vel=sub(b.vel,mul(impulse,b.invMass));
      b.angVel-=cross(rb,impulse)*b.invInertia;
    }

    if (hingeLike && distance>.015) {
      const linearInverseMass=a.invMass+(b?.invMass||0);
      if (linearInverseMass>1e-8) {
        const correction=mul(axis,Math.min(distance*.62,12));
        a.pos=add(a.pos,mul(correction,a.invMass/linearInverseMass));
        if (b) b.pos=sub(b.pos,mul(correction,b.invMass/linearInverseMass));
      }
    }

    if (b && Number.isFinite(constraint.minAngle) && Number.isFinite(constraint.maxAngle)) {
      const relativeAngle=wrapAngle(b.angle-a.angle-(constraint.referenceAngle||0));
      const limitedAngle=clamp(relativeAngle,constraint.minAngle,constraint.maxAngle);
      const violation=relativeAngle-limitedAngle;
      const inverseAngularMass=a.invInertia+b.invInertia;
      if (Math.abs(violation)>1e-4 && inverseAngularMass>1e-8) {
        const correction=clamp(violation,-.11,.11);
        a.angle+=correction*a.invInertia/inverseAngularMass;
        b.angle-=correction*b.invInertia/inverseAngularMass;
        const relativeAngular=b.angVel-a.angVel;
        if (relativeAngular*violation>0) {
          const stoppingImpulse=relativeAngular/inverseAngularMass;
          a.angVel+=stoppingImpulse*a.invInertia;
          b.angVel-=stoppingImpulse*b.invInertia;
        }
        a.sleeping=false; b.sleeping=false;
        a.sleepTimer=0; b.sleepTimer=0;
      }
    }

    if (Math.abs(error)>.8 || Math.abs(relativeSpeed)>8) {
      a.sleeping=false; a.sleepTimer=0;
      if (b) { b.sleeping=false; b.sleepTimer=0; }
    }
    limitMotion(a);
    if (b) limitMotion(b);

    if (constraint.kind==="motor" && !constraint.invalid) {
      const inverseAngularMass=a.invInertia+(b?.invInertia||0);
      if (inverseAngularMass>1e-8) {
        const relativeAngular=b ? b.angVel-a.angVel : a.angVel;
        const motorError=(constraint.motorSpeed||0)-relativeAngular;
        let angularImpulse=motorError/inverseAngularMass*(1-Math.exp(-12*step));
        const lever=Math.max(12,length(ra),length(rb));
        const motorStress=Math.abs(angularImpulse)/Math.max(step,.001)*inverseAngularMass*lever*.35;
        constraint.load=unbreakable ? 0 : Math.max(constraint.load||0,motorStress);
        if (!unbreakable && (constraint.age||0)>breakGrace && motorStress>breakThreshold) {
          constraint.invalid=true;
          return;
        }
        const effectiveInertia=1/inverseAngularMass;
        const maxAngularImpulse=effectiveInertia*70*step;
        angularImpulse=clamp(angularImpulse,-maxAngularImpulse,maxAngularImpulse);
        if (b) {
          a.angVel-=angularImpulse*a.invInertia;
          b.angVel+=angularImpulse*b.invInertia;
        } else {
          a.angVel+=angularImpulse*a.invInertia;
        }
      }
    }
  }

  function solveWorldBounds(body) {
    if (body.isStatic) return;
    const vertices = getWorldVertices(body);
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
    for (const v of vertices) {
      minX=Math.min(minX,v.x); maxX=Math.max(maxX,v.x);
      minY=Math.min(minY,v.y); maxY=Math.max(maxY,v.y);
    }

    const floorY=height-10;
    const wallBounce=Math.sqrt(body.material.restitution*.08);

    if (maxY>floorY) {
      const penetration=maxY-floorY;
      body.pos.y-=penetration;

      const corrected=getWorldVertices(body);
      const contacts=corrected.filter(v=>v.y>=floorY-1.25);
      const contact=contacts.length
        ? contacts.reduce((sum,v)=>add(sum,v),{x:0,y:0})
        : {x:body.pos.x,y:floorY};
      if (contacts.length) { contact.x/=contacts.length; contact.y/=contacts.length; }
      for (const floorContact of contacts.length ? contacts : [contact]) {
        markSupport(body,floorContact.x);
      }

      const r=sub(contact,body.pos);
      const pointVelocity=add(body.vel,mul(perpendicular(r),body.angVel));
      if (pointVelocity.y>0) {
        if (pointVelocity.y>125) armExplosive(body,contact);
        queueDeformation(body,{x:0,y:-1},pointVelocity.y,contact);
        queueImpactBreak(body,{x:0,y:-1},contact,pointVelocity.y);
        const rn=r.x;
        const denom=Math.max(body.invMass+rn*rn*body.invInertia,1e-8);
        const restitution=pointVelocity.y>45
          ? Math.sqrt(body.material.restitution*.08)
          : 0;
        const j=-(1+restitution)*pointVelocity.y/denom;
        const impulse={x:0,y:j};
        body.vel=add(body.vel,mul(impulse,body.invMass));
        body.angVel+=cross(r,impulse)*body.invInertia;
      }

      // Do not erase a freshly thrown body's momentum. Friction is handled
      // once per simulation step below using time-based damping.
      if (Math.abs(body.vel.y)<10 && body.releaseGrace<=0) body.vel.y=0;
    }

    if (minX<0) {
      body.pos.x-=minX;
      if (body.vel.x<0) {
        queueDeformation(body,{x:1,y:0},-body.vel.x,{x:0,y:clamp(body.pos.y,0,height)});
        queueImpactBreak(body,{x:1,y:0},{x:0,y:clamp(body.pos.y,0,height)},-body.vel.x);
        body.vel.x=-body.vel.x*wallBounce;
      }
    }
    if (maxX>width) {
      body.pos.x-=maxX-width;
      if (body.vel.x>0) {
        queueDeformation(body,{x:-1,y:0},body.vel.x,{x:width,y:clamp(body.pos.y,0,height)});
        queueImpactBreak(body,{x:-1,y:0},{x:width,y:clamp(body.pos.y,0,height)},body.vel.x);
        body.vel.x=-body.vel.x*wallBounce;
      }
    }
    if (minY<0) {
      body.pos.y-=minY;
      if (body.vel.y<0) {
        queueDeformation(body,{x:0,y:1},-body.vel.y,{x:clamp(body.pos.x,0,width),y:0});
        queueImpactBreak(body,{x:0,y:1},{x:clamp(body.pos.x,0,width),y:0},-body.vel.y);
        body.vel.y=-body.vel.y*wallBounce;
      }
    }
  }

  function update(realDt) {
    if (paused) return;
    impactBreakQueue.clear();
    sawCutQueue.clear();
    bulletCutQueue.clear();
    deformationQueue.clear();

    // Real frame time is clamped first; slow motion only scales simulation time.
    const clampedRealDt = clamp(realDt,0,.05);
    const dt = clampedRealDt * (slowMotion ? .25 : 1);
    physicsTime+=dt;
    if (stickyPairLastAttach.size>500) {
      for (const [key,time] of stickyPairLastAttach) if (physicsTime-time>5) stickyPairLastAttach.delete(key);
    }
    for (const body of bodies) body.deformCooldown=Math.max(0,(body.deformCooldown||0)-dt);

    const fastestBodySpeed = bodies.reduce((fastest,body) =>
      Math.max(fastest,Math.hypot(body.vel.x,body.vel.y)),0);
    const smallestThickness=bodies.reduce((smallest,body) =>
      Math.min(smallest,body.collisionThickness || body.radius),60);
    const travelSteps=Math.ceil(fastestBodySpeed*dt/Math.max(3,smallestThickness*.38));
    const speedSteps=Math.ceil(6+fastestBodySpeed/420);
    const substeps=clamp(Math.max(6,travelSteps,speedSteps),6,18);
    const step = dt/substeps;
    const gravity = 900;

    for (let s=0;s<substeps;s++) {
      for (const body of bodies) {
        body.supported = false;
        body.supportMinX = Infinity;
        body.supportMaxX = -Infinity;
      }
      for (const body of bodies) {
        if (!body.sleeping && !body.isStatic) {
          body.vel.y += gravity*body.material.gravityScale*step;
          body.vel.x += wind*step;

          const linearDamping = Math.exp(-body.material.airDrag*step);
          const angularDamping = Math.exp(-body.material.angularDrag*step);
          body.vel.x *= linearDamping;
          body.vel.y *= linearDamping;
          body.angVel *= angularDamping;
          limitMotion(body);
        }

        if (body===heldBody) {
          body.sleeping=false;
          body.sleepTimer=0;
          applyMouseJoint(body,step);
        }

        if (!body.sleeping && !body.isStatic) {
          body.pos = add(body.pos,mul(body.vel,step));
          body.angle += body.angVel*step;
          solveWorldBounds(body);

          body.releaseGrace = Math.max(0,(body.releaseGrace||0)-step);
          body.impactGrace = Math.max(0,(body.impactGrace||0)-step);
          body.sawGrace = Math.max(0,(body.sawGrace||0)-step);
          body.laserGrace = Math.max(0,(body.laserGrace||0)-step);
          const vertices = getWorldVertices(body);
          const onFloor = vertices.some(vertex => vertex.y >= height-11.2);

          if (onFloor) {
            // Strong settling drag belongs only on a broad, stable support.
            // Applying it on a single corner fights the torque from gravity.
            const stableOnFloor = hasStableSupport(body);
            const floorLinearDrag = body.releaseGrace>0
              ? .16*body.material.floorDrag
              : stableOnFloor
                ? (1.15+4.2*body.material.dynamicFriction)*body.material.floorDrag
                : (.8+2.4*body.material.dynamicFriction)*body.material.floorDrag;
            const floorAngularDrag = body.releaseGrace>0
              ? .10*body.material.floorDrag
              : stableOnFloor
                ? (.9+3.5*body.material.dynamicFriction)*body.material.floorDrag
                : .04;
            body.vel.x *= Math.exp(-floorLinearDrag*step);
            body.angVel *= Math.exp(-floorAngularDrag*step);
          }
        }
      }

      // Re-detect collisions every solver pass. The old solver reused one
      // stale contact even after bodies moved, which could push them farther
      // together or leave visible overlap in stacks.
      for (let iteration=0;iteration<10;iteration++) {
        let foundCollision = false;

        for (let i=0;i<bodies.length;i++) {
          for (let j=i+1;j<bodies.length;j++) {
            const a = bodies[i];
            const b = bodies[j];
            if (a.ragdollGroup && a.ragdollGroup===b.ragdollGroup) continue;

            const broadRadiusA=a.radius*(a.deformable ? 1.4 : 1);
            const broadRadiusB=b.radius*(b.deformable ? 1.4 : 1);
            if (length(sub(a.pos,b.pos))>broadRadiusA+broadRadiusB+2) continue;

            const collision = findCollision(a,b);
            if (!collision) continue;
            foundCollision = true;

            const relative = sub(velocityAtPoint(b,collision.contact),velocityAtPoint(a,collision.contact));
            const impactSpeed = Math.max(0,-dot(relative,collision.normal));
            tryCreateStickyBond(a,b,collision.contact,impactSpeed);
            applyConveyorContact(a,b,collision,dt);
            if (a.shapeType==="saw") queueSawCut(a,b,collision.contact);
            if (b.shapeType==="saw") queueSawCut(b,a,collision.contact);
            if (a.shapeType==="bullet") queueBulletCut(a,b,collision.contact);
            if (b.shapeType==="bullet") queueBulletCut(b,a,collision.contact);
            if (impactSpeed>24) {
              queueDeformation(a,mul(collision.normal,-1),impactSpeed,collision.contact);
              queueDeformation(b,collision.normal,impactSpeed,collision.contact);
            }
            if (impactSpeed>120) {
              armExplosive(a,collision.contact);
              armExplosive(b,collision.contact);
            }
            queueBodyImpact(a,b,collision,impactSpeed);
            const hardImpact = impactSpeed > 55 || collision.penetration > 3.4;
            if (hardImpact) {
              if (!a.isStatic) a.sleeping = false;
              if (!b.isStatic) b.sleeping = false;
              a.sleepTimer = 0;
              b.sleepTimer = 0;
            }

            // Mark whichever body is above a mostly vertical contact as supported.
            if (collision.normal.y > .45) markCollisionSupport(a,collision);
            if (collision.normal.y < -.45) markCollisionSupport(b,collision);

            // Fully sleeping stacks do not need another impulse every solver pass.
            if (!(a.sleeping && b.sleeping)) {
              applyImpulse(a,b,collision);
              correctPositions(a,b,collision);
            }
          }
        }

        if (!foundCollision) break;
      }

      for (const constraint of constraints) constraint.age=(constraint.age||0)+step;
      for (let iteration=0;iteration<8;iteration++) {
        for (const constraint of constraints) solveConstraint(constraint,step);
      }

      // Position correction can move a body slightly through a wall/floor.
      // Clamp world bounds again after resolving body-to-body contacts.
      for (const body of bodies) solveWorldBounds(body);

      // One authoritative sleep pass prevents floor bodies from accumulating
      // sleep time twice and freezing before a stack is actually stable.
      for (const body of bodies) {
        if (body.isStatic) continue;
        if (body.sleeping) continue;
        if (body===heldBody || body.releaseGrace>0 || !hasStableSupport(body)) {
          body.sleepTimer=0;
          continue;
        }
        const speed = Math.hypot(body.vel.x,body.vel.y);
        if (speed < 9 && Math.abs(body.angVel) < .075) {
          body.sleepTimer += step;
          body.vel.x *= Math.exp(-10*step);
          if (Math.abs(body.vel.y) < 3.5) body.vel.y = 0;
          body.angVel *= Math.exp(-12*step);
          if (body.sleepTimer >= body.material.sleepDelay) {
            body.vel.x = 0;
            body.vel.y = 0;
            body.angVel = 0;
            body.sleeping = true;
          }
        } else {
          body.sleepTimer = 0;
        }
      }
    }

    wind *= Math.pow(.25,dt);
    if (flash>0) flash *= Math.pow(.72,clampedRealDt*60);
    if (helpRemaining>0) {
      helpRemaining -= clampedRealDt;
      if (helpRemaining<=0) document.getElementById("help").classList.add("hidden");
    }
    processBulletCuts();
    processSawCuts();
    processLasers(dt);
    processImpactBreaks();
    updateExplosives(dt);
    processDeformations();
    for (const body of bodies) {
      if (body.shapeType==="bullet") body.bulletLife=(body.bulletLife??1.8)-dt;
      if (body.explosionDebris) body.debrisLife=(body.debrisLife??1.2)-dt;
    }
    const expiredDebris=new Set(bodies.filter(body=>body.explosionDebris && body.debrisLife<=0));
    if (expiredDebris.size) {
      constraints=constraints.filter(constraint=>!expiredDebris.has(constraint.a) && !expiredDebris.has(constraint.b));
    }
    bodies=bodies.filter(body=>(body.shapeType!=="bullet" || body.bulletLife>0) && !expiredDebris.has(body));
    bodies = bodies.filter(body =>
      body.pos.y<height+800 &&
      body.pos.x>-800 &&
      body.pos.x<width+800
    );
    constraints=constraints.filter(constraint=>
      !constraint.invalid && bodies.includes(constraint.a) && (!constraint.b || bodies.includes(constraint.b))
    );
    let selectionChanged=false;
    for (const body of [...selectedBodies]) {
      if (!bodies.includes(body)) { selectedBodies.delete(body); selectionChanged=true; }
    }
    if (selectionChanged) updateSelectionStatus();
  }

  function drawBackground() {
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0,0,width,height);

    ctx.fillStyle = "#000000";
    ctx.fillRect(0,height-10,width,10);
  }

  function drawMemeDetails(ctx, body) {
    const type = body.shapeType;
    if (!["tungtung","tralalero","bombardino","capybara","doge","cheems","shrekhead","toilet","banana","amongus","creeper","human","enderman","astronaut","ninja","knight","robot","alien","skull","controller","camera","phone","donut","planet","duck","fish","cat","bat"].includes(type)) return;

    const xs = body.verts.map(p=>p.x);
    const ys = body.verts.map(p=>p.y);
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const w = maxX-minX, h = maxY-minY;
    const X = n => minX + (n+1)*.5*w;
    const Y = n => minY + (n+1)*.5*h;

    ctx.save();
    ctx.translate(body.pos.x,body.pos.y);
    ctx.rotate(body.angle);
    ctx.lineWidth=Math.max(1.2,Math.min(w,h)*.025);
    ctx.strokeStyle="#171717";
    ctx.fillStyle="#171717";
    ctx.shadowColor="transparent";

    const eye=(nx,ny,size=.055)=>{
      ctx.beginPath();
      ctx.fillStyle="#fff";
      ctx.arc(X(nx),Y(ny),Math.min(w,h)*size,0,Math.PI*2);
      ctx.fill();
      ctx.stroke();
      ctx.beginPath();
      ctx.fillStyle="#111";
      ctx.arc(X(nx+.01),Y(ny),Math.min(w,h)*size*.42,0,Math.PI*2);
      ctx.fill();
    };

    if (type==="amongus") {
      // Backpack, large blue visor and leg gap.
      ctx.fillStyle="#9fcfe0";
      ctx.beginPath();
      ctx.roundRect(X(-.02),Y(-.57),w*.42,h*.24,Math.min(w,h)*.08);
      ctx.fill(); ctx.stroke();
      ctx.fillStyle="rgba(255,255,255,.65)";
      ctx.beginPath();
      ctx.ellipse(X(.08),Y(-.61),w*.1,h*.035,-.1,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle="rgba(0,0,0,.16)";
      ctx.beginPath();
      ctx.roundRect(X(-.9),Y(-.23),w*.17,h*.45,Math.min(w,h)*.04);
      ctx.fill(); ctx.stroke();
      ctx.strokeStyle="#171717";
      ctx.lineWidth=Math.max(2,Math.min(w,h)*.04);
      ctx.beginPath(); ctx.moveTo(X(-.08),Y(.48)); ctx.lineTo(X(-.08),Y(.93)); ctx.stroke();
    } else if (type==="creeper") {
      // Large pixel face confined to the square head.
      const headTop=Y(-1), headBottom=Y(-.27);
      const headH=headBottom-headTop;
      ctx.fillStyle="#111";
      ctx.fillRect(X(-.38),headTop+headH*.28,w*.17,headH*.20);
      ctx.fillRect(X(.21),headTop+headH*.28,w*.17,headH*.20);
      ctx.fillRect(X(-.14),headTop+headH*.47,w*.28,headH*.19);
      ctx.fillRect(X(-.27),headTop+headH*.60,w*.18,headH*.26);
      ctx.fillRect(X(.09),headTop+headH*.60,w*.18,headH*.26);
      ctx.fillRect(X(-.09),headTop+headH*.66,w*.18,headH*.25);
      // A few head-only patches keep the pixel texture without putting blocks on the limbs.
      ctx.fillStyle="rgba(30,110,35,.24)";
      ctx.fillRect(X(-.58),headTop+headH*.06,w*.18,headH*.16);
      ctx.fillRect(X(.34),headTop+headH*.06,w*.20,headH*.17);
    } else if (type==="zombie") {
      ctx.fillStyle="#233";
      ctx.fillRect(X(-.16),Y(-.82),w*.10,h*.055);
      ctx.fillRect(X(.06),Y(-.82),w*.10,h*.055);
      ctx.fillStyle="#355b8a"; ctx.fillRect(X(-.28),Y(-.45),w*.56,h*.44);
      ctx.fillStyle="#334a2d"; ctx.fillRect(X(-.25),Y(.34),w*.18,h*.60); ctx.fillRect(X(.07),Y(.34),w*.18,h*.60);
    } else if (type==="skeleton") {
      ctx.fillStyle="#111";

  function drawMaterialDetails(context,body) {
    if (!MATERIAL_SAMPLE_TYPES.has(body.shapeType)) return;
    const xs=body.verts.map(point=>point.x);
    const ys=body.verts.map(point=>point.y);
    const minX=Math.min(...xs), maxX=Math.max(...xs);
    const minY=Math.min(...ys), maxY=Math.max(...ys);
    const w=maxX-minX, h=maxY-minY;
    context.save();
    context.translate(body.pos.x,body.pos.y);
    context.rotate(body.angle);
    context.lineWidth=Math.max(1,Math.min(w,h)*.035);
    context.strokeStyle="rgba(30,35,40,.42)";
    context.fillStyle="rgba(255,255,255,.42)";

    if (body.shapeType==="materialglass" || body.shapeType==="materialice") {
      context.beginPath();
      context.moveTo(minX+w*.18,maxY-h*.12);
      context.lineTo(maxX-w*.2,minY+h*.1);
      context.moveTo(minX+w*.48,maxY-h*.1);
      context.lineTo(maxX-w*.1,minY+h*.38);
      context.strokeStyle="rgba(255,255,255,.8)";
      context.stroke();
    } else if (body.shapeType==="materialwood") {
      context.beginPath();
      context.moveTo(minX+w*.12,minY+h*.34); context.lineTo(maxX-w*.12,minY+h*.28);
      context.moveTo(minX+w*.12,minY+h*.68); context.lineTo(maxX-w*.12,minY+h*.75);
      context.stroke();
    } else if (body.shapeType==="materialmetal") {
      context.beginPath();
      context.moveTo(minX+w*.1,minY+h*.25); context.lineTo(maxX-w*.1,minY+h*.25);
      context.moveTo(minX+w*.1,maxY-h*.25); context.lineTo(maxX-w*.1,maxY-h*.25);
      context.strokeStyle="rgba(255,255,255,.48)";
      context.stroke();
    } else if (body.shapeType==="materialstone" || body.shapeType==="materialfoam") {
      for (const [px,py] of [[.25,.28],[.68,.22],[.48,.58],[.22,.76],[.76,.72]]) {
        context.beginPath();
        context.arc(minX+w*px,minY+h*py,Math.max(1,Math.min(w,h)*.035),0,Math.PI*2);
        context.fill();
      }
    } else if (body.shapeType==="materialrubber") {
      context.beginPath();
      context.moveTo(minX+w*.2,minY+h*.5); context.lineTo(maxX-w*.2,minY+h*.5);
      context.moveTo(minX+w*.5,minY+h*.2); context.lineTo(minX+w*.5,maxY-h*.2);
      context.stroke();
    } else if (body.shapeType==="materialsticky") {
      context.fillStyle="rgba(255,255,255,.58)";
      for (const [px,py] of [[.18,.25],[.5,.2],[.82,.3],[.3,.65],[.68,.72]]) {
        context.beginPath();
        context.arc(minX+w*px,minY+h*py,Math.max(2,Math.min(w,h)*.065),0,Math.PI*2);
        context.fill();
      }
    } else if (body.shapeType==="materialceramic") {
      context.strokeStyle="rgba(85,100,120,.45)";
      context.strokeRect(minX+w*.12,minY+h*.12,w*.76,h*.76);
    }
    context.restore();
  }

  function drawExplosiveDetails(context,body) {

    for (const x of [minX+w*.28,maxX-w*.28]) {
      context.beginPath(); context.moveTo(x,minY+h*.04); context.lineTo(x,maxY-h*.04); context.stroke();
    }
    context.fillStyle="#f1d45b";
    context.beginPath(); context.arc(0,0,Math.max(4,Math.min(w,h)*.16),0,Math.PI*2); context.fill();
    context.strokeStyle="#1d1b19"; context.lineWidth=2; context.stroke();

      context.beginPath(); context.arc(maxX+w*.3,minY-h*.02,5,0,Math.PI*2); context.fill();

  function drawSawDetails(context,body) {
    if (body.shapeType!=="saw") return;

  function drawConveyorDetails(context,body) {
    if (body.shapeType!=="conveyor") return;
    const xs=body.verts.map(point=>point.x), ys=body.verts.map(point=>point.y);
    const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
    const w=maxX-minX, h=maxY-minY;
    const direction=Math.sign(body.conveyorSpeed||1);
    const spacing=Math.max(16,h*.72);
    const offset=((physicsTime*Math.abs(body.conveyorSpeed||0)*.22)%spacing)*direction;
    context.save(); context.translate(body.pos.x,body.pos.y); context.rotate(body.angle);
    context.fillStyle="#30363a";
    context.fillRect(minX+w*.03,minY+h*.18,w*.94,h*.64);
    context.strokeStyle="#d9dde0";
    context.lineWidth=Math.max(1.5,h*.055);
    context.beginPath(); context.moveTo(minX+w*.04,minY+h*.08); context.lineTo(maxX-w*.04,minY+h*.08); context.stroke();
    context.save();
    context.beginPath(); context.rect(minX+w*.04,minY+h*.2,w*.92,h*.6); context.clip();
    for (let x=minX-spacing+offset;x<maxX+spacing;x+=spacing) {
      context.beginPath();
      context.moveTo(x-direction*h*.12,0);
      context.lineTo(x+direction*h*.12,0);
      context.lineTo(x+direction*h*.02,-h*.12);
      context.moveTo(x+direction*h*.12,0);
      context.lineTo(x+direction*h*.02,h*.12);
      context.stroke();
    }
    context.restore();
    context.fillStyle="#d9dde0";
    for (const x of [minX+w*.1,maxX-w*.1]) {
      context.beginPath(); context.arc(x,0,h*.22,0,Math.PI*2); context.fill();
      context.fillStyle="#59636b"; context.beginPath(); context.arc(x,0,h*.09,0,Math.PI*2); context.fill();
      context.fillStyle="#d9dde0";
    }
    context.restore();
  }

    if (body.shapeType==="apple") {
      context.lineWidth=Math.max(2,w*.06);
      context.beginPath(); context.moveTo(0,minY+h*.12); context.lineTo(w*.08,minY-h*.13); context.stroke();
      context.fillStyle="#5f963f";
      context.beginPath(); context.ellipse(w*.18,minY-h*.02,w*.18,h*.09,-.35,0,Math.PI*2); context.fill(); context.stroke();
    } else if (body.shapeType==="burger") {
      context.fillStyle="#5f9b43"; context.fillRect(minX+w*.08,minY+h*.47,w*.84,h*.12);
      context.fillStyle="#6f3829"; context.fillRect(minX+w*.05,minY+h*.59,w*.9,h*.17);
      context.fillStyle="#f0ca45";
      context.beginPath(); context.moveTo(minX+w*.12,minY+h*.58); context.lineTo(0,minY+h*.7); context.lineTo(maxX-w*.12,minY+h*.58); context.closePath(); context.fill();
      context.fillStyle="#f4e5b0";
      for (const [px,py] of [[.35,.18],[.52,.12],[.66,.22]]) {
        context.beginPath(); context.arc(minX+w*px,minY+h*py,Math.max(1.2,w*.018),0,Math.PI*2); context.fill();
      }
    } else if (body.shapeType==="cake") {
      context.strokeStyle="#fff1e3"; context.lineWidth=Math.max(3,h*.11);
      context.beginPath(); context.moveTo(minX+w*.06,minY+h*.18); context.lineTo(maxX-w*.08,minY+h*.25); context.stroke();
      context.strokeStyle="#b85e79"; context.lineWidth=Math.max(2,h*.06);
      context.beginPath(); context.moveTo(minX+w*.08,minY+h*.62); context.lineTo(maxX-w*.04,minY+h*.62); context.stroke();
      context.strokeStyle="#6b402b"; context.lineWidth=Math.max(2,w*.045);
      context.beginPath(); context.moveTo(0,minY+h*.08); context.lineTo(0,minY-h*.24); context.stroke();
      context.fillStyle="#f2c84b"; context.beginPath(); context.arc(0,minY-h*.3,Math.max(2,w*.045),0,Math.PI*2); context.fill();
    } else if (body.shapeType==="cookie") {
      context.fillStyle="#4e2e24";
      for (const [px,py] of [[-.32,-.25],[.2,-.38],[.38,.12],[-.12,.2],[-.38,.36],[.15,.45]]) {
        context.beginPath(); context.arc(px*w*.72,py*h*.72,Math.max(2,Math.min(w,h)*.055),0,Math.PI*2); context.fill();
      }
    } else if (body.shapeType==="fries") {
      context.strokeStyle="#efc747"; context.lineWidth=Math.max(4,w*.09);
      for (const x of [-.38,-.18,.04,.26,.43]) {
        context.beginPath(); context.moveTo(x*w,minY+h*.35); context.lineTo(x*w+(x>.2 ? w*.05 : 0),minY-h*(.18+Math.abs(x)*.22)); context.stroke();
      }
      context.fillStyle="#f2c84a"; context.beginPath(); context.arc(0,minY+h*.72,Math.min(w,h)*.16,0,Math.PI*2); context.fill();
    } else if (body.shapeType==="pizza") {
      context.strokeStyle="#f4d36a"; context.lineWidth=Math.max(3,w*.08);
      context.beginPath(); context.moveTo(minX+w*.12,minY+h*.12); context.lineTo(0,maxY-h*.12); context.lineTo(maxX-w*.12,minY+h*.12); context.stroke();
      context.fillStyle="#b9483d";
      for (const [px,py] of [[-.18,-.16],[.24,-.1],[.02,.26]]) {
        context.beginPath(); context.arc(px*w,py*h,Math.max(2,w*.06),0,Math.PI*2); context.fill();
      }
    } else if (body.shapeType==="mushroom") {
      context.fillStyle="rgba(255,255,255,.75)";
      for (const [px,py] of [[-.28,-.38],[.08,-.48],[.32,-.3]]) {
        context.beginPath(); context.arc(px*w,py*h,Math.max(2,w*.055),0,Math.PI*2); context.fill();
      }
    } else if (body.shapeType==="cup") {
      context.strokeStyle="rgba(255,255,255,.7)";
      context.beginPath(); context.moveTo(minX+w*.18,minY+h*.18); context.lineTo(maxX-w*.3,minY+h*.18); context.stroke();
    }
    context.restore();
  }

  function drawBodyEffects(context,body) {
    if (body.isStatic && constraintsVisible) {
      context.save(); context.translate(body.pos.x,body.pos.y); context.rotate(body.angle);
      context.fillStyle="#fff"; context.strokeStyle="#111"; context.lineWidth=2;
      context.beginPath(); context.arc(0,0,7,0,Math.PI*2); context.fill(); context.stroke();
      context.beginPath(); context.moveTo(-4,0); context.lineTo(4,0); context.moveTo(0,-4); context.lineTo(0,4); context.stroke();
      context.restore();
    }
    if (body.deformable && !body.textureRemoved) {
      const left={x:-body.radius*.42,y:-body.radius*.25};
      const right={x:body.radius*.42,y:-body.radius*.25};
      context.save(); context.translate(body.pos.x,body.pos.y); context.rotate(body.angle);
      context.strokeStyle="rgba(255,255,255,.55)"; context.lineWidth=Math.max(2,body.radius*.07); context.lineCap="round";
      context.beginPath(); context.moveTo(left.x,left.y); context.quadraticCurveTo(0,-body.radius*.48,right.x,right.y); context.stroke();
      context.restore();
    }
  }

  function drawBody(body) {
    const polygons=getWorldDrawPolygons(body);
    const seamless=body.hideInternalSeams && polygons.length>1;
    const bodyAlpha=body.explosionDebris ? clamp((body.debrisLife??0)/.32,0,1) : 1;
    ctx.save();
    ctx.globalAlpha=bodyAlpha;
    ctx.shadowColor="rgba(0,0,0,.26)";
    ctx.shadowBlur=7;
    ctx.shadowOffsetX=3;
    ctx.shadowOffsetY=4;

    if (seamless) {
      ctx.beginPath();
      for (const vertices of polygons) {
        if (!vertices || vertices.length<3) continue;
        ctx.moveTo(vertices[0].x,vertices[0].y);
        for (let i=1;i<vertices.length;i++) ctx.lineTo(vertices[i].x,vertices[i].y);
        ctx.closePath();
      }
      ctx.fillStyle=body.color;
      ctx.fill();
      ctx.shadowColor="transparent";
    } else {
      for (let polygonIndex=0;polygonIndex<polygons.length;polygonIndex++) {
        const vertices=polygons[polygonIndex];
        if (!vertices || vertices.length<3) continue;
        ctx.beginPath();
        ctx.moveTo(vertices[0].x,vertices[0].y);
        for (let i=1;i<vertices.length;i++) ctx.lineTo(vertices[i].x,vertices[i].y);
        ctx.closePath();
        ctx.fillStyle=body.partStyles?.[polygonIndex]?.color || body.color;
        ctx.fill();
        ctx.shadowColor="transparent";
        ctx.lineWidth=2;
        ctx.strokeStyle="#34302c";
        ctx.stroke();
      }
    }

    const visibleSeamlessEdges=[];
    if (seamless) {
      const edges=new Map();
      const pointKey=point=>`${Math.round(point.x*10)},${Math.round(point.y*10)}`;
      for (const polygon of polygons) {
        for (let i=0;i<polygon.length;i++) {
          const a=polygon[i],b=polygon[(i+1)%polygon.length];
          const aKey=pointKey(a),bKey=pointKey(b);
          const key=aKey<bKey ? `${aKey}|${bKey}` : `${bKey}|${aKey}`;
          const entry=edges.get(key);
          if (entry) entry.count++;
          else edges.set(key,{a,b,count:1});
        }
      }
      ctx.strokeStyle="#34302c";
      ctx.lineWidth=2;
      ctx.beginPath();
      for (const edge of edges.values()) {
        if (edge.count!==1) continue;
        const edgeDelta=sub(edge.b,edge.a);
        const edgeLength=length(edgeDelta);
        if (edgeLength<.05) continue;
        const edgeNormal=mul(perpendicular(edgeDelta),1/edgeLength);
        const midpoint=mul(add(edge.a,edge.b),.5);
        const probeDistance=clamp(edgeLength*.08,.08,.45);
        const filledAt=point=>polygons.some(polygon=>pointInPolygon(point,polygon));
        // Repeated clipping can create one long internal edge opposite several
        // shorter edges. Material on both sides identifies it as an internal
        // physics partition even when endpoint-based cancellation cannot.
        if (filledAt(add(midpoint,mul(edgeNormal,probeDistance))) &&
            filledAt(sub(midpoint,mul(edgeNormal,probeDistance)))) continue;
        visibleSeamlessEdges.push(edge);
        ctx.moveTo(edge.a.x,edge.a.y);
        ctx.lineTo(edge.b.x,edge.b.y);
      }
      ctx.stroke();
    }

    ctx.globalAlpha=.18*bodyAlpha;
    ctx.strokeStyle="white";
    ctx.lineWidth=3;
    if (!seamless) {
      for (const vertices of polygons) {
        ctx.beginPath();
        ctx.moveTo(vertices[0].x,vertices[0].y);
        for (let i=1;i<Math.min(3,vertices.length);i++) ctx.lineTo(vertices[i].x,vertices[i].y);
        ctx.stroke();
      }
    }

    if (weldSelection.has(body) || selectedBodies.has(body)) {
      ctx.globalAlpha=bodyAlpha;
      ctx.setLineDash([6,4]);
      ctx.strokeStyle=selectedBodies.has(body) ? "#3270b8" : "#000";
      ctx.lineWidth=4;
      if (seamless) {
        ctx.beginPath();
        for (const edge of visibleSeamlessEdges) {
          ctx.moveTo(edge.a.x,edge.a.y);
          ctx.lineTo(edge.b.x,edge.b.y);
        }
        ctx.stroke();
      } else {
        for (const vertices of polygons) {
          ctx.beginPath(); ctx.moveTo(vertices[0].x,vertices[0].y);
          for (let i=1;i<vertices.length;i++) ctx.lineTo(vertices[i].x,vertices[i].y);
          ctx.closePath(); ctx.stroke();
        }
      }
    }
    ctx.restore();

    if (!body.textureRemoved) {
      drawMemeDetails(ctx,body);
      if (body.partStyles) {
        body.partStyles.forEach((style,index)=>{
          if (!style) return;
          drawMaterialDetails(ctx,{shapeType:style.shapeType,verts:body.polygons[index],pos:body.pos,angle:body.angle});
        });
      } else {
        drawMaterialDetails(ctx,body);
      }
      drawExplosiveDetails(ctx,body);
      drawSawDetails(ctx,body);
      drawWeaponDetails(ctx,body);
      drawConveyorDetails(ctx,body);
      drawRagdollDetails(ctx,body);
      drawFoodDetails(ctx,body);
    }
    drawBodyEffects(ctx,body);
  }

  function drawSliceLine() {
    if (!sliceStart || !pointer.down) return;

    ctx.save();

    ctx.lineCap = "round";
    ctx.strokeStyle = "#f7efe1";
    ctx.shadowColor = "#f7efe1";
    ctx.shadowBlur = 6;

    ctx.moveTo(sliceStart.x,sliceStart.y);

  function drawScissorCuts() {
    ctx.save();
    ctx.lineCap="round";
    ctx.lineJoin="round";
    for (const body of bodies) {
      if (!body.scissorCuts?.length) continue;
      ctx.strokeStyle="rgba(35,24,22,.92)";
      ctx.lineWidth=3;
      for (const cut of body.scissorCuts) {
        const a=add(body.pos,rotate(cut.a,body.angle));
        const b=add(body.pos,rotate(cut.b,body.angle));
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
      ctx.strokeStyle="rgba(255,255,255,.42)";
      ctx.lineWidth=.8;
      for (const cut of body.scissorCuts) {
        const a=add(body.pos,rotate(cut.a,body.angle));
        const b=add(body.pos,rotate(cut.b,body.angle));
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
      }
    }
    ctx.restore();
  }

  function drawScissorLine() {
    if (!scissorStart || !pointer.down || mode!=="scissors") return;

  function drawSpawnDraft() {

    } else if (selectedSpawnType==="rectangle" || selectedSpawnType==="deformablerectangle" || MATERIAL_SAMPLE_TYPES.has(selectedSpawnType)) {
      const x=Math.min(drawSpawnStart.x,pointer.x), y=Math.min(drawSpawnStart.y,pointer.y);
      const w=Math.abs(pointer.x-drawSpawnStart.x), h=Math.abs(pointer.y-drawSpawnStart.y);
      ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h);

  function drawWeldDraft() {
    if (!weldDraftParts.length) return;
    ctx.save();
    ctx.fillStyle=weldDraftColor || "#777";
    ctx.strokeStyle="#34302c";
    ctx.lineWidth=2;
    ctx.setLineDash([6,4]);
    for (const vertices of weldDraftParts) {
      ctx.beginPath();
      ctx.moveTo(vertices[0].x,vertices[0].y);
      for (let i=1;i<vertices.length;i++) ctx.lineTo(vertices[i].x,vertices[i].y);

  function drawGrabJoint() {
    if (!heldBody || !heldLocalPoint) return;
    const grabPoint=add(heldBody.pos,rotate(heldLocalPoint,heldBody.angle));

    ctx.strokeStyle="rgba(0,0,0,.38)";

    ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(grabPoint.x,grabPoint.y);
    ctx.lineTo(pointer.x,pointer.y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.arc(grabPoint.x,grabPoint.y,4,0,Math.PI*2);

    ctx.stroke();

  function drawExplosions() {
    ctx.save();
    for (const explosion of explosions) {
      const progress=clamp(explosion.age/.45,0,1);
      const radius=explosion.radius*(.12+.88*progress);
      ctx.globalAlpha=(1-progress)*.7;
      ctx.strokeStyle=progress<.45 ? "#f09a38" : "#4b4038";
      ctx.lineWidth=Math.max(2,12*(1-progress));
      ctx.beginPath(); ctx.arc(explosion.x,explosion.y,radius,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  function drawLaserBeams() {
    ctx.save();
    ctx.lineCap="round";
    for (const laser of bodies.filter(body=>body.shapeType==="laser")) {
      const {start,end}=laserSegment(laser);
      ctx.strokeStyle="rgba(225,48,42,.22)"; ctx.lineWidth=9;
      ctx.beginPath(); ctx.moveTo(start.x,start.y); ctx.lineTo(end.x,end.y); ctx.stroke();
      ctx.strokeStyle="#ed3c34"; ctx.lineWidth=2.2;
      ctx.beginPath(); ctx.moveTo(start.x,start.y); ctx.lineTo(end.x,end.y); ctx.stroke();
    }
    ctx.restore();
  }

  function drawConstraints() {
    if (!constraintsVisible) return;
    ctx.save();
    ctx.strokeStyle="#292725";
    ctx.fillStyle="#fff";
    ctx.lineWidth=2;
    for (const body of bodies) {
      if (!body.unbreakable) continue;
      const marker={x:body.pos.x,y:body.pos.y-body.radius-9};
      ctx.fillStyle="#f2c94c";
      ctx.strokeStyle="#292725";
      ctx.beginPath();
      ctx.arc(marker.x,marker.y,8,0,Math.PI*2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle="#292725";
      ctx.font="bold 12px system-ui, sans-serif";
      ctx.textAlign="center";
      ctx.textBaseline="middle";
      ctx.fillText("∞",marker.x,marker.y-.5);
    }
    ctx.fillStyle="#fff";
    for (const constraint of constraints) {
      const loadRatio=constraint.strength===Infinity
        ? 0
        : clamp((constraint.load||0)/Math.max(constraint.strength||1200,1),0,1);
      ctx.strokeStyle=loadRatio>.7 ? `rgb(${Math.round(60+160*loadRatio)},45,40)` : "#292725";
      const a=constraintAnchor(constraint,"a");
      const b=constraintAnchor(constraint,"b");
      const delta=sub(b,a);
      const distance=Math.max(1,length(delta));
      const tangent=mul(delta,1/distance);
      const normal=perpendicular(tangent);
      if (constraint.kind==="spring") {
        ctx.beginPath(); ctx.moveTo(a.x,a.y);
        const coils=9;
        for (let i=1;i<coils;i++) {
          const point=add(a,mul(delta,i/coils));
          const offset=i%2 ? 6 : -6;
          const zig=add(point,mul(normal,offset));
          ctx.lineTo(zig.x,zig.y);
        }
        ctx.lineTo(b.x,b.y); ctx.stroke();
      } else if (constraint.kind==="chain") {
        const links=clamp(Math.round(distance/16),2,28);
        for (let i=0;i<=links;i++) {
          const point=add(a,mul(delta,i/links));
          ctx.beginPath();
          ctx.ellipse(point.x,point.y,6,3,Math.atan2(delta.y,delta.x)+(i%2?Math.PI/2:0),0,Math.PI*2);
          ctx.stroke();
        }
      } else if (constraint.kind==="rope") {
        ctx.setLineDash([5,4]);
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
        ctx.setLineDash([]);
      }
      if (constraint.kind==="sticky") {
        const bond=mul(add(a,b),.5);
        ctx.fillStyle="#b26cc7";
        ctx.beginPath(); ctx.arc(bond.x,bond.y,5,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle="#fff";
      } else if (constraint.kind==="hinge" || constraint.kind==="motor") {
        const pin=mul(add(a,b),.5);
        ctx.beginPath(); ctx.arc(pin.x,pin.y,6,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(pin.x,pin.y,2,0,Math.PI*2); ctx.fillStyle="#222"; ctx.fill(); ctx.fillStyle="#fff";
        if (constraint.kind==="motor") {
          const direction=Math.sign(constraint.motorSpeed||1);
          ctx.beginPath(); ctx.arc(pin.x,pin.y,11,direction>0 ? -.8 : .8,direction>0 ? 3.8 : -3.8,direction<0); ctx.stroke();
        }
      } else {
        for (const point of [a,b]) {
          ctx.beginPath(); ctx.arc(point.x,point.y,3.5,0,Math.PI*2); ctx.fill(); ctx.stroke();
        }
      }
    }
    ctx.restore();
  }

  function drawBuildDraft() {
    if (!constraintsVisible || !buildStart || !pointer.down || mode!=="build") return;
    ctx.save();
    ctx.setLineDash([7,5]);
    ctx.strokeStyle="#111";

  function drawSelectionOverlay() {
    if (mode!=="select" || !selectionStart || !selectionCurrent) return;
    const left=Math.min(selectionStart.x,selectionCurrent.x);
    const top=Math.min(selectionStart.y,selectionCurrent.y);
    const width=Math.abs(selectionCurrent.x-selectionStart.x);
    const height=Math.abs(selectionCurrent.y-selectionStart.y);
    ctx.save();
    ctx.fillStyle="rgba(50,112,184,.10)";
    ctx.strokeStyle="#3270b8";
    ctx.lineWidth=1.5;
    ctx.setLineDash([6,4]);
    ctx.fillRect(left,top,width,height);
    ctx.strokeRect(left,top,width,height);

  function pointerPosition(event) {
    const rect = canvas.getBoundingClientRect();
    return {
      x:event.clientX-rect.left,
      y:event.clientY-rect.top
    };
  }

  function recordMouseTrail(event) {
    const samples=typeof event.getCoalescedEvents==="function"
      ? event.getCoalescedEvents()
      : [event];
    const source=samples.length ? samples : [event];
    for (const sample of source) {
      const p=pointerPosition(sample);
      const time=Number.isFinite(sample.timeStamp) ? sample.timeStamp : performance.now();
      const last=mouseTrail[mouseTrail.length-1];
      if (!last || time>last.time || length(sub(p,last))>.05) {
        mouseTrail.push({...p,time});
      }
    }
    const newest=mouseTrail[mouseTrail.length-1]?.time || 0;
    while (mouseTrail.length>32 || (mouseTrail.length>2 && newest-mouseTrail[0].time>220)) {
      mouseTrail.shift();
    }
  }

  function estimateReleaseVelocity(samples,referenceTime=performance.now()) {
    if (samples.length<2) return null;
    let motionEnd=-1;
    for (let i=samples.length-1;i>0;i--) {
      if (length(sub(samples[i],samples[i-1]))>.35) {
        motionEnd=i;
        break;
      }
    }
    if (motionEnd<1) return null;

    const endTime=samples[motionEnd].time;
    if (referenceTime-endTime>160) return null;
    let velocity={x:0,y:0};
    let totalWeight=0;
    for (let i=1;i<=motionEnd;i++) {
      const current=samples[i];
      const previous=samples[i-1];
      const dt=(current.time-previous.time)/1000;
      const delta=sub(current,previous);
      const distance=length(delta);
      const age=endTime-current.time;
      if (dt<=.001 || dt>.12 || distance<.1 || age>150) continue;

      let segmentVelocity=mul(delta,1/dt);
      const segmentSpeed=length(segmentVelocity);
      if (segmentSpeed>2400) segmentVelocity=mul(segmentVelocity,2400/segmentSpeed);
      const weight=Math.exp(-age/55)*clamp(distance/3,.3,3);
      velocity=add(velocity,mul(segmentVelocity,weight));
      totalWeight+=weight;
    }
    return totalWeight>0 ? mul(velocity,1/totalWeight) : null;
  }
  const spawnables = [
    {id:"random",name:"random shape",tag:"mix"},
    {id:"box",name:"box",tag:"basic"},
    {id:"line",name:"drag line",tag:"draw"},
    {id:"rectangle",name:"drag rectangle",tag:"draw"},
    {id:"compound",name:"welded parts (paused only)",tag:"draw"},

  function previewPoints(type) {
    const cx=50, cy=30, r=22;
    if (type==="random") return regularPolygon(cx,cy,r,5,-Math.PI/2);
    if (type==="box") return [{x:25,y:12},{x:75,y:12},{x:75,y:48},{x:25,y:48}];
    if (type==="line") return [{x:15,y:25},{x:85,y:25},{x:85,y:35},{x:15,y:35}];
    if (type==="rectangle") return [{x:20,y:14},{x:80,y:14},{x:80,y:46},{x:20,y:46}];
    if (type==="deformableline") return [{x:12,y:24},{x:88,y:24},{x:88,y:36},{x:12,y:36}];
    if (type==="deformablerectangle") return [{x:18,y:12},{x:82,y:12},{x:82,y:48},{x:18,y:48}];
    if (type==="compound") return [{x:16,y:24},{x:44,y:24},{x:44,y:10},{x:56,y:10},{x:56,y:24},{x:84,y:24},{x:84,y:36},{x:56,y:36},{x:56,y:50},{x:44,y:50},{x:44,y:36},{x:16,y:36}];
    if (MATERIAL_SAMPLE_TYPES.has(type)) return [{x:16,y:15},{x:84,y:15},{x:84,y:45},{x:16,y:45}];
    if (type==="triangle") return regularPolygon(cx,cy,r,3,-Math.PI/2);
    if (type==="pentagon") return regularPolygon(cx,cy,r,5,-Math.PI/2);
    if (type==="hexagon") return regularPolygon(cx,cy,r,6,0);
    if (type==="octagon") return regularPolygon(cx,cy,r,8,Math.PI/8);
    if (type==="circle") return regularPolygon(cx,cy,r,24,0);
    if (type==="ragdoll") return [
      {x:43,y:7},{x:57,y:7},{x:62,y:13},{x:62,y:22},
      {x:84,y:31},{x:80,y:39},{x:61,y:31},{x:58,y:45},
      {x:68,y:57},{x:59,y:59},{x:50,y:47},{x:41,y:59},
      {x:32,y:57},{x:42,y:45},{x:39,y:31},{x:20,y:39},
      {x:16,y:31},{x:38,y:22},{x:38,y:13}
    ];

    const oldSize = ui.sizeSlider.value;
    ui.sizeSlider.value = 22;
    const before = bodies.length;
    spawn(cx,cy,type);
    const body = bodies.pop();
    ui.sizeSlider.value = oldSize;
    if (!body || bodies.length !== before) return regularPolygon(cx,cy,r,4,0);
    return getWorldVertices(body);
  }

  function drawPreview(canvas,type) {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cssWidth = Math.max(90, Math.round(canvas.clientWidth || 120));
    const cssHeight = Math.max(52, Math.round(canvas.clientHeight || cssWidth * 9 / 16));

    canvas.width = Math.round(cssWidth * dpr);
    canvas.height = Math.round(cssHeight * dpr);

    const preview = canvas.getContext("2d");
    preview.setTransform(dpr,0,0,dpr,0,0);
    preview.clearRect(0,0,cssWidth,cssHeight);
    preview.fillStyle="#f7f7f7";
    preview.fillRect(0,0,cssWidth,cssHeight);

    const points = previewPoints(type);
    let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;

    for (const point of points) {
      minX=Math.min(minX,point.x);
      maxX=Math.max(maxX,point.x);
      minY=Math.min(minY,point.y);
      maxY=Math.max(maxY,point.y);
    }

    const padding = 8;
    const availableWidth = Math.max(1, cssWidth - padding*2);
    const availableHeight = Math.max(1, cssHeight - padding*2);
    const shapeWidth = Math.max(1, maxX-minX);
    const shapeHeight = Math.max(1, maxY-minY);
    const scale = Math.min(availableWidth/shapeWidth, availableHeight/shapeHeight);

    const centerX=(minX+maxX)*.5;
    const centerY=(minY+maxY)*.5;
    const offsetX=cssWidth*.5-centerX*scale;
    const offsetY=cssHeight*.5-centerY*scale;

    preview.beginPath();
    preview.moveTo(points[0].x*scale+offsetX,points[0].y*scale+offsetY);

    for (let i=1;i<points.length;i++) {
      preview.lineTo(points[i].x*scale+offsetX,points[i].y*scale+offsetY);
    }

    preview.closePath();
    preview.fillStyle = MATERIAL_SAMPLE_COLORS[type] || FOOD_COLORS[type] ||
      (type==="deformableline" ? "#738390" : type==="deformablerectangle" ? "#87949d" : type==="random" ? "#8a8a8a" : "#d7bd53");
    preview.fill();
    preview.lineWidth=1.5;
    preview.strokeStyle="#111";
    preview.stroke();

    if (["tungtung","tralalero","bombardino","capybara","doge","cheems","shrekhead","toilet","banana","amongus","creeper","human","enderman","astronaut","ninja","knight"].includes(type)) {
      const localVerts = points.map(p=>({
        x:(p.x*scale+offsetX)-cssWidth*.5,
        y:(p.y*scale+offsetY)-cssHeight*.5
      }));
      drawMemeDetails(preview,{
        shapeType:type,
        verts:localVerts,
        pos:{x:cssWidth*.5,y:cssHeight*.5},
        angle:0
      });
    }
    if (FOOD_TYPES.has(type)) {
      const localVerts=points.map(point=>({
        x:(point.x*scale+offsetX)-cssWidth*.5,
        y:(point.y*scale+offsetY)-cssHeight*.5
      }));
      drawFoodDetails(preview,{
        shapeType:type,
        verts:localVerts,
        pos:{x:cssWidth*.5,y:cssHeight*.5},
        angle:0
      });
    }
    if (MATERIAL_SAMPLE_TYPES.has(type)) {
      const localVerts=points.map(point=>({
        x:(point.x*scale+offsetX)-cssWidth*.5,
        y:(point.y*scale+offsetY)-cssHeight*.5
      }));
      drawMaterialDetails(preview,{
        shapeType:type,
        verts:localVerts,
        pos:{x:cssWidth*.5,y:cssHeight*.5},
        angle:0
      });
    }
    if (["explosive","saw","laser","gun","bullet","conveyor"].includes(type)) {
      const localVerts=points.map(point=>({
        x:(point.x*scale+offsetX)-cssWidth*.5,
        y:(point.y*scale+offsetY)-cssHeight*.5
      }));
      const previewBody={
        shapeType:type,
        verts:localVerts,
        pos:{x:cssWidth*.5,y:cssHeight*.5},
        angle:0,
        fuse:null
      };
      if (type==="explosive") drawExplosiveDetails(preview,previewBody);
      else if (type==="saw") drawSawDetails(preview,previewBody);
      else if (type==="conveyor") drawConveyorDetails(preview,previewBody);
      else drawWeaponDetails(preview,previewBody);
    }
  }

  function renderCategoryFilters() {
    const currentScroll = ui.categoryFilters.scrollLeft;
    const available=[...new Set(spawnables.map(item=>item.tag))];
    const preferred=["all","basic","draw","material","deformable","food","special"];
    const categories=[...preferred.filter(category=>category==="all" || available.includes(category)),
      ...available.filter(category=>!preferred.includes(category))];
    ui.spawnSearch.placeholder="search all categories...";

    ui.categoryFilters.innerHTML = "";

    for (const category of categories) {
      const button = document.createElement("button");
      button.className = "category-filter" + (category===selectedSpawnCategory ? " active" : "");
      button.textContent = category;

      button.onclick = () => {
        selectedSpawnCategory = category;
        renderCategoryFilters();
        renderSpawnOptions(ui.spawnSearch.value, true);
      };

      ui.categoryFilters.appendChild(button);
    }

    ui.categoryFilters.scrollLeft = currentScroll;
  }

  function renderSpawnOptions(query="", preserveScroll=false) {
    const oldScrollTop = preserveScroll ? ui.spawnOptions.scrollTop : 0;
    const cleaned = query.trim().toLowerCase();

    // An active text query intentionally searches every category. Category
    // filtering resumes as soon as the search box is cleared.
    const categorySpawnables=!cleaned && selectedSpawnCategory!=="all"
      ? spawnables.filter(item=>item.tag===selectedSpawnCategory)
      : spawnables;
    const matches=categorySpawnables.filter(item=>
      !cleaned || item.name.includes(cleaned) || item.tag.includes(cleaned) || item.id.includes(cleaned)
    );

    ui.spawnOptions.innerHTML = "";

    for (const item of matches) {
      const button = document.createElement("button");
      button.className = "spawn-option" + (item.id===selectedSpawnType ? " selected" : "");

      const preview = document.createElement("canvas");
      preview.className = "spawn-preview";
      preview.dataset.shapeType = item.id;
      preview.width = 120;
      preview.height = 68;

      const name = document.createElement("span");
      name.className = "spawn-option-name";
      name.textContent = item.name;
      name.title = item.name;
      button.title = item.name;

      const tag = document.createElement("small");
      tag.textContent = item.tag;

      button.append(preview,name,tag);

      button.onclick = () => {
        const savedScroll = ui.spawnOptions.scrollTop;
        selectedSpawnType = item.id;
        ui.selectedSpawn.textContent = "selected: " + item.name;
        setMode(mode);
        renderSpawnOptions(ui.spawnSearch.value, true);

        requestAnimationFrame(() => {
          ui.spawnOptions.scrollTop = savedScroll;
        });
      };

      ui.spawnOptions.appendChild(button);
      drawPreview(preview,item.id);
    }

    if (!matches.length) {
      const empty = document.createElement("div");
      empty.style.padding = "9px";
      empty.style.fontSize = "11px";
      empty.textContent = "nothing found";
      ui.spawnOptions.appendChild(empty);
    }

    if (preserveScroll) {
      requestAnimationFrame(() => {
        ui.spawnOptions.scrollTop = oldScrollTop;
      });
    }
  }

  function segmentPolygon(start,end,thickness) {
    const delta=sub(end,start);
    if (length(delta)<8) return null;
    const n=mul(perpendicular(normalize(delta)),thickness*.5);
    return [add(start,n),add(end,n),sub(end,n),sub(start,n)];
  }

  function deformableSegmentPolygon(start,end,thickness) {
    const delta=sub(end,start);
    const segmentLength=length(delta);
    if (segmentLength<8) return null;
    const segments=clamp(Math.ceil(segmentLength/22),4,18);
    const n=mul(perpendicular(normalize(delta)),thickness*.5);
    const vertices=[];
    for (let i=0;i<=segments;i++) vertices.push(add(add(start,mul(delta,i/segments)),n));
    for (let i=segments;i>=0;i--) vertices.push(sub(add(start,mul(delta,i/segments)),n));
    return vertices;
  }

  function deformableRectanglePolygon(start,end) {
    const left=Math.min(start.x,end.x), right=Math.max(start.x,end.x);
    const top=Math.min(start.y,end.y), bottom=Math.max(start.y,end.y);
    if (right-left<8 || bottom-top<8) return null;
    const horizontal=clamp(Math.ceil((right-left)/24),2,14);
    const vertical=clamp(Math.ceil((bottom-top)/24),2,14);
    const vertices=[];
    for (let i=0;i<horizontal;i++) vertices.push({x:left+(right-left)*i/horizontal,y:top});
    for (let i=0;i<vertical;i++) vertices.push({x:right,y:top+(bottom-top)*i/vertical});
    for (let i=0;i<horizontal;i++) vertices.push({x:right-(right-left)*i/horizontal,y:bottom});
    for (let i=0;i<vertical;i++) vertices.push({x:left,y:bottom-(bottom-top)*i/vertical});
    return vertices;
  }

    for (const body of [...selectedBodies]) if (!bodies.includes(body)) selectedBodies.delete(body);
