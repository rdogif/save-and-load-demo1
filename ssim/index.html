<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rishaan's Slicing Test - Physics Overhaul</title>
<style>
  :root {
    --panel: #fff;
    --panel-dark: #000;
    --ink: #000;
    --accent: #000;
    --accent-dark: #000;
    --line: #aaa397;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #fff;
    font-family: "Trebuchet MS", Arial, sans-serif;
    color: var(--ink);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  #toolbar {
    position: fixed;
    left: 14px;
    top: 14px;
    width: 230px;
    background: var(--panel);
    border: 1px solid var(--panel-dark);
    padding: 10px;
    user-select: none;
    min-width: 190px;
    min-height: 180px;
    max-width: calc(100vw - 8px);
    max-height: calc(100vh - 8px);
    resize: both;
    overflow: auto;
  }

  #toolbarHeader { cursor: move; touch-action: none; }

  h1 {
    margin: 0 0 3px;
    font-family: Arial, sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0;
  }

  .subtitle {
    font-size: 10px;
    color: #555;
    border-bottom: 1px solid #000;
    padding-bottom: 7px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }

  button, select {
    font: inherit;
    font-size: 12px;
    border: 1px solid #000;
    background: #fff;
    color: #000;
    padding: 7px 8px;
    cursor: pointer;
    border-radius: 0;
  }

  button:hover, select:hover { background: #eee; }

  button.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent-dark);
  }

  button:active { transform: translate(1px, 1px); }
  button:disabled { opacity: .42; cursor: not-allowed; transform: none; }

  select { width: 100%; margin-top: 7px; }

  label {
    display: flex;
    justify-content: space-between;
    margin-top: 9px;
    font-size: 11px;
    color: #45413b;
  }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 9px;
  }

  .wide { grid-column: span 2; }

  #buildControls {
    display: none;
    grid-template-columns: 1fr;
    gap: 6px;
    margin-top: 7px;
    padding-top: 7px;
    border-top: 1px solid #000;
  }

  #buildControls.visible { display: grid; }
  #buildControls select { margin: 0; }
  #buildStatus { font: 10px Consolas, monospace; line-height: 1.25; }

  #selectionControls {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 7px;
    padding-top: 7px;
    border-top: 1px solid #000;
  }

  #selectionControls.visible { display: grid; }
  #selectionStatus { grid-column: span 2; font: 10px Consolas, monospace; }
  #objectInspector {
    display: none;
    grid-column: span 2;
    border-top: 1px solid #aaa;
    padding-top: 4px;
  }
  #objectInspector.visible { display: block; }
  #objectInspector select, #objectInspector input[type="color"] { width: 100%; margin-top: 3px; }
  #objectInspector input[type="color"] { height: 28px; padding: 2px; border: 1px solid #000; }
  .inspector-special { display: none; }
  .inspector-special.visible { display: block; }

  #stats {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
    font-family: Consolas, monospace;
    font-size: 11px;
  }

  #help {
    position: fixed;
    bottom: 12px;
    right: 14px;
    max-width: 310px;
    color: rgba(255,255,255,.9);
    font-size: 12px;
    text-shadow: 0 1px 2px rgba(0,0,0,.8);
    text-align: right;
    pointer-events: none;
    transition: opacity .8s ease;
  }

  #help.hidden {
    opacity: 0;
  }

  .spawn-browser {
    margin-top: 8px;
    border: 1px solid #111;
    background: #fff;
  }

  .spawn-browser input {
    width: 100%;
    border: 0;
    border-bottom: 1px solid #111;
    padding: 7px 8px;
    font: inherit;
    font-size: 12px;
    outline: none;
    background: #fff;
    color: #000;
  }

  .spawn-option:last-child {
    border-bottom: 0;
  }


  #spawnPanel {
    position: fixed;
    top: 14px;
    left: calc(100vw - 334px);
    right: auto;
    width: 320px;
    height: 560px;
    min-width: 240px;
    min-height: 300px;
    max-width: calc(100vw - 28px);
    max-height: calc(100vh - 28px);
    display: none;
    flex-direction: column;
    background: #fff;
    border: 1px solid #000;
    resize: both;
    bottom: auto;
    overflow: hidden;
    z-index: 20;
  }

  #spawnPanel.visible {
    display: flex;
  }

  #spawnPanelHeader {
    flex: 0 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 8px;
    background: #000;
    color: #fff;
    cursor: move;
    font-family: Consolas, monospace;
    font-size: 12px;
    user-select: none;
  }

  #spawnPanelHeader span:last-child {
    opacity: .65;
    font-size: 10px;
  }

  #spawnPanelBody {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  #spawnSearch {
    flex: 0 0 auto;
    width: calc(100% - 16px);
    margin: 8px;
    border: 1px solid #000;
    padding: 7px 8px;
    font: inherit;
    font-size: 12px;
    outline: none;
    background: #fff;
    color: #000;
  }


  #categoryFilters {
    flex: 0 0 auto;
    display: flex;
    gap: 5px;
    padding: 0 8px 8px;
    overflow-x: auto;
    scrollbar-width: thin;
  }

  .category-filter {
    flex: 0 0 auto;
    padding: 4px 7px;
    border: 1px solid #000;
    background: #fff;
    color: #000;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: .35px;
  }

  .category-filter.active {
    background: #000;
    color: #fff;
  }

  #spawnSettings {
    flex: 0 0 auto;
    padding: 0 8px 8px;
    border-bottom: 1px solid #000;
  }

  #spawnSettings label {
    margin-top: 0;
  }

  #spawnSettings input[type="range"] {
    display: block;
    width: 100%;
  }

  .spawn-size-note {
    margin-top: 2px;
    font-family: Consolas, monospace;
    font-size: 9px;
    opacity: .55;
  }

  #spawnOptions {
    flex: 1;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
    align-content: start;
    gap: 6px;
    padding: 8px;
    overflow-y: auto;
  }

  .spawn-option {
    height: 134px;
    min-height: 134px;
    display: grid;
    grid-template-rows: 68px minmax(2.5em, auto) auto;
    align-content: start;
    gap: 6px;
    border: 1px solid #000;
    padding: 5px;
    background: #fff;
    color: #000;
    text-align: left;
    font-size: 11px;
    overflow: hidden;
  }

  .spawn-option:hover {
    background: #eee;
  }

  .spawn-option.selected {
    background: #000;
    color: #fff;
  }

  .spawn-option:active {
    transform: none;
  }

  .spawn-preview {
    width: 100%;
    height: 68px;
    display: block;
    background: #f7f7f7;
    border: 1px solid currentColor;
  }

  .spawn-option-name {
    display: block;
    min-height: 2.5em;
    line-height: 1.25;
    white-space: normal;
    overflow-wrap: anywhere;
    color: inherit;
    font-weight: 600;
    position: relative;
    z-index: 1;
  }

  .spawn-option small {
    opacity: .6;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: .35px;
  }

  #selectedSpawn {
    flex: 0 0 auto;
    padding: 7px 9px;
    white-space: normal;
    overflow-wrap: anywhere;
    border-top: 1px solid #000;
    background: #fff;
    font-family: Consolas, monospace;
    font-size: 10px;
  }

  @media (max-width: 600px) {
    #toolbar { width: 205px; transform: scale(.9); transform-origin: top left; }
    #help { display: none; }
  }
</style>
</head>
<body>
<canvas id="world"></canvas>


<section id="toolbar">
  <div id="toolbarHeader" title="Drag to move · resize from the bottom-right corner">
    <h1>Rishaan's Slicing Test</h1>
    <div class="subtitle">little physics sandbox · drag / resize</div>
  </div>

  <div class="mode-grid">
    <button data-mode="slice" class="active">Slice</button>
    <button data-mode="scissors">Scissors</button>
    <button data-mode="drag">Grab</button>
    <button data-mode="spawn">Spawn</button>
    <button data-mode="delete">Delete</button>
    <button data-mode="select">Select</button>
    <button data-mode="build">Constraints</button>
  </div>

  <div id="buildControls">
    <select id="buildTool" aria-label="Constraint tool">
      <option value="hinge">hinge / pin</option>
      <option value="motor">motor hinge</option>
      <option value="rope">rope</option>
      <option value="spring">spring</option>
      <option value="chain">chain</option>
      <option value="anchor">static anchor</option>
      <option value="unbreakable">unbreakable object</option>
      <option value="weld">weld materials</option>
    </select>
    <label id="constraintStrengthLabel"><span>break strength</span><span id="constraintStrengthValue">2,075</span></label>
    <input id="constraintStrength" type="range" min="0" max="100" step="1" value="35"
      aria-label="Constraint break strength">
    <label id="motorSpeedLabel"><span>motor speed</span><span id="motorSpeedValue">2.5</span></label>
    <input id="motorSpeed" type="range" min="-8" max="8" step="0.5" value="2.5">
    <button id="toggleConstraints" type="button" aria-pressed="false">Hide constraint labels</button>
    <button id="finishWeld" type="button">Weld selected</button>
    <div id="buildStatus">Pause, then drag between objects.</div>
  </div>

  <div id="selectionControls">
    <button id="cloneSelection" type="button">Clone</button>
    <button id="deleteSelection" type="button">Delete</button>
    <button id="weldSelectionButton" type="button">Weld</button>
    <button id="clearSelection" type="button">Clear</button>
    <div id="selectionStatus">Drag a box around objects.</div>
    <div id="objectInspector">
      <label><span>material</span><span>preset</span></label>
      <select id="inspectMaterial">
        <option value="custom">custom / current</option>
        <option value="wood">wood</option><option value="metal">metal</option>
        <option value="glass">glass</option><option value="rubber">rubber</option>
        <option value="stone">stone</option><option value="ceramic">ceramic</option>
        <option value="soft">soft</option><option value="light">light</option>
        <option value="sticky">sticky</option>
      </select>
      <label><span>mass</span><span id="inspectMassValue">1</span></label>
      <input id="inspectMass" type="range" min="0.05" max="12" step="0.05" value="1">
      <label><span>gravity</span><span id="inspectGravityValue">1</span></label>
      <input id="inspectGravity" type="range" min="0" max="3" step="0.05" value="1">
      <label><span>friction</span><span id="inspectFrictionValue">0.5</span></label>
      <input id="inspectFriction" type="range" min="0" max="1.5" step="0.05" value="0.5">
      <label><span>bounce</span><span id="inspectBounceValue">0.2</span></label>
      <input id="inspectBounce" type="range" min="0" max="1" step="0.02" value="0.2">
      <label><span>durability</span><span id="inspectDurabilityValue">1000</span></label>
      <input id="inspectDurability" type="range" min="100" max="5000" step="50" value="1000">
      <label><span>color</span><span>visual</span></label>
      <input id="inspectColor" type="color" value="#808080">
      <div id="conveyorInspector" class="inspector-special">
        <label><span>belt speed</span><span id="inspectConveyorValue">180</span></label>
        <input id="inspectConveyor" type="range" min="-500" max="500" step="10" value="180">
      </div>
      <div id="explosiveInspector" class="inspector-special">
        <label><span>blast radius</span><span id="inspectBlastRadiusValue">200</span></label>
        <input id="inspectBlastRadius" type="range" min="60" max="600" step="10" value="200">
        <label><span>blast force</span><span id="inspectBlastForceValue">760</span></label>
        <input id="inspectBlastForce" type="range" min="100" max="2000" step="25" value="760">
        <label><span>impact fuse</span><span id="inspectFuseValue">0.08s</span></label>
        <input id="inspectFuse" type="range" min="0" max="5" step="0.05" value="0.08">
        <button id="detonateSelected" type="button" class="wide">Detonate now</button>
      </div>
    </div>
  </div>

  <div class="actions">
    <button id="undo" type="button" title="Ctrl+Z">Undo</button>
    <button id="redo" type="button" title="Ctrl+Y">Redo</button>
    <button id="spawnTen">drop 10</button>
    <button id="reset">reset</button>
    <button id="pause" type="button" aria-pressed="false">Pause</button>
    <button id="slow" type="button" aria-pressed="false" title="S">slow motion</button>
    <button id="impact" class="wide" type="button" aria-pressed="false" title="I">Impact: off</button>
    <button id="fireGuns" class="wide" type="button" title="F" style="display:none">Fire guns</button>
  </div>
</section>




<section id="spawnPanel">
  <div id="spawnPanelHeader">
    <span>SPAWNABLES</span>
    <span>drag</span>
  </div>

  <div id="spawnPanelBody">
    <input id="spawnSearch" type="text" placeholder="search...">

    <div id="categoryFilters" aria-label="Spawnable categories"></div>

    <div id="spawnSettings">
      <label><span>spawn size</span><span id="sizeValue">Random</span></label>
      <input id="sizeSlider" type="range" min="0" max="120" value="0">
      <div class="spawn-size-note">0 = random size</div>
    </div>

    <div id="spawnOptions"></div>
  </div>

  <div id="selectedSpawn">selected: random shape</div>
</section>


<div id="help">
  drag to slice · grab and throw · right-click to spawn · Space pause · S slow · I impact · R reset
</div>

<script>
(() => {
  const canvas = document.getElementById("world");
  const ctx = canvas.getContext("2d");

  const ui = {
    toolbar: document.getElementById("toolbar"),
    toolbarHeader: document.getElementById("toolbarHeader"),
    spawnPanel: document.getElementById("spawnPanel"),
    spawnPanelHeader: document.getElementById("spawnPanelHeader"),
    spawnSearch: document.getElementById("spawnSearch"),
    categoryFilters: document.getElementById("categoryFilters"),
    spawnOptions: document.getElementById("spawnOptions"),
    selectedSpawn: document.getElementById("selectedSpawn"),
    sizeSlider: document.getElementById("sizeSlider"),
    sizeValue: document.getElementById("sizeValue"),
    pause: document.getElementById("pause"),
    slow: document.getElementById("slow"),
    impact: document.getElementById("impact"),
    buildControls: document.getElementById("buildControls"),
    buildTool: document.getElementById("buildTool"),
    finishWeld: document.getElementById("finishWeld"),
    constraintStrength: document.getElementById("constraintStrength"),
    constraintStrengthValue: document.getElementById("constraintStrengthValue"),
    constraintStrengthLabel: document.getElementById("constraintStrengthLabel"),
    motorSpeed: document.getElementById("motorSpeed"),
    motorSpeedValue: document.getElementById("motorSpeedValue"),
    motorSpeedLabel: document.getElementById("motorSpeedLabel"),
    toggleConstraints: document.getElementById("toggleConstraints"),
    buildStatus: document.getElementById("buildStatus"),
    selectionControls: document.getElementById("selectionControls"),
    selectionStatus: document.getElementById("selectionStatus"),
    cloneSelection: document.getElementById("cloneSelection"),
    deleteSelection: document.getElementById("deleteSelection"),
    weldSelectionButton: document.getElementById("weldSelectionButton"),
    clearSelection: document.getElementById("clearSelection"),
    objectInspector: document.getElementById("objectInspector"),
    inspectMaterial: document.getElementById("inspectMaterial"),
    inspectMass: document.getElementById("inspectMass"),
    inspectMassValue: document.getElementById("inspectMassValue"),
    inspectGravity: document.getElementById("inspectGravity"),
    inspectGravityValue: document.getElementById("inspectGravityValue"),
    inspectFriction: document.getElementById("inspectFriction"),
    inspectFrictionValue: document.getElementById("inspectFrictionValue"),
    inspectBounce: document.getElementById("inspectBounce"),
    inspectBounceValue: document.getElementById("inspectBounceValue"),
    inspectDurability: document.getElementById("inspectDurability"),
    inspectDurabilityValue: document.getElementById("inspectDurabilityValue"),
    inspectColor: document.getElementById("inspectColor"),
    conveyorInspector: document.getElementById("conveyorInspector"),
    inspectConveyor: document.getElementById("inspectConveyor"),
    inspectConveyorValue: document.getElementById("inspectConveyorValue"),
    explosiveInspector: document.getElementById("explosiveInspector"),
    inspectBlastRadius: document.getElementById("inspectBlastRadius"),
    inspectBlastRadiusValue: document.getElementById("inspectBlastRadiusValue"),
    inspectBlastForce: document.getElementById("inspectBlastForce"),
    inspectBlastForceValue: document.getElementById("inspectBlastForceValue"),
    inspectFuse: document.getElementById("inspectFuse"),
    inspectFuseValue: document.getElementById("inspectFuseValue"),
    detonateSelected: document.getElementById("detonateSelected"),
    undo: document.getElementById("undo"),
    redo: document.getElementById("redo"),
    fireGuns: document.getElementById("fireGuns"),
    help: document.getElementById("help")
  };

  ui.help.textContent = "drag to slice \u00b7 X scissors \u00b7 box-select and clone \u00b7 Ctrl+Z undo \u00b7 Space pause \u00b7 S slow \u00b7 I impact";

  let width = 0;
  let height = 0;
  let pixelRatio = 1;
  let bodies = [];
  let mode = "slice";
  let selectedSpawnType = "random";
  let selectedSpawnCategory = "all";
  let paused = false;
  let slowMotion = false;
  let impactMode = false;
  let cuts = 0;
  let idCounter = 1;
  let sliceStart = null;
  let scissorStart = null;
  let heldBody = null;
  let heldLocalPoint = null;
  let pausedRotationOffset = 0;
  let drawSpawnStart = null;
  let deleteTrailPoint = null;
  let selectionStart = null;
  let selectionCurrent = null;
  let selectionMoveLast = null;
  let selectionAdditive = false;
  let weldDraftParts = [];
  let weldDraftColor = null;
  let constraints = [];
  let constraintsVisible = true;
  let buildStart = null;
  let weldSelection = new Set();
  let selectedBodies = new Set();
  let explosions = [];
  let mouseTrail = [];
  let wind = 0;
  let flash = 0;
  let previousTime = performance.now();
  let helpRemaining = 5;
  let historyGestureRecorded = false;
  let inspectorHistoryRecorded = false;
  let physicsTime = 0;
  const undoStack = [];
  const redoStack = [];
  const stickyPairLastAttach = new Map();
  const impactBreakQueue = new Map();
  const sawCutQueue = new Map();
  const bulletCutQueue = new Map();
  const deformationQueue = new Map();
  const MAX_DYNAMIC_BODIES = 140;

  const pointer = { x: 0, y: 0, down: false };

  const palette = [
    "#c75c4a", "#d99a3d", "#d6bd55", "#5c9b77",
    "#4f83a3", "#7868a6", "#9e5f77", "#81745c"
  ];

  const add = (a,b) => ({ x: a.x+b.x, y: a.y+b.y });
  const sub = (a,b) => ({ x: a.x-b.x, y: a.y-b.y });
  const mul = (a,s) => ({ x: a.x*s, y: a.y*s });
  const dot = (a,b) => a.x*b.x + a.y*b.y;
  const cross = (a,b) => a.x*b.y - a.y*b.x;
  const length = a => Math.hypot(a.x,a.y);
  const normalize = a => {
    const l = length(a);
    return l > 1e-8 ? { x:a.x/l, y:a.y/l } : { x:0, y:0 };
  };
  const perpendicular = a => ({ x:-a.y, y:a.x });
  const rotate = (p,a) => ({
    x: p.x*Math.cos(a)-p.y*Math.sin(a),
    y: p.x*Math.sin(a)+p.y*Math.cos(a)
  });
  const clamp = (v,a,b) => Math.max(a,Math.min(b,v));
  const wrapAngle = angle => Math.atan2(Math.sin(angle),Math.cos(angle));

  function captureScene() {
    return structuredClone({
      bodies,constraints,cuts,idCounter,weldDraftParts,weldDraftColor,physicsTime,
      selectedBodyIds:[...selectedBodies].map(body=>body.id)
    });
  }

  function updateHistoryButtons() {
    ui.undo.disabled=undoStack.length===0;
    ui.redo.disabled=redoStack.length===0;
  }

  function recordHistory() {
    undoStack.push(captureScene());
    if (undoStack.length>50) undoStack.shift();
    redoStack.length=0;
    historyGestureRecorded=true;
    updateHistoryButtons();
  }

  function restoreScene(snapshot) {
    const restored=structuredClone(snapshot);
    bodies=restored.bodies;
    constraints=restored.constraints;
    cuts=restored.cuts;
    idCounter=restored.idCounter;
    weldDraftParts=restored.weldDraftParts;
    weldDraftColor=restored.weldDraftColor;
    physicsTime=restored.physicsTime||0;
    const selectedIds=new Set(restored.selectedBodyIds||[]);
    selectedBodies=new Set(bodies.filter(body=>selectedIds.has(body.id)));
    weldSelection.clear();
    explosions=[];
    heldBody=null; heldLocalPoint=null; sliceStart=null; scissorStart=null; drawSpawnStart=null;
    deleteTrailPoint=null; buildStart=null; selectionStart=null; selectionCurrent=null; selectionMoveLast=null;
    impactBreakQueue.clear(); sawCutQueue.clear(); bulletCutQueue.clear(); deformationQueue.clear();
    stickyPairLastAttach.clear();
    previousTime=performance.now();
    updateSelectionStatus();
  }

  function undoScene() {
    if (!undoStack.length) return;
    redoStack.push(captureScene());
    restoreScene(undoStack.pop());
    updateHistoryButtons();
  }

  function redoScene() {
    if (!redoStack.length) return;
    undoStack.push(captureScene());
    restoreScene(redoStack.pop());
    updateHistoryButtons();
  }

  function resize() {
    pixelRatio = Math.min(devicePixelRatio || 1, 2);
    width = innerWidth;
    height = innerHeight;
    canvas.width = width * pixelRatio;
    canvas.height = height * pixelRatio;
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(pixelRatio,0,0,pixelRatio,0,0);
  }

  function polygonArea(vertices) {
    let sum = 0;
    for (let i=0;i<vertices.length;i++) {
      sum += cross(vertices[i], vertices[(i+1)%vertices.length]);
    }
    return sum * .5;
  }

  function centroid(vertices) {
    let areaSum = 0;
    let x = 0;
    let y = 0;

    for (let i=0;i<vertices.length;i++) {
      const a = vertices[i];
      const b = vertices[(i+1)%vertices.length];
      const c = cross(a,b);
      areaSum += c;
      x += (a.x+b.x)*c;
      y += (a.y+b.y)*c;
    }

    if (Math.abs(areaSum) < 1e-7) {
      const average = vertices.reduce((s,p)=>add(s,p), {x:0,y:0});
      return mul(average,1/vertices.length);
    }

    return { x:x/(3*areaSum), y:y/(3*areaSum) };
  }

  function makeCCW(vertices) {
    return polygonArea(vertices) < 0 ? [...vertices].reverse() : vertices;
  }

  function pointInTriangle(p,a,b,c) {
    const ab = cross(sub(b,a),sub(p,a));
    const bc = cross(sub(c,b),sub(p,b));
    const ca = cross(sub(a,c),sub(p,c));
    const hasNegative = ab < -1e-7 || bc < -1e-7 || ca < -1e-7;
    const hasPositive = ab > 1e-7 || bc > 1e-7 || ca > 1e-7;
    return !(hasNegative && hasPositive);
  }

  function triangulate(vertices) {
    const polygon = makeCCW(vertices.map(p=>({...p})));
    if (polygon.length === 3) return [polygon];

    const indices = polygon.map((_,i)=>i);
    const triangles = [];
    let guard = 0;

    while (indices.length > 3 && guard++ < 500) {
      let clipped = false;

      for (let i=0;i<indices.length;i++) {
        const previousIndex = indices[(i-1+indices.length)%indices.length];
        const currentIndex = indices[i];
        const nextIndex = indices[(i+1)%indices.length];

        const a = polygon[previousIndex];
        const b = polygon[currentIndex];
        const c = polygon[nextIndex];

        if (cross(sub(b,a),sub(c,b)) <= 1e-7) continue;

        let containsPoint = false;
        for (const testIndex of indices) {
          if (testIndex===previousIndex || testIndex===currentIndex || testIndex===nextIndex) continue;
          if (pointInTriangle(polygon[testIndex],a,b,c)) {
            containsPoint = true;
            break;
          }
        }

        if (!containsPoint) {
          triangles.push([a,b,c]);
          indices.splice(i,1);
          clipped = true;
          break;
        }
      }

      if (!clipped) break;
    }

    if (indices.length === 3) {
      triangles.push(indices.map(index=>polygon[index]));
    }

    return triangles.length ? triangles : [polygon];
  }

  function isConvexPolygon(vertices) {
    let direction=0;
    for (let i=0;i<vertices.length;i++) {
      const turn=cross(
        sub(vertices[(i+1)%vertices.length],vertices[i]),
        sub(vertices[(i+2)%vertices.length],vertices[(i+1)%vertices.length])
      );
      if (Math.abs(turn)<1e-7) continue;
      const sign=Math.sign(turn);
      if (direction && sign!==direction) return false;
      direction=sign;
    }
    return true;
  }

  function collisionParts(vertices) {
    const polygon=makeCCW(vertices.map(point=>({...point})));
    return isConvexPolygon(polygon) ? [polygon] : triangulate(polygon);
  }

  function polygonPolarMoment(vertices) {
    let moment=0;
    for (let i=0;i<vertices.length;i++) {
      const a=vertices[i];
      const b=vertices[(i+1)%vertices.length];
      const areaCross=cross(a,b);
      moment+=areaCross*(dot(a,a)+dot(a,b)+dot(b,b));
    }
    return Math.abs(moment)/12;
  }

  function polygonMinimumThickness(vertices) {
    let minimum=Infinity;
    for (let i=0;i<vertices.length;i++) {
      const edge=sub(vertices[(i+1)%vertices.length],vertices[i]);
      if (length(edge)<1e-7) continue;
      const projection=project(vertices,normalize(perpendicular(edge)));
      minimum=Math.min(minimum,projection.max-projection.min);
    }
    return Number.isFinite(minimum) ? Math.max(2,minimum) : 12;
  }

  function bodyFromWorldVertices(vertices, options={}) {
    const world = makeCCW(vertices);

    const local = world.map(p=>sub(p,center));
    const area = Math.max(12,Math.abs(polygonArea(world)));
    const material = options.material ? {...options.material} : materialFor(options.shapeType);
    const mass = Math.max(.025,area / 2300 * material.density);
    const radius = Math.max(...local.map(length));
    const parts = collisionParts(local);

    // Exact polygon polar moment keeps long bars, squares and tiny fragments
    // rotating according to their true mass distribution.
    const inertia = Math.max(.05,mass*polygonPolarMoment(local)/area);

    return {
      id: idCounter++,
      pos: center,
      vel: options.vel ? {...options.vel} : {x:0,y:0},
      angle: options.angle || 0,
      angVel: options.angVel || 0,

  function convexHull(points) {
    const sorted = points.map(p=>({...p})).sort((a,b)=>a.x-b.x || a.y-b.y);
    if (sorted.length<=3) return makeCCW(sorted);
    const half = [];
    for (const point of sorted) {
      while (half.length>=2 && cross(sub(half[half.length-1],half[half.length-2]),sub(point,half[half.length-1]))<=0) half.pop();
      half.push(point);
    }
    const lower = half.slice(0,-1);
    half.length = 0;
    for (let i=sorted.length-1;i>=0;i--) {
      const point=sorted[i];
      while (half.length>=2 && cross(sub(half[half.length-1],half[half.length-2]),sub(point,half[half.length-1]))<=0) half.pop();
      half.push(point);
    }
    return makeCCW(lower.concat(half.slice(0,-1)));
  }

  function blendedMaterial(polygons,partStyles,fallback=materialFor("compound")) {
    if (!partStyles?.length) return {...fallback};
    const result={};
    let totalArea=0;
    for (let i=0;i<polygons.length;i++) {
      const area=Math.abs(polygonArea(polygons[i]));
      const material=partStyles[i]?.material || fallback;
      totalArea+=area;
      for (const [key,value] of Object.entries(material)) {
        if (Number.isFinite(value)) result[key]=(result[key]||0)+value*area;
      }
    }
    if (totalArea<=0) return {...fallback};
    for (const key of Object.keys(result)) result[key]/=totalArea;
    result.shatterCount=Math.max(1,Math.round(result.shatterCount||fallback.shatterCount));
    return {...fallback,...result};
  }

  function bodyFromCompoundPolygons(polygons,options={}) {
    const entries=polygons
      .map((poly,index)=>({poly,style:options.partStyles?.[index]}))
      .filter(entry=>entry.poly.length>=3 && Math.abs(polygonArea(entry.poly))>1);
    const valid=entries.map(entry=>entry.poly);
    const partStyles=entries.map(entry=>entry.style ? {
      color:entry.style.color,
      shapeType:entry.style.shapeType,
      material:{...(entry.style.material || materialFor(entry.style.shapeType))}
    } : null);
    if (!valid.length) return null;

    let totalArea=0;
    let weightedCenter={x:0,y:0};
    for (const poly of valid) {
      const area=Math.abs(polygonArea(poly));
      totalArea+=area;
      weightedCenter=add(weightedCenter,mul(centroid(poly),area));
    }
    const center=mul(weightedCenter,1/totalArea);
    const localPolygons=valid.map(poly=>makeCCW(poly).map(point=>sub(point,center)));
    const allLocal=localPolygons.flat();
    const hull=convexHull(allLocal);
    const material=options.material
      ? {...options.material}
      : blendedMaterial(valid,partStyles,materialFor("compound"));
    const mass=Math.max(.025,totalArea/2300*material.density);
    const radius=Math.max(...allLocal.map(length));
    const polarMoment=localPolygons.reduce((sum,poly)=>sum+polygonPolarMoment(poly),0);
    const inertia=Math.max(.05,mass*polarMoment/totalArea);

    return {
      id:idCounter++,
      pos:center,
      vel:options.vel ? {...options.vel} : {x:0,y:0},
      angle:0,
      angVel:options.angVel || 0,
      verts:hull,
      polygons:localPolygons,
      partStyles:partStyles.some(Boolean) ? partStyles : null,
      parts:localPolygons.flatMap(poly=>collisionParts(poly)),
      color:options.color || palette[Math.floor(Math.random()*palette.length)],
      shapeType:"compound",
      isCompound:true,
      hideInternalSeams:options.hideInternalSeams || false,
      material,
      mass,
      invMass:1/mass,
      inertia,
      invInertia:1/inertia,
      radius,
      collisionThickness:polygonMinimumThickness(hull),
      sleepTimer:0,
      sleeping:false,
      releaseGrace:0,
      impactGrace:options.impactGrace || 0,
      impactGeneration:options.impactGeneration || 0,
      sawGrace:options.sawGrace || 0,
      sawFragment:options.sawFragment || false,

      laserGeneration:options.laserGeneration || 0,
      unbreakable:options.unbreakable || false,
      textureRemoved:options.textureRemoved || false,
      isStatic:false
    };
  }

  function regularPolygon(x,y,r,sides,angle=Math.random()*Math.PI) {
    const points = [];
    for (let i=0;i<sides;i++) {
      const a = angle + i*Math.PI*2/sides;
      points.push({x:x+Math.cos(a)*r,y:y+Math.sin(a)*r});

    return points;
  }

  function spawnRagdoll(x,y,r) {
    if (bodies.length>MAX_DYNAMIC_BODIES-10) return null;
    const group=idCounter++;
    const skin="#d6a06d", shirt=palette[group%palette.length], pants="#485b78";
    const makeBody=(vertices,shapeType,color)=>{
      const body=bodyFromWorldVertices(vertices,{shapeType,color,material:materialFor(shapeType)});
      body.ragdollGroup=group;
      bodies.push(body);
      return body;
    };

    const neck={x,y:y-r*.52};
    const leftShoulder={x:x-r*.25,y:y-r*.43}, rightShoulder={x:x+r*.25,y:y-r*.43};
    const leftElbow={x:x-r*.67,y:y-r*.12}, rightElbow={x:x+r*.67,y:y-r*.12};
    const leftHand={x:x-r*.98,y:y+r*.18}, rightHand={x:x+r*.98,y:y+r*.18};
    const leftHip={x:x-r*.15,y:y+r*.28}, rightHip={x:x+r*.15,y:y+r*.28};
    const leftKnee={x:x-r*.2,y:y+r*.86}, rightKnee={x:x+r*.2,y:y+r*.86};
    const leftFoot={x:x-r*.25,y:y+r*1.46}, rightFoot={x:x+r*.25,y:y+r*1.46};

    const torso=makeBody([
      {x:x-r*.27,y:y-r*.5},{x:x+r*.27,y:y-r*.5},
      {x:x+r*.23,y:y+r*.32},{x:x-r*.23,y:y+r*.32}

    const upperLeftArm=makeBody(limbPolygon(leftShoulder,leftElbow,r*.18),"ragdolllimb",shirt);
    const lowerLeftArm=makeBody(limbPolygon(leftElbow,leftHand,r*.15),"ragdolllimb",skin);
    const upperRightArm=makeBody(limbPolygon(rightShoulder,rightElbow,r*.18),"ragdolllimb",shirt);
    const lowerRightArm=makeBody(limbPolygon(rightElbow,rightHand,r*.15),"ragdolllimb",skin);
    const upperLeftLeg=makeBody(limbPolygon(leftHip,leftKnee,r*.21),"ragdolllimb",pants);
    const lowerLeftLeg=makeBody(limbPolygon(leftKnee,leftFoot,r*.18),"ragdolllimb",pants);
    const upperRightLeg=makeBody(limbPolygon(rightHip,rightKnee,r*.21),"ragdolllimb",pants);
    const lowerRightLeg=makeBody(limbPolygon(rightKnee,rightFoot,r*.18),"ragdolllimb",pants);

    addRagdollJoint(torso,head,neck,-.55,.55);
    addRagdollJoint(torso,upperLeftArm,leftShoulder,-1.55,1.35);
    addRagdollJoint(upperLeftArm,lowerLeftArm,leftElbow,-.2,2.25);
    addRagdollJoint(torso,upperRightArm,rightShoulder,-1.35,1.55);
    addRagdollJoint(upperRightArm,lowerRightArm,rightElbow,-2.25,.2);
    addRagdollJoint(torso,upperLeftLeg,leftHip,-.95,1.05);
    addRagdollJoint(upperLeftLeg,lowerLeftLeg,leftKnee,-.15,1.9);
    addRagdollJoint(torso,upperRightLeg,rightHip,-1.05,.95);
    addRagdollJoint(upperRightLeg,lowerRightLeg,rightKnee,-1.9,.15);
    return torso;
  }

  function spawn(x=width*.65,y=40,type=selectedSpawnType) {
    if (isDraggedSpawnType(type)) return null;
    if (type === "random") {
      // Keep random spawning in lockstep with the visible, implemented menu.
      const choices = spawnables
        .map(item => item.id)
        .filter(id => id !== "random" && !isDraggedSpawnType(id));
      type = choices[Math.floor(Math.random()*choices.length)];
    }

    let r;
    if (Number(ui.sizeSlider.value) === 0) {
      r = 27 + Math.random()*27;
    } else {
      r = Number(ui.sizeSlider.value);
    }
    if (type==="ragdoll") return spawnRagdoll(x,y,r);
    let vertices;

    if (MATERIAL_SAMPLE_TYPES.has(type)) {
      vertices=[
        {x:x-r,y:y-r},{x:x+r,y:y-r},
        {x:x+r,y:y+r},{x:x-r,y:y+r}
      ];
    } else if (type === "saw") {
      vertices=regularPolygon(x,y,r,28,0);
    } else if (type === "circle") {
      const sides=28;
      vertices=regularPolygon(x,y,r,sides);

        {x:x-r*.84,y:y-r*.18},{x:x-r*.6,y:y-r*.38},
        {x:x-r*.32,y:y-r*.38}
      ];

    } else if (type === "laser") {
      vertices=[
        {x:x-r,y:y-r*.42},{x:x+r*.78,y:y-r*.42},{x:x+r,y:y-r*.18},
        {x:x+r,y:y+r*.18},{x:x+r*.78,y:y+r*.42},{x:x-r,y:y+r*.42}
      ];
    } else if (type === "gun") {
      vertices=[
        {x:x-r,y:y-r*.42},{x:x+r,y:y-r*.42},{x:x+r,y:y+r*.08},
        {x:x+r*.12,y:y+r*.08},{x:x+r*.02,y:y+r*.34},{x:x+r*.34,y:y+r},
        {x:x-r*.18,y:y+r},{x:x-r*.48,y:y+r*.18},{x:x-r,y:y+r*.18}
      ];
    } else if (type === "explosive") {
      vertices = [
        {x:x-r*.72,y:y-r},{x:x+r*.58,y:y-r},
        {x:x+r*.78,y:y-r*.72},{x:x+r*.78,y:y+r*.72},
        {x:x+r*.58,y:y+r},{x:x-r*.72,y:y+r},
        {x:x-r*.88,y:y+r*.7},{x:x-r*.88,y:y-r*.7}
      ];
    } else if (type === "conveyor") {
      vertices=[
        {x:x-r*1.65,y:y-r*.34},{x:x+r*1.65,y:y-r*.34},
        {x:x+r*1.65,y:y+r*.34},{x:x-r*1.65,y:y+r*.34}
      ];
    } else if (type === "box") {
      const w = r*(1.15+Math.random()*.65);
      const h = r*(.85+Math.random()*.6);
      vertices = [
        {x:x-w/2,y:y-h/2},{x:x+w/2,y:y-h/2},
        {x:x+w/2,y:y+h/2},{x:x-w/2,y:y+h/2}
      ];
    } else {
      const sides = {
        triangle:3,
        pentagon:5,
        hexagon:6,
        octagon:8
      }[type];
      vertices = regularPolygon(x,y,r,sides);
    }

    const memeColors = {
      tungtung:"#9a5a2c",
      tralalero:"#3c91d6",
      bombardino:"#718a45",
      capybara:"#9a7047",
      doge:"#d6a85f",
      cheems:"#c98f4d",
      shrekhead:"#78a84f",
      toilet:"#e7e7e7",
      banana:"#e4bd32",
      apple:"#c9483e",
      burger:"#d69a4e",
      cake:"#e7a7bd",
      cookie:"#b9783f",
      fries:"#d34b3f",
      creeper:"#58a83f",
      zombie:"#68a84f",
      skeleton:"#dedede",
      enderman:"#1d1a24",
      astronaut:"#e7e7e7",
      ninja:"#24242a",
      knight:"#9aa0a8",
      explosive:"#b8443e",
      saw:"#b8bdc2",
      conveyor:"#59636b",
      laser:"#4f565c",
      gun:"#45484c"
    };

    const amongUsColors=[
      "#C51111","#132FD2","#117F2D","#F5F557","#EF7D0D",
      "#6B2FBC","#39FEDB","#71491E","#EC54BA","#3F474E",
      "#D7E1F1","#50EF39"
    ];

    const humanColors=[
      "#e74c3c","#3498db","#2ecc71","#f1c40f","#9b59b6",
      "#e67e22","#1abc9c","#95a5a6","#ff69b4","#7f8c8d"
    ];

    let bodyColor = MATERIAL_SAMPLE_COLORS[type] || memeColors[type] || FOOD_COLORS[type];
    if(type==="amongus"){
      bodyColor=amongUsColors[(Math.random()*amongUsColors.length)|0];
    }else if(type==="human"){
      bodyColor=humanColors[(Math.random()*humanColors.length)|0];
    }

    const body = bodyFromWorldVertices(vertices,{
      vel:{x:0,y:0},
      angVel:0,
      color:bodyColor,
      shapeType:type,
      material:materialFor(type)
    });

    if (type==="explosive") {
      body.fuse=null;
      body.blastRadius=Math.max(150,r*5.2);
      body.blastForce=760;
      body.fuseDelay=.08;
    } else if (type==="saw") {
      body.angVel=(Math.random()<.5 ? -1 : 1)*5.5;
    } else if (type==="laser") {
      body.laserCooldown=.04;
    } else if (type==="conveyor") {
      body.conveyorSpeed=180;
      setBodyStatic(body,true);
    }

    bodies.push(body);
  }

  function pointInPolygon(point,vertices) {
    let inside = false;
    for (let i=0,j=vertices.length-1;i<vertices.length;j=i++) {
      const a = vertices[i];
      const b = vertices[j];
      const intersects =
        ((a.y>point.y)!==(b.y>point.y)) &&
        point.x < (b.x-a.x)*(point.y-a.y)/(b.y-a.y)+a.x;
      if (intersects) inside = !inside;
    }
    return inside;
  }

  function getBodyAt(point) {
    for (let i=bodies.length-1;i>=0;i--) {
      if (pointInPolygon(point,getWorldVertices(bodies[i]))) return bodies[i];
    }
    return null;
  }

  function lineSide(point,a,b) {
    return cross(sub(b,a),sub(point,a));
  }

  function cleanPolygon(points) {
    // Keep tiny slice vertices instead of deleting them with a large fixed
    // tolerance. Then remove only genuinely duplicate/collinear points.
    const clean = [];
    const epsilon = 0.06;
    for (const p of points) {
      if (!clean.length || length(sub(p,clean[clean.length-1])) > epsilon) clean.push(p);
    }
    if (clean.length > 2 && length(sub(clean[0],clean[clean.length-1])) < epsilon) clean.pop();

    let changed = true;
    while (changed && clean.length > 3) {
      changed = false;
      for (let i=0;i<clean.length;i++) {
        const previous = clean[(i-1+clean.length)%clean.length];
        const current = clean[i];
        const next = clean[(i+1)%clean.length];
        const a = sub(current,previous);
        const b = sub(next,current);
        if (length(a) < epsilon || length(b) < epsilon || Math.abs(cross(a,b)) < 0.0025) {
          clean.splice(i,1);
          changed = true;
          break;
        }
      }
    }
    return clean;
  }

  function clipByLine(vertices,a,b,positive) {
    const output = [];

    for (let i=0;i<vertices.length;i++) {
      const current = vertices[i];
      const next = vertices[(i+1)%vertices.length];
      const currentSide = lineSide(current,a,b);
      const nextSide = lineSide(next,a,b);
      const currentInside = positive ? currentSide>=0 : currentSide<=0;
      const nextInside = positive ? nextSide>=0 : nextSide<=0;

      if (currentInside) output.push(current);

      if (currentInside !== nextInside) {
        const edge = sub(next,current);
        const cut = sub(b,a);
        const denominator = cross(edge,cut);

        if (Math.abs(denominator)>1e-8) {
          const t = cross(sub(a,current),cut)/denominator;
          output.push(add(current,mul(edge,t)));
        }
      }
    }

    return cleanPolygon(output);
  }

  function velocityAtPoint(body,point) {
    const radius = sub(point,body.pos);
    return add(body.vel,mul(perpendicular(radius),body.angVel));
  }

  function segmentActuallyCrossesPolygon(a,b,vertices) {
    // A slice gesture is a finite segment, not an infinite line. Require the
    // visible swipe itself to cross the polygon boundary twice. Deduplicate
    // corner hits, where the same corner belongs to two polygon edges.
    const hits = [];
    const hitEpsilon = 0.75;

    for (let i=0;i<vertices.length;i++) {
      const hit = segmentIntersection(a,b,vertices[i],vertices[(i+1)%vertices.length]);
      if (!hit) continue;
      if (!hits.some(existing => length(sub(existing,hit)) < hitEpsilon)) hits.push(hit);
    }

    return hits.length >= 2;
  }

  function projectPointToSegment(point,start,end) {
    const delta=sub(end,start);
    const denominator=dot(delta,delta);
    const t=denominator>1e-8 ? clamp(dot(sub(point,start),delta)/denominator,0,1) : 0;
    return {point:add(start,mul(delta,t)),t};
  }

  function scissorSegmentsInsidePolygon(start,end,vertices) {
    const delta=sub(end,start);
    const denominator=dot(delta,delta);
    if (denominator<25) return [];
    const parameters=[0,1];
    for (let i=0;i<vertices.length;i++) {
      const hit=segmentIntersection(start,end,vertices[i],vertices[(i+1)%vertices.length]);
      if (!hit) continue;
      const t=clamp(dot(sub(hit,start),delta)/denominator,0,1);
      if (!parameters.some(value=>Math.abs(value-t)<1e-4)) parameters.push(t);
    }
    parameters.sort((a,b)=>a-b);
    const segments=[];
    for (let i=0;i<parameters.length-1;i++) {
      const from=parameters[i],to=parameters[i+1];
      if (to-from<1e-4) continue;
      const midpoint=add(start,mul(delta,(from+to)*.5));
      if (!pointInPolygon(midpoint,vertices)) continue;
      const a=add(start,mul(delta,from));
      const b=add(start,mul(delta,to));
      if (length(sub(b,a))>=4) segments.push({a,b});
    }
    return segments;
  }

  function connectScissorPoint(body,point) {
    const cuts=body.scissorCuts||(body.scissorCuts=[]);
    let closest=null;
    for (const cut of cuts) {
      for (const endpoint of [cut.a,cut.b]) {
        const distance=length(sub(point,endpoint));
        if (distance<=9 && (!closest || distance<closest.distance)) closest={point:endpoint,distance};
      }
    }
    if (closest) return {...closest.point};

    for (let i=0;i<cuts.length;i++) {
      const cut=cuts[i];
      const projection=projectPointToSegment(point,cut.a,cut.b);
      const distance=length(sub(point,projection.point));
      if (distance<=8 && projection.t>.04 && projection.t<.96) {
        const junction={...projection.point};
        cuts.splice(i,1,{a:{...cut.a},b:junction},{a:junction,b:{...cut.b}});
        return {...junction};
      }
    }
    return {...point};
  }

  function insertScissorSegment(body,a,b) {
    const cuts=body.scissorCuts||(body.scissorCuts=[]);
    const delta=sub(b,a);
    const denominator=dot(delta,delta);
    if (denominator<9) return false;
    const newPoints=[{point:{...a},t:0},{point:{...b},t:1}];
    const rebuilt=[];

    // Every crossing becomes a shared graph node. Split both the old cut and
    // the newly drawn cut so X- and T-junctions form real connected paths.
    for (const cut of cuts) {
      const hit=segmentIntersection(a,b,cut.a,cut.b);
      if (!hit) {
        rebuilt.push(cut);
        continue;
      }
      const newT=clamp(dot(sub(hit,a),delta)/denominator,0,1);
      if (!newPoints.some(entry=>Math.abs(entry.t-newT)<1e-4)) {
        newPoints.push({point:{...hit},t:newT});
      }
      const oldDelta=sub(cut.b,cut.a);
      const oldDenominator=dot(oldDelta,oldDelta);
      const oldT=oldDenominator>1e-8
        ? clamp(dot(sub(hit,cut.a),oldDelta)/oldDenominator,0,1)
        : 0;
      if (oldT>1e-4 && oldT<1-1e-4) {
        rebuilt.push({a:{...cut.a},b:{...hit}},{a:{...hit},b:{...cut.b}});
      } else {
        rebuilt.push(cut);
      }
    }

    const isDuplicate=(start,end)=>rebuilt.some(cut=>
      (length(sub(cut.a,start))<1.2 && length(sub(cut.b,end))<1.2) ||
      (length(sub(cut.a,end))<1.2 && length(sub(cut.b,start))<1.2)
    );
    newPoints.sort((left,right)=>left.t-right.t);
    for (let i=0;i<newPoints.length-1;i++) {
      const start=newPoints[i].point;
      const end=newPoints[i+1].point;
      if (length(sub(start,end))<1.5 || isDuplicate(start,end)) continue;
      rebuilt.push({a:{...start},b:{...end}});
    }
    body.scissorCuts=rebuilt;
    return true;
  }

  function pointOnPolygonBoundary(point,vertices,tolerance=2.5) {
    for (let i=0;i<vertices.length;i++) {
      if (pointSegmentDistance(point,vertices[i],vertices[(i+1)%vertices.length])<=tolerance) return true;
    }
    return false;
  }

  function completedScissorPath(body) {
    const cuts=body.scissorCuts||[];
    if (!cuts.length) return null;
    const nodes=[];
    const adjacency=[];
    const nodeFor=point=>{
      let index=nodes.findIndex(node=>length(sub(node,point))<1.2);
      if (index<0) { index=nodes.length; nodes.push({...point}); adjacency.push([]); }
      return index;
    };
    for (const cut of cuts) {
      const a=nodeFor(cut.a),b=nodeFor(cut.b);
      if (!adjacency[a].includes(b)) adjacency[a].push(b);
      if (!adjacency[b].includes(a)) adjacency[b].push(a);
    }
    const boundaryNodes=nodes.map((point,index)=>pointOnPolygonBoundary(point,body.verts) ? index : -1).filter(index=>index>=0);
    for (const start of boundaryNodes) {
      const queue=[start];
      const previous=new Map([[start,-1]]);
      while (queue.length) {
        const current=queue.shift();
        if (current!==start && boundaryNodes.includes(current) && length(sub(nodes[current],nodes[start]))>3) {
          const path=[];
          for (let cursor=current;cursor>=0;cursor=previous.get(cursor)) path.push({...nodes[cursor]});
          return path.reverse();
        }
        for (const next of adjacency[current]) {
          if (previous.has(next)) continue;
          previous.set(next,current);
          queue.push(next);
        }
      }
    }
    return null;
  }

  function completedScissorCycle(body) {
    const cuts=body.scissorCuts||[];
    const nodes=[];
    const adjacency=[];
    const nodeFor=point=>{
      let index=nodes.findIndex(node=>length(sub(node,point))<1.2);
      if (index<0) { index=nodes.length; nodes.push({...point}); adjacency.push([]); }
      return index;
    };
    for (const cut of cuts) {
      const a=nodeFor(cut.a),b=nodeFor(cut.b);
      if (!adjacency[a].includes(b)) adjacency[a].push(b);
      if (!adjacency[b].includes(a)) adjacency[b].push(a);
    }
    for (let i=0;i<adjacency.length;i++) {
      adjacency[i].sort((left,right)=>
        Math.atan2(nodes[left].y-nodes[i].y,nodes[left].x-nodes[i].x)-
        Math.atan2(nodes[right].y-nodes[i].y,nodes[right].x-nodes[i].x)
      );
    }
    const visited=new Set();
    const faces=[];
    for (let startA=0;startA<nodes.length;startA++) {
      for (const startB of adjacency[startA]) {
        const startKey=`${startA}:${startB}`;
        if (visited.has(startKey)) continue;
        const indices=[startA];
        let previous=startA,current=startB,closed=false;
        for (let guard=0;guard<nodes.length*3+8;guard++) {
          visited.add(`${previous}:${current}`);
          indices.push(current);
          const neighbors=adjacency[current];
          const incomingIndex=neighbors.indexOf(previous);
          if (incomingIndex<0 || !neighbors.length) break;
          const next=neighbors[(incomingIndex-1+neighbors.length)%neighbors.length];
          previous=current;
          current=next;
          if (previous===startA && current===startB) { closed=true; break; }
        }
        if (!closed) continue;
        indices.pop();
        if (indices.length<3 || new Set(indices).size!==indices.length) continue;
        const polygon=indices.map(index=>nodes[index]);
        const area=polygonArea(polygon);
        if (area>1 && pointInPolygon(centroid(polygon),body.verts)) faces.push(polygon);
      }
    }
    if (!faces.length) return null;
    faces.sort((left,right)=>Math.abs(polygonArea(left))-Math.abs(polygonArea(right)));
    return cleanPolygon(faces[0]);
  }

  function subtractConvexPolygon(subjects,clipPolygon) {
    let candidates=subjects.map(polygon=>makeCCW(polygon));
    const outside=[];
    const clip=makeCCW(clipPolygon);
    for (let edge=0;edge<clip.length && candidates.length;edge++) {
      const next=[];
      for (const polygon of candidates) {
        const inside=clipByLine(polygon,clip[edge],clip[(edge+1)%clip.length],true);
        const rejected=clipByLine(polygon,clip[edge],clip[(edge+1)%clip.length],false);
        if (rejected.length>=3 && Math.abs(polygonArea(rejected))>.7) outside.push(rejected);
        if (inside.length>=3 && Math.abs(polygonArea(inside))>.7) next.push(inside);
      }
      candidates=next;
    }
    return outside;
  }

  function splitBodyAlongScissorCycle(body,rawCycle) {
    const cycle=makeCCW(cleanPolygon(rawCycle||[]));
    const cycleArea=Math.abs(polygonArea(cycle));
    const minimumArea=clamp(Math.abs(polygonArea(body.verts))*.0025,.8,12);
    if (cycle.length<3 || cycleArea<minimumArea || !isStableDeformedPolygon(cycle,minimumArea)) return null;

    let remaining=(body.polygons||[body.verts]).map(polygon=>polygon.map(point=>({...point})));
    for (const triangle of triangulate(cycle)) {
      remaining=subtractConvexPolygon(remaining,triangle);
      if (!remaining.length) return null;
    }
    const remainingArea=remaining.reduce((sum,polygon)=>sum+Math.abs(polygonArea(polygon)),0);
    if (remainingArea<minimumArea) return null;

    const toWorld=polygon=>polygon.map(point=>add(body.pos,rotate(point,body.angle)));
    const outer=bodyFromCompoundPolygons(remaining.map(toWorld),{
      color:body.color,material:body.material,vel:body.vel,angVel:body.angVel
    });
    const rawInnerWorld=toWorld(cycle);
    const innerCenter=centroid(rawInnerWorld);
    const innerRadius=Math.max(...rawInnerWorld.map(point=>length(sub(point,innerCenter))));
    const kerfScale=innerRadius>1 ? Math.max(.94,(innerRadius-.8)/innerRadius) : 1;
    // Leave a narrow physical kerf. Translating a perfect-fit cutout made it
    // overlap the opposite wall of its hole and caused a violent resume impulse.
    const innerWorld=rawInnerWorld.map(point=>add(innerCenter,mul(sub(point,innerCenter),kerfScale)));
    const inner=bodyFromWorldVertices(innerWorld,{
      color:body.color,shapeType:body.shapeType,material:body.material,
      vel:velocityAtPoint(body,innerCenter),angVel:body.angVel,sawFragment:body.sawFragment
    });
    if (!outer || !inner) return null;
    outer.shapeType=body.shapeType;
    outer.hideInternalSeams=true;
    for (const piece of [outer,inner]) {
      piece.textureRemoved=true;
      piece.ragdollGroup=body.ragdollGroup;
      for (const key of ["conveyorSpeed","blastRadius","blastForce","fuseDelay","bulletOwner"]) {
        if (body[key]!=null) piece[key]=body[key];
      }
    }
    const remainingCuts=(body.scissorCuts||[]).filter(cut=>{
      const midpoint=mul(add(cut.a,cut.b),.5);
      return !cycle.some((point,index)=>
        pointSegmentDistance(midpoint,point,cycle[(index+1)%cycle.length])<1.2
      );
    }).map(cut=>({
      a:add(body.pos,rotate(cut.a,body.angle)),
      b:add(body.pos,rotate(cut.b,body.angle))
    }));
    for (const piece of [outer,inner]) {
      const preserved=[];
      for (const polygon of getWorldDrawPolygons(piece)) {
        for (const cut of remainingCuts) {
          for (const segment of scissorSegmentsInsidePolygon(cut.a,cut.b,polygon)) {
            const localA=rotate(sub(segment.a,piece.pos),-piece.angle);
            const localB=rotate(sub(segment.b,piece.pos),-piece.angle);
            const duplicate=preserved.some(existing=>
              (length(sub(existing.a,localA))<1 && length(sub(existing.b,localB))<1) ||
              (length(sub(existing.a,localB))<1 && length(sub(existing.b,localA))<1)
            );
            if (!duplicate && length(sub(localA,localB))>=2) preserved.push({a:localA,b:localB});
          }
        }
      }
      if (preserved.length) piece.scissorCuts=preserved;
    }
    return [outer,inner];
  }

  function polygonBoundaryLocation(point,vertices) {
    let best=null;
    for (let i=0;i<vertices.length;i++) {
      const projection=projectPointToSegment(point,vertices[i],vertices[(i+1)%vertices.length]);
      const distance=length(sub(point,projection.point));
      if (!best || distance<best.distance) best={edge:i,t:projection.t,point:projection.point,distance};
    }
    return best;
  }

  function polygonBoundaryRoute(vertices,start,end) {
    if (start.edge===end.edge && start.t<=end.t) return [{...start.point},{...end.point}];
    const route=[{...start.point}];
    let index=(start.edge+1)%vertices.length;
    let guard=0;
    while (guard++<=vertices.length) {
      route.push({...vertices[index]});
      if (index===end.edge) break;
      index=(index+1)%vertices.length;
    }
    route.push({...end.point});
    return route;
  }

  function splitBodyAlongScissorPath(body,rawPath) {
    if (!rawPath || rawPath.length<2) return null;
    const startLocation=polygonBoundaryLocation(rawPath[0],body.verts);
    const endLocation=polygonBoundaryLocation(rawPath[rawPath.length-1],body.verts);
    if (!startLocation || !endLocation || startLocation.distance>3 || endLocation.distance>3) return null;
    const path=rawPath.map(point=>({...point}));
    path[0]={...startLocation.point};
    path[path.length-1]={...endLocation.point};
    const forward=polygonBoundaryRoute(body.verts,startLocation,endLocation);
    const backward=polygonBoundaryRoute(body.verts,endLocation,startLocation);
    const firstLocal=cleanPolygon([...path,...backward.slice(1)]);
    const secondLocal=cleanPolygon([[...path].reverse(),...forward.slice(1)].flat());
    if (firstLocal.length<3 || secondLocal.length<3) return null;
    const originalArea=Math.abs(polygonArea(body.verts));
    const firstArea=Math.abs(polygonArea(firstLocal));
    const secondArea=Math.abs(polygonArea(secondLocal));
    const minimumArea=clamp(originalArea*.0025,.8,12);
    if (firstArea<minimumArea || secondArea<minimumArea || firstArea+secondArea<originalArea*.955) return null;
    if (!isStableDeformedPolygon(firstLocal,minimumArea) || !isStableDeformedPolygon(secondLocal,minimumArea)) return null;

    const toWorld=polygon=>polygon.map(point=>add(body.pos,rotate(point,body.angle)));
    const firstWorld=toWorld(firstLocal),secondWorld=toWorld(secondLocal);
    const chordDirection=normalize(sub(path[path.length-1],path[0]));
    const normal=length(chordDirection)>1e-7 ? rotate(perpendicular(chordDirection),body.angle) : {x:0,y:-1};
    const firstCenter=centroid(firstWorld),secondCenter=centroid(secondWorld);
    const firstSide=Math.sign(dot(sub(firstCenter,body.pos),normal))||1;
    const secondSide=-firstSide;
    const separationSpeed=paused ? 0 : 18;
    const createPiece=(vertices,center,side)=>bodyFromWorldVertices(vertices,{
      color:body.color,shapeType:body.shapeType,material:body.material,
      vel:add(velocityAtPoint(body,center),mul(normal,separationSpeed*side)),
      angVel:body.angVel,sawFragment:body.sawFragment
    });
    const firstBody=createPiece(firstWorld,firstCenter,firstSide);
    const secondBody=createPiece(secondWorld,secondCenter,secondSide);
    for (const piece of [firstBody,secondBody]) {
      piece.textureRemoved=true;
      piece.ragdollGroup=body.ragdollGroup;
      for (const key of ["conveyorSpeed","blastRadius","blastForce","fuseDelay","bulletOwner"]) {
        if (body[key]!=null) piece[key]=body[key];
      }
    }
    const oldWorldCuts=(body.scissorCuts||[]).map(cut=>({
      a:add(body.pos,rotate(cut.a,body.angle)),
      b:add(body.pos,rotate(cut.b,body.angle))
    }));
    for (const piece of [firstBody,secondBody]) {
      const preserved=[];
      for (const cut of oldWorldCuts) {
        const clipped=scissorSegmentsInsidePolygon(cut.a,cut.b,getWorldVertices(piece));
        for (const segment of clipped) {
          const localA=rotate(sub(segment.a,piece.pos),-piece.angle);
          const localB=rotate(sub(segment.b,piece.pos),-piece.angle);
          const midpoint=mul(add(localA,localB),.5);
          // The completed cut is now part of the new outer edge, not a pending snip.
          if (pointOnPolygonBoundary(midpoint,piece.verts,1.1)) continue;
          if (length(sub(localA,localB))>=2) preserved.push({a:localA,b:localB});
        }
      }
      if (preserved.length) piece.scissorCuts=preserved;
    }
    return [firstBody,secondBody];
  }

  function addScissorSegment(body,worldA,worldB) {
    const toLocal=point=>rotate(sub(point,body.pos),-body.angle);
    let a=connectScissorPoint(body,toLocal(worldA));
    let b=connectScissorPoint(body,toLocal(worldB));
    if (length(sub(a,b))<3) return false;
    insertScissorSegment(body,a,b);
    const path=completedScissorPath(body);
    const cycle=path ? null : completedScissorCycle(body);
    if (!path && !cycle) return false;
    const pieces=path
      ? splitBodyAlongScissorPath(body,path)
      : splitBodyAlongScissorCycle(body,cycle);
    if (!pieces) return false;
    reattachConstraints(body,pieces);
    const pending=[...pieces];
    const finalPieces=[];
    let completedCuts=1;
    while (pending.length && completedCuts<8 && bodies.length+pending.length+finalPieces.length<MAX_DYNAMIC_BODIES) {
      const piece=pending.shift();
      const nextPath=completedScissorPath(piece);
      const nextCycle=nextPath ? null : completedScissorCycle(piece);
      const nextPieces=nextPath
        ? splitBodyAlongScissorPath(piece,nextPath)
        : nextCycle ? splitBodyAlongScissorCycle(piece,nextCycle) : null;
      if (!nextPieces) {
        finalPieces.push(piece);
        continue;
      }
      reattachConstraints(piece,nextPieces);
      pending.push(...nextPieces);
      completedCuts++;
    }
    finalPieces.push(...pending);
    const index=bodies.indexOf(body);
    if (index>=0) bodies.splice(index,1,...finalPieces);
    cuts+=completedCuts;
    flash=Math.max(flash,.13);
    return true;
  }

  function performScissorSwipe(start,end) {
    let recorded=false;
    for (const body of [...bodies]) {
      if (!bodies.includes(body)) continue;
      if (body.unbreakable) continue;
      const segments=scissorSegmentsInsidePolygon(start,end,getWorldVertices(body));
      if (!segments.length) continue;
      if (!recorded) { recordHistory(); recorded=true; }
      for (const segment of segments) {
        const split=addScissorSegment(body,segment.a,segment.b);
        if (split || !bodies.includes(body)) break;
      }
    }
  }

  function sliceCompoundBody(body,a,b) {
    if (body.unbreakable || body.deformable) return null;
    const worldPolygons=getWorldDrawPolygons(body);
    const firstPolygons=[];
    const secondPolygons=[];
    const firstStyles=[];
    const secondStyles=[];
    let crossedPart=false;

    for (let polygonIndex=0;polygonIndex<worldPolygons.length;polygonIndex++) {
      const polygon=worldPolygons[polygonIndex];
      const style=body.partStyles?.[polygonIndex] || {
        color:body.color,
        shapeType:body.shapeType,
        material:body.material
      };
      if (segmentActuallyCrossesPolygon(a,b,polygon)) {
        crossedPart=true;
        const first=clipByLine(polygon,a,b,true);
        const second=clipByLine(polygon,a,b,false);
        if (first.length>=3 && Math.abs(polygonArea(first))>=.7) { firstPolygons.push(first); firstStyles.push(style); }
        if (second.length>=3 && Math.abs(polygonArea(second))>=.7) { secondPolygons.push(second); secondStyles.push(style); }
      } else if (lineSide(centroid(polygon),a,b)>=0) {
        firstPolygons.push(polygon);
        firstStyles.push(style);
      } else {
        secondPolygons.push(polygon);
        secondStyles.push(style);
      }
    }

    if (!crossedPart || !firstPolygons.length || !secondPolygons.length) return null;
    const firstArea=firstPolygons.reduce((sum,poly)=>sum+Math.abs(polygonArea(poly)),0);
    const secondArea=secondPolygons.reduce((sum,poly)=>sum+Math.abs(polygonArea(poly)),0);
    const minimumArea=clamp((firstArea+secondArea)*.0025,.7,10);
    if (firstArea<minimumArea || secondArea<minimumArea) return null;

    const groupCenter=polygons=>{
      let areaSum=0;
      let weighted={x:0,y:0};
      for (const polygon of polygons) {
        const area=Math.abs(polygonArea(polygon));
        areaSum+=area;
        weighted=add(weighted,mul(centroid(polygon),area));
      }
      return mul(weighted,1/areaSum);
    };
    const direction=normalize(sub(b,a));
    const normal=perpendicular(direction);
    const firstCenter=groupCenter(firstPolygons);
    const secondCenter=groupCenter(secondPolygons);
    const firstSide=Math.sign(lineSide(firstCenter,a,b)) || 1;
    const secondSide=Math.sign(lineSide(secondCenter,a,b)) || -1;
    const separationSpeed=paused ? 0 : 24;

    const firstBody=bodyFromCompoundPolygons(firstPolygons,{
      color:body.color,
      partStyles:firstStyles,
      vel:add(velocityAtPoint(body,firstCenter),mul(normal,separationSpeed*firstSide)),
      angVel:body.angVel,
      sawFragment:body.sawFragment,
      hideInternalSeams:body.hideInternalSeams
    });
    const secondBody=bodyFromCompoundPolygons(secondPolygons,{
      color:body.color,
      partStyles:secondStyles,
      vel:add(velocityAtPoint(body,secondCenter),mul(normal,separationSpeed*secondSide)),
      angVel:body.angVel,
      sawFragment:body.sawFragment,
      hideInternalSeams:body.hideInternalSeams
    });
    if (!firstBody || !secondBody) return null;
    firstBody.textureRemoved=true;
    secondBody.textureRemoved=true;
    firstBody.pos=add(firstBody.pos,mul(normal,1.2*firstSide));
    secondBody.pos=add(secondBody.pos,mul(normal,1.2*secondSide));
    return [firstBody,secondBody];
  }

  function sliceConcaveBody(body,a,b) {
    const intervals=scissorSegmentsInsidePolygon(a,b,getWorldVertices(body));
    if (!intervals.length) return null;
    const fragments=[body];
    let splits=0;

    // Cut only the finite chords actually travelled inside the silhouette.
    // Extending the line to infinity could sever a torso below an arm cut.
    for (const interval of intervals) {
      const midpoint=mul(add(interval.a,interval.b),.5);
      const fragmentIndex=fragments.findIndex(fragment=>bodyContainsPoint(fragment,midpoint,3));
      if (fragmentIndex<0) continue;
      const fragment=fragments[fragmentIndex];
      const toLocal=point=>rotate(sub(point,fragment.pos),-fragment.angle);
      const pieces=splitBodyAlongScissorPath(fragment,[toLocal(interval.a),toLocal(interval.b)]);
      if (!pieces) continue;
      fragments.splice(fragmentIndex,1,...pieces);
      splits++;
    }
    return splits ? fragments : null;
  }

  function sliceBody(body,a,b) {
    if (body.unbreakable || body.deformable) return null;
    if (body.isCompound) return sliceCompoundBody(body,a,b);
    const vertices = getWorldVertices(body);

    // Do not let the infinite extension of a swipe cut an object. The mouse
    // trail must physically pass through the shape on screen.
    if (!segmentActuallyCrossesPolygon(a,b,vertices)) return null;
    if (!isConvexPolygon(body.verts)) return sliceConcaveBody(body,a,b);

    // Checking which side each vertex is on is more reliable than counting
    // edge intersections. It still works on very thin pieces and when the cut
    // passes exactly through a corner.
    let minSide = Infinity;
    let maxSide = -Infinity;
    for (const vertex of vertices) {
      const side = lineSide(vertex,a,b);
      minSide = Math.min(minSide,side);
      maxSide = Math.max(maxSide,side);
    }
    if (minSide > -0.05 || maxSide < 0.05) return null;

    const first = clipByLine(vertices,a,b,true);
    const second = clipByLine(vertices,a,b,false);

    if (first.length<3 || second.length<3) return null;
    const originalArea = Math.abs(polygonArea(vertices));
    // Tiny shards are allowed, but reject mathematically degenerate slivers.
    const minimumPieceArea = clamp(originalArea*0.0025,0.7,10);
    const firstArea = Math.abs(polygonArea(first));
    const secondArea = Math.abs(polygonArea(second));
    if (firstArea < minimumPieceArea || secondArea < minimumPieceArea) return null;
    if (firstArea + secondArea < originalArea * 0.965) return null;

    const direction = normalize(sub(b,a));
    const normal = perpendicular(direction);
    const firstCenter = centroid(first);
    const secondCenter = centroid(second);
    const firstSide = Math.sign(lineSide(firstCenter,a,b)) || 1;
    const secondSide = Math.sign(lineSide(secondCenter,a,b)) || -1;
    const separationSpeed = paused ? 0 : 35;

    const firstBody = bodyFromWorldVertices(first,{
      color:body.color,
      shapeType:body.shapeType,
      vel:add(velocityAtPoint(body,firstCenter),mul(normal,separationSpeed*firstSide)),
      angVel:body.angVel,
      material:body.material,
      sawFragment:body.sawFragment
    });

    const secondBody = bodyFromWorldVertices(second,{
      color:body.color,
      shapeType:body.shapeType,
      vel:add(velocityAtPoint(body,secondCenter),mul(normal,separationSpeed*secondSide)),
      angVel:body.angVel,
      material:body.material,
      sawFragment:body.sawFragment
    });

    firstBody.textureRemoved=true;
    secondBody.textureRemoved=true;
    firstBody.ragdollGroup=body.ragdollGroup;
    secondBody.ragdollGroup=body.ragdollGroup;

    firstBody.pos = add(firstBody.pos,mul(normal,1.5*firstSide));
    secondBody.pos = add(secondBody.pos,mul(normal,1.5*secondSide));

    return [firstBody,secondBody];
  }

  function configureDeformableBody(body,limit=.55) {
    if (!body) return body;
    body.deformable=true;
    body.deformAmount=0;
    body.deformLimit=limit;
    body.deformOriginalRadius=body.radius;
    body.deformOriginalArea=Math.abs(polygonArea(body.verts));
    body.deformBaseVerts=body.verts.map(point=>({...point}));
    body.deformCooldown=0;
    return body;
  }

  function isStableDeformedPolygon(vertices,minimumArea) {
    if (Math.abs(polygonArea(vertices))<minimumArea) return false;
    for (let i=0;i<vertices.length;i++) {
      const a=vertices[i], b=vertices[(i+1)%vertices.length];
      if (length(sub(b,a))<1.25) return false;
      for (let j=i+1;j<vertices.length;j++) {
        if (j===i || j===(i+1)%vertices.length || (j+1)%vertices.length===i) continue;
        if (segmentIntersection(a,b,vertices[j],vertices[(j+1)%vertices.length])) return false;
      }
    }
    return true;
  }

  function queueDeformation(body,worldNormal,impactSpeed,contact=body?.pos) {
    if (!body?.deformable || body.unbreakable || impactSpeed<145) return false;
    const previous=deformationQueue.get(body.id);
    if (!previous || impactSpeed>previous.impactSpeed) {
      deformationQueue.set(body.id,{body,worldNormal:{...worldNormal},impactSpeed,contact:{...contact}});
    }
    return true;
  }

  function processDeformations() {
    for (const hit of deformationQueue.values()) {
      if (!bodies.includes(hit.body) || hit.body.deformCooldown>0) continue;
      applyDeformation(hit.body,hit.worldNormal,hit.impactSpeed,hit.contact);
    }
    deformationQueue.clear();
  }

  function applyDeformation(body,worldNormal,impactSpeed,contact=body?.pos) {
    if (!body?.deformable) return false;
    if (impactSpeed<145) return true;

    const previousInertia=body.inertia;
    const localNormal=normalize(rotate(worldNormal,-body.angle));
    const localContact=rotate(sub(contact,body.pos),-body.angle);
    const base=body.deformBaseVerts?.length===body.verts.length
      ? body.deformBaseVerts
      : body.verts.map(point=>({...point}));
    const influenceRadius=Math.max(14,(body.deformOriginalRadius||body.radius)*.42);
    const shortestEdge=Math.min(...body.verts.map((point,index)=>
      length(sub(body.verts[(index+1)%body.verts.length],point))
    ));
    // Many small plastic bends stay stable and allow unlimited repeated hits.
    const maximumStep=Math.max(.45,Math.min(
      body.collisionThickness*.22,
      shortestEdge*.34,
      (body.deformOriginalRadius||body.radius)*.055
    ));
    const depth=clamp((impactSpeed-145)*.006,.25,maximumStep);
    const maximumOffset=(body.deformOriginalRadius||body.radius)*(body.deformLimit||.5);

    let nextVerts=body.verts.map((point,index)=>{
      const distance=length(sub(point,localContact));
      const influence=Math.exp(-Math.pow(distance/influenceRadius,2));
      let candidate=add(point,mul(localNormal,depth*influence));
      const totalOffset=sub(candidate,base[index]);
      const totalLength=length(totalOffset);
      if (totalLength>maximumOffset) candidate=add(base[index],mul(totalOffset,maximumOffset/totalLength));
      return candidate;
    });

    const minimumArea=Math.max(12,(body.deformOriginalArea||Math.abs(polygonArea(body.verts)))*.22);
    if (!isStableDeformedPolygon(nextVerts,minimumArea)) {
      body.deformCooldown=.06;
      return true;
    }
    const localShift=centroid(nextVerts);
    nextVerts=nextVerts.map(point=>sub(point,localShift));
    body.deformBaseVerts=base.map(point=>sub(point,localShift));
    body.pos=add(body.pos,rotate(localShift,body.angle));
    body.verts=nextVerts;
    body.parts=collisionParts(body.verts);
    const area=Math.max(12,Math.abs(polygonArea(body.verts)));
    body.radius=Math.max(...body.verts.map(length));
    body.collisionThickness=polygonMinimumThickness(body.verts);
    body.inertia=Math.max(.05,body.mass*polygonPolarMoment(body.verts)/area);
    body.invInertia=body.isStatic ? 0 : 1/body.inertia;
    // Plastic reshaping changes inertia; preserve angular momentum without
    // allowing an extreme one-frame angular-velocity spike.
    if (!body.isStatic && previousInertia>0) {
      body.angVel*=clamp(previousInertia/body.inertia,.72,1.28);
    }
    body.deformAmount=Math.max(...body.verts.map((point,index)=>length(sub(point,body.deformBaseVerts[index])))) /
      Math.max(1,body.deformOriginalRadius||body.radius);
    body.textureRemoved=true;
    body.deformCooldown=.028;
    body.sleeping=false;
    body.sleepTimer=0;
    return true;
  }

  function queueImpactBreak(body,normal,contact,damageSpeed) {
    if (!impactMode || paused || body.impactGrace>0 || body.impactGeneration>=3) return;
    if (body.unbreakable) return;
    if (body.deformable || ["explosive","saw","laser","gun","bullet"].includes(body.shapeType)) return;
    if (body.radius<14 || body.mass<.024) return;
    const strength=Math.max(1,body.material.impactStrength);
    if (damageSpeed<strength) return;
    const previous=impactBreakQueue.get(body.id);
    if (!previous || damageSpeed>previous.damageSpeed) {
      impactBreakQueue.set(body.id,{
        normal:{...normal},
        contact:{...contact},
        damageSpeed
      });
    }
  }

  function queueBodyImpact(a,b,collision,impactSpeed) {
    if (!impactMode || impactSpeed<=0) return;
    const reducedMass=(a.mass*b.mass)/Math.max(a.mass+b.mass,1e-8);
    const impactEnergy=.5*reducedMass*impactSpeed*impactSpeed;
    // Even a large target receives a meaningful shock wave at the contact.
    // This keeps long, heavy lines from becoming unbreakable to fast projectiles.
    const damageFor=body=>Math.max(
      impactSpeed*.62,
      Math.sqrt(2*impactEnergy/Math.max(body.mass,.001))
    );
    queueImpactBreak(a,mul(collision.normal,-1),collision.contact,damageFor(a));
    queueImpactBreak(b,collision.normal,collision.contact,damageFor(b));
  }

  function tryCreateStickyBond(a,b,contact,impactSpeed) {
    if (!(a.material.sticky || b.material.sticky) || impactSpeed>1150) return;
    if (["bullet","saw","laser","explosive"].includes(a.shapeType) ||
        ["bullet","saw","laser","explosive"].includes(b.shapeType)) return;
    if (constraints.some(constraint=>!constraint.invalid && constraint.kind==="sticky" &&
      ((constraint.a===a && constraint.b===b) || (constraint.a===b && constraint.b===a)))) return;
    const key=a.id<b.id ? `${a.id}:${b.id}` : `${b.id}:${a.id}`;
    if (physicsTime-(stickyPairLastAttach.get(key)||-Infinity)<.75) return;
    stickyPairLastAttach.set(key,physicsTime);
    constraints.push({
      id:idCounter++,kind:"sticky",a,b,
      localA:rotate(sub(contact,a.pos),-a.angle),
      localB:rotate(sub(contact,b.pos),-b.angle),
      worldB:null,restLength:0,
      strength:Math.max(a.material.adhesiveStrength||0,b.material.adhesiveStrength||0,650),
      motorSpeed:0,load:0,age:0
    });
  }

  function applyConveyorContact(a,b,collision,frameStep) {
    const conveyor=a.shapeType==="conveyor" ? a : b.shapeType==="conveyor" ? b : null;
    if (!conveyor) return;
    const other=conveyor===a ? b : a;
    if (other.isStatic || other.shapeType==="conveyor" || other.conveyorContactTime===physicsTime) return;
    const outwardNormal=conveyor===a ? collision.normal : mul(collision.normal,-1);
    const beltUp=rotate({x:0,y:-1},conveyor.angle);
    if (dot(outwardNormal,beltUp)<.38) return;
    other.conveyorContactTime=physicsTime;
    const tangent=rotate({x:1,y:0},conveyor.angle);
    const pointVelocity=velocityAtPoint(other,collision.contact);
    const speedError=(conveyor.conveyorSpeed||0)-dot(pointVelocity,tangent);
    const radius=sub(collision.contact,other.pos);
    const lever=cross(radius,tangent);
    const denominator=other.invMass+lever*lever*other.invInertia;
    if (denominator<=1e-8) return;
    const response=1-Math.exp(-16*Math.max(frameStep,.001));
    const impulseMagnitude=clamp(speedError/denominator*response,-other.mass*180,other.mass*180);
    const impulse=mul(tangent,impulseMagnitude);
    other.vel=add(other.vel,mul(impulse,other.invMass));
    other.angVel+=cross(radius,impulse)*other.invInertia;
    other.sleeping=false;
    other.sleepTimer=0;
  }

  function impactCut(body,hit,angleOffset=0) {
    let inward=normalize(sub(body.pos,hit.contact));
    if (length(inward)<1e-7) inward=normalize(hit.normal);
    if (length(inward)<1e-7) inward={x:0,y:-1};

    // Begin outside the struck surface and send the crack ray through the body.
    // Every fracture therefore visibly originates at the collision point.
    const direction=rotate(inward,angleOffset);
    const start=sub(hit.contact,mul(inward,Math.max(8,body.radius*.38)));
    const end=add(hit.contact,mul(direction,body.radius*3+50));
    return sliceBody(body,start,end);
  }

  function fractureBody(body,hit,maxFragments=8) {
    if (maxFragments<2) return null;
    const severity=hit.damageSpeed/Math.max(body.material.impactStrength,1);
    const baseCuts=body.material.shatterCount || 2;
    const targetCuts=clamp(
      Math.round(baseCuts+Math.max(0,severity-1)*1.25),
      1,
      Math.min(7,maxFragments-1)
    );
    const jitter=(((body.id*47)%101)/100-.5)*.18;
    const offsets=[jitter,jitter+.28,jitter-.28,jitter+.5,jitter-.5,jitter+.7,jitter-.7];
    let fragments=[body];
    let cutsMade=0;

    for (let cutIndex=0;cutIndex<targetCuts;cutIndex++) {
      const candidates=fragments
        .map((fragment,index)=>({fragment,index}))
        .filter(item=>item.fragment.radius>11 && item.fragment.mass>.024)
        .sort((a,b)=>b.fragment.mass-a.fragment.mass);
      let split=false;
      for (const candidate of candidates) {
        const pieces=impactCut(candidate.fragment,hit,offsets[cutIndex]);
        if (!pieces) continue;
        fragments.splice(candidate.index,1,...pieces);
        cutsMade++;
        split=true;
        break;
      }
      if (!split) continue;
    }
    if (!cutsMade) return null;

    const burst=clamp(8+Math.max(0,severity-1)*18,8,48);
    for (const fragment of fragments) {
      fragment.impactGeneration=(body.impactGeneration||0)+1;
      fragment.impactGrace=.22;
      fragment.releaseGrace=Math.max(fragment.releaseGrace,.12);
      const radial=normalize(sub(fragment.pos,hit.contact));
      fragment.vel=add(velocityAtPoint(body,fragment.pos),mul(radial,burst));
      fragment.angVel=body.angVel;
      fragment.sleeping=false;
      fragment.sleepTimer=0;
    }
    flash=Math.max(flash,.55);
    return fragments;
  }

  function processImpactBreaks() {
    if (!impactBreakQueue.size) return;
    const nextBodies=[];
    let fractureEvents=0;
    let fragmentBudget=Math.max(0,Math.min(28,MAX_DYNAMIC_BODIES-bodies.length));
    for (const body of bodies) {
      const hit=impactBreakQueue.get(body.id);
      const mayFracture=hit && fractureEvents<4 && fragmentBudget>0;
      const fragments=mayFracture
        ? fractureBody(body,hit,Math.min(8,fragmentBudget+1))
        : null;
      if (fragments) {
        const added=fragments.length-1;
        fragmentBudget-=added;
        fractureEvents++;
        reattachConstraints(body,fragments);
        nextBodies.push(...fragments);
      }
      else nextBodies.push(body);
    }
    bodies=nextBodies;
    impactBreakQueue.clear();
  }

  function queueSawCut(saw,target,contact) {
    if (paused || saw.shapeType!=="saw" || target.shapeType==="saw" || target.sawGrace>0) return;
    if (target.unbreakable) return;
    if (target.deformable) {
      queueDeformation(target,normalize(sub(target.pos,saw.pos)),Math.max(180,length(saw.vel)+Math.abs(saw.angVel)*saw.radius),contact);
      return;
    }
    const shouldCull=target.sawFragment && (target.radius<7 || target.mass<.03 || target.collisionThickness<3.5);
    if (!shouldCull && (target.radius<4 || target.mass<.006 || bodies.length>=MAX_DYNAMIC_BODIES)) return;
    if (!sawCutQueue.has(target.id)) sawCutQueue.set(target.id,{saw,target,contact:{...contact},shouldCull});
  }

  function processSawCuts() {
    if (!sawCutQueue.size) return;
    let cutsThisFrame=0;
    for (const hit of sawCutQueue.values()) {
      if (cutsThisFrame>=6) break;
      const {saw,target,contact,shouldCull}=hit;
      if (!bodies.includes(saw) || !bodies.includes(target) || target.sawGrace>0) continue;
      if (shouldCull) {
        removeBodyConstraints(target);
        bodies=bodies.filter(body=>body!==target);
        continue;
      }

      let inward=normalize(sub(target.pos,contact));
      if (length(inward)<1e-7) inward=normalize(sub(target.pos,saw.pos));
      if (length(inward)<1e-7) inward={x:1,y:0};
      const start=sub(contact,mul(inward,Math.max(10,target.radius*.42)));
      const end=add(target.pos,mul(inward,target.radius+32));
      let pieces=sliceBody(target,start,end);

      if (!pieces) {
        let travel=normalize(sub(velocityAtPoint(saw,contact),velocityAtPoint(target,contact)));
        if (length(travel)<1e-7) travel=inward;
        pieces=sliceBody(
          target,
          sub(target.pos,mul(travel,target.radius+24)),
          add(target.pos,mul(travel,target.radius+24))
        );
      }
      if (!pieces) continue;

      const keptPieces=[];
      for (const piece of pieces) {
        piece.sawFragment=true;
        piece.sawGrace=.12;
        piece.impactGrace=Math.max(piece.impactGrace,.12);
        if (piece.radius>=6 && piece.mass>=.02 && piece.collisionThickness>=3) keptPieces.push(piece);
      }
      reattachConstraints(target,keptPieces);
      const index=bodies.indexOf(target);
      if (index>=0) bodies.splice(index,1,...keptPieces);
      cuts++;
      cutsThisFrame++;
      flash=Math.max(flash,.12);
    }
    sawCutQueue.clear();
  }
