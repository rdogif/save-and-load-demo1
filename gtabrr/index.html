<!doctype html>
<html lang="en">

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: #159bd2;
      background: #c9f3ff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .page {
      width: min(900px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 70px 42px;
      background: #fff8ce;
      border-left: 12px solid #f9c8ec;
      border-right: 12px solid #f9c8ec;
    }

    .generator {
      position: relative;
      max-width: 720px;
      min-height: 560px;
      margin: 0 auto;
      padding: 36px 70px 50px;
      text-align: center;
      border: 9px solid #c6f4fa;
      border-radius: 36px;
      background: linear-gradient(#f5caec 0%, #d9e2f6 60%, #c9f3fa 100%);
    }

    h1 {
      margin: 0 90px 24px;
      color: #aeeeff;
      font-size: 58px;
      line-height: .92;
      letter-spacing: -3px;
      text-shadow: 3px 3px 0 #eb9bd5, -2px -2px 0 #4bbce3;
    }

    .intro { margin: 0 0 24px; font-size: 20px; line-height: 1.35; }

    .balloons { position: absolute; top: 42px; width: 105px; height: 210px; }
    .balloons.left { left: 20px; }
    .balloons.right { right: 20px; transform: scaleX(-1); }
    .balloon { position: absolute; width: 65px; height: 83px; border: 3px solid; border-radius: 50% 50% 47% 47%; background: rgba(255,255,255,.35); }
    .balloon::after { content: ""; position: absolute; left: 31px; top: 80px; width: 42px; height: 90px; border-left: 3px solid currentColor; border-radius: 50%; transform: rotate(-12deg); }
    .balloon.blue { left: 4px; color: #25acd9; }
    .balloon.pink { top: 45px; left: 37px; color: #ef84ca; }

    .choices { display: flex; justify-content: center; gap: 22px; margin: 22px 0 28px; }
    .gender {
      width: 210px;
      padding: 13px 20px;
      border: 7px solid #fff;
      border-radius: 50px;
      font-size: 31px;
      font-weight: bold;
      cursor: pointer;
      background: #fff;
    }
    .gender.boy { color: #28aee0; }
    .gender.girl { color: #ee83ca; }
    .gender:hover, .gender:focus-visible { border-color: #bceff5; outline: 0; }
    .gender.selected { border-color: #a9eaf2; }

    .label { margin: 0 0 14px; font-size: 20px; }
    .result {
      display: grid;
      place-items: center;
      min-height: 126px;
      padding: 20px;
      border: 8px solid #bceff4;
      border-radius: 35px;
      color: #159bd2;
      background: #fff;
      font-size: clamp(38px, 7vw, 58px);
      overflow-wrap: anywhere;
    }

    .again {
      margin-top: 18px;
      padding: 9px 22px;
      border: 2px solid #83d3e5;
      border-radius: 8px;
      color: #178fc0;
      background: #eafcff;
      font-size: 15px;
      cursor: pointer;
    }
    .again:hover { background: #fff; }

    @media (max-width: 650px) {
      .page { width: 100%; padding: 28px 12px; border-width: 6px; }
      .generator { min-height: 520px; padding: 30px 18px 40px; border-width: 6px; border-radius: 25px; }
      h1 { margin: 0 62px 22px; font-size: 43px; }
      .balloons { top: 35px; transform: scale(.7); transform-origin: top left; }
      .balloons.left { left: 4px; }
      .balloons.right { right: -25px; transform: scaleX(-1) scale(.7); }
      .intro { margin-top: 35px; font-size: 18px; }
      .choices { gap: 10px; }
      .gender { width: 45%; padding: 10px; font-size: 25px; }
    }
  </style>
</head>
